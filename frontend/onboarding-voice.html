<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Onboarding</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <script type="module" src="js/firebase.js"></script>
    <style>
      .onboarding-page {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        padding: var(--safe-top) 0 calc(36px + var(--safe-bottom));
        height: var(--app-height);
        max-width: 480px;
        margin: 0 auto;
      }

      .onboarding-page .chat-header {
        width: 100%;
      }

      .ob-stage {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        width: 100%;
        padding: 0 24px;
        box-sizing: border-box;
      }

      .pulse-circle {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: linear-gradient(135deg, #ff6ec4 0%, #7873f5 100%);
        animation: pulseIdle 2s ease-in-out infinite;
        box-shadow: 0 0 40px rgba(255, 110, 196, 0.6);
        transition:
          background 0.4s ease,
          box-shadow 0.4s ease;
      }

      @keyframes pulseIdle {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.1);
          opacity: 0.8;
        }
      }

      .coco-speaking .pulse-circle {
        animation: pulseSpeaking 0.6s ease-in-out infinite;
        box-shadow: 0 0 60px rgba(255, 110, 196, 0.85);
      }

      @keyframes pulseSpeaking {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.15);
        }
      }

      /* 듣는 중 */
      .user-listening .pulse-circle {
        background: linear-gradient(135deg, #ff3aac 0%, #5b6ef5 100%);
        animation: pulseListening 0.8s ease-in-out infinite;
        box-shadow: 0 0 60px rgba(255, 58, 172, 0.8);
      }
      @keyframes pulseListening {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.13);
        }
      }

      /* 분석 중 */
      .coco-processing .pulse-circle {
        background: linear-gradient(135deg, #d0d0d0 0%, #f0f0f0 100%);
        animation: pulseProcessing 2.5s ease-in-out infinite;
        box-shadow: 0 0 20px rgba(200, 200, 200, 0.3);
      }
      @keyframes pulseProcessing {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.6;
        }
        50% {
          transform: scale(1.05);
          opacity: 1;
        }
      }

      .ob-textbox {
        width: 100%;
        text-align: center;
        min-height: 80px;
      }
      .ob-cmsg {
        font-family: "Merriweather", serif;
        font-size: 18px;
        line-height: 1.6;
        white-space: pre-line;
      }
      .ob-heard {
        font-size: 13px;
        color: var(--text-secondary);
        font-style: italic;
        margin-top: 8px;
        min-height: 18px;
      }

      .voice-indicator {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        height: 48px;
        margin-bottom: calc(16px + var(--safe-bottom));
        flex-shrink: 0;
        padding: 0 24px;
        box-sizing: border-box;
      }
      .vi-bar {
        width: 3px;
        height: 4px;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.25);
        transition: background 0.15s;
      }
      .user-speaking .vi-bar {
        background: rgba(255, 255, 255, 0.85);
        animation: viPulse 0.4s ease-in-out infinite;
      }
      .user-speaking .vi-bar:nth-child(1) {
        animation-delay: 0s;
        animation-duration: 0.45s;
      }
      .user-speaking .vi-bar:nth-child(2) {
        animation-delay: 0.09s;
        animation-duration: 0.38s;
      }
      .user-speaking .vi-bar:nth-child(3) {
        animation-delay: 0.18s;
        animation-duration: 0.42s;
      }
      .user-speaking .vi-bar:nth-child(4) {
        animation-delay: 0.09s;
        animation-duration: 0.38s;
      }
      .user-speaking .vi-bar:nth-child(5) {
        animation-delay: 0s;
        animation-duration: 0.45s;
      }
      @keyframes viPulse {
        0%,
        100% {
          height: 4px;
        }
        50% {
          height: 22px;
        }
      }

      @media (max-height: 700px) {
        .onboarding-page .chat-header {
          padding-top: 18px;
        }
      }
    </style>
  </head>

  <body>
    <div class="onboarding-page chat-container">
      <div class="chat-header brand-text">COCO</div>

      <div class="ob-stage">
        <div class="waiting-animation">
          <div class="pulse-circle" id="obPulse"></div>
        </div>
        <div class="ob-textbox">
          <div id="obMsg" class="ob-cmsg"></div>
          <div id="obHeard" class="ob-heard"></div>
        </div>
      </div>

      <div class="voice-indicator" id="voiceIndicator">
        <div class="vi-bar"></div>
        <div class="vi-bar"></div>
        <div class="vi-bar"></div>
        <div class="vi-bar"></div>
        <div class="vi-bar"></div>
      </div>
    </div>

    <div class="ob-permission" id="obPermission">
      <div class="ob-permission-card">
        <div class="ob-permission-title">enable mic & audio</div>
        <div class="ob-permission-text">
          we need microphone access to hear you and audio playback for coco's
          voice. please allow permissions to continue.
        </div>
        <div class="ob-permission-actions">
          <button id="obPermissionBtn">enable microphone</button>
          <button class="ghost" id="obPermissionSkip">
            use text onboarding
          </button>
        </div>
        <span id="obPermissionError" class="error hidden"></span>
      </div>
    </div>

    <script src="js/common.js"></script>

    <script>
      /* ================= USER INFO ================= */

      const firstName = getFromLocal("firstName") || "there";
      const userId = getFromLocal("user_id");
      const age = getFromLocal("age");
      const birthdate = getFromLocal("birthdate");
      const phone = getFromLocal("phone");
      const lastName = getFromLocal("lastName") || "";
      const VOICE_API_BASE = `${API_BASE}/voice`;
      const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition;
      const IS_WEBKIT =
        /AppleWebKit/i.test(navigator.userAgent) &&
        !/Chrome|Chromium|CriOS/i.test(navigator.userAgent);
      const SPEECH_LANG =
        getFromLocal("speech_lang") ||
        (Array.isArray(navigator.languages) && navigator.languages[0]) ||
        navigator.language ||
        "en-US";
      const LANG_HINTS_BY_CC = {
        "+1": "en",
        "+44": "en",
        "+82": "ko",
        "+81": "ja",
        "+86": "zh",
      };
      const SILENT_WAV_B64 =
        "UklGRmQGAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YUAGAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA";

      /* ================= FLOW ================= */

      const FLOW = [
        { t: "bot", text: `hi ${firstName}, i'm coco` },
        { t: "bot", text: "let's find someone\nwho really gets you" },
        { t: "bot", text: "to do that,\ni need to get to know you first" },
        {
          t: "ask",
          id: "gender",
          q: "how do you identify\nyour gender?",
          opts: ["woman", "man", "non-binary"],
        },
        { t: "gender_detail" },
        {
          t: "ask",
          id: "drink",
          q: "do you drink alcohol?",
          opts: ["yes", "no"],
        },
        { t: "ask", id: "smoke", q: "do you smoke?", opts: ["yes", "no"] },
        {
          t: "ask",
          id: "marijuana",
          q: "do you use marijuana?",
          opts: ["yes", "no"],
        },
        {
          t: "ask",
          id: "sexual_orientation",
          q: "who catches your eye?\nmen, women, everyone —\ntell me however feels natural",
          opts: [
            "men",
            "women",
            "men and women",
            "men and non-binary people",
            "women and non-binary people",
            "all types of genders",
          ],
        },
        {
          t: "range",
          id: "age_preference",
          q: "what age range\nare you looking for?",
        },
        { t: "bot", text: "thanks for telling me" },
        { t: "bot", text: "now let's switch gears" },
        { t: "bot", text: "let's fill your playlist\nwith the music you love" },
        { t: "done" },
      ];

      /* ================= STATE ================= */

      let step = 0;
      const answers = {};
      const voiceTranscripts = [];
      let currentQ = null;
      const GENDER_STEP_INDEX = FLOW.findIndex((item) => item.id === "gender");
      let audioUnlocked = false;
      let recognizer = null;
      let recognitionActive = false;
      let liveFinal = "";
      let flowStarted = false;
      let speechChunks = [];
      let speechActive = false;
      let currentMimeType = "audio/webm";
      let isProcessing = false;
      let correctionTimer = null;
      let ambientLevel = 0.03;
      let voiceFrameCount = 0;
      let lastVoiceTime = 0;
      const SILENCE_MS = 1300;

      /* ================= DOM ================= */

      const $msg = document.getElementById("obMsg");
      const $heard = document.getElementById("obHeard");
      const $page = document.querySelector(".onboarding-page"); // #8: 한 곳에서만 선언
      const $voiceIndicator = document.getElementById("voiceIndicator");
      const $permission = document.getElementById("obPermission");
      const $permissionBtn = document.getElementById("obPermissionBtn");
      const $permissionSkip = document.getElementById("obPermissionSkip");
      const $permissionError = document.getElementById("obPermissionError");
      const cocoPlayer = new Audio();
      cocoPlayer.preload = "auto";
      cocoPlayer.setAttribute("playsinline", "");
      cocoPlayer.playsInline = true;

      /* ================= AUDIO HELPER ================= */

      function playAudio(b64) {
        return new Promise((resolve) => {
          if (!b64) {
            resolve(false);
            return;
          }
          const cleaned = String(b64).replace(/\s+/g, "");
          const audioUrl = "data:audio/mpeg;base64," + cleaned;
          const audio = cocoPlayer;
          try {
            audio.pause();
          } catch {}
          audio.onended = null;
          audio.onerror = null;
          audio.src = audioUrl;
          audio.load();
          audio.volume = 1;
          let done = false;
          const finish = (played) => {
            if (done) return;
            done = true;
            $page.classList.remove("coco-speaking");
            resolve(played);
          };
          $page.classList.add("coco-speaking");
          const timeout = setTimeout(() => {
            try {
              audio.pause();
            } catch {}
            finish(false);
          }, 8000);
          audio.onended = () => {
            clearTimeout(timeout);
            finish(true);
          };
          audio.onerror = () => {
            clearTimeout(timeout);
            finish(false);
          };
          const playPromise = audio.play();
          if (playPromise?.catch) {
            playPromise.catch(() => {
              clearTimeout(timeout);
              finish(false);
            });
          }
        });
      }

      function setStatus(message, heard = "") {
        if (message !== null && message !== undefined)
          $msg.textContent = message;
        if (heard !== null) $heard.textContent = heard;
      }

      function showPermissionError(message) {
        if (!$permissionError) return;
        if (!message) {
          $permissionError.textContent = "";
          $permissionError.classList.add("hidden");
          return;
        }
        $permissionError.textContent = message;
        $permissionError.classList.remove("hidden");
      }

      function startFlow() {
        if (flowStarted) return;
        flowStarted = true;
        next();
      }

      function speakText() {
        // Web speech synthesis is intentionally disabled.
        return Promise.resolve(false);
      }

      async function fetchTtsAudio(text) {
        const plain = String(text || "")
          .replace(/\n+/g, " ")
          .trim();
        if (!plain) return null;
        try {
          const res = await fetch(`${VOICE_API_BASE}/tts`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: plain }),
          });
          if (!res.ok) return null;
          const data = await res.json().catch(() => ({}));
          return data.audio || null;
        } catch {
          return null;
        }
      }

      async function playCoco(text) {
        const audio = await fetchTtsAudio(text);
        if (audio) {
          const played = await playAudio(audio);
          if (played) return true;
        }
        return false;
      }

      function unlockAudioPlayback() {
        if (audioUnlocked) return;
        audioUnlocked = true;
        try {
          cocoPlayer.src = "data:audio/wav;base64," + SILENT_WAV_B64;
          cocoPlayer.volume = 0;
          cocoPlayer.currentTime = 0;
          const p = cocoPlayer.play();
          if (p?.catch) p.catch(() => {});
        } catch {
          // no-op
        }
      }

      function setVoiceState(state) {
        $page.classList.remove("user-listening", "coco-processing");
        if (state === "listening") $page.classList.add("user-listening");
        if (state === "processing") $page.classList.add("coco-processing");
      }

      function initLiveTranscription() {
        if (!SpeechRecognition) return;
        recognizer = new SpeechRecognition();
        recognizer.continuous = true;
        recognizer.interimResults = true;
        recognizer.lang = SPEECH_LANG;
        recognizer.onresult = (e) => {
          let interim = "";
          for (let i = e.resultIndex; i < e.results.length; i++) {
            if (e.results[i].isFinal) liveFinal += e.results[i][0].transcript;
            else interim = e.results[i][0].transcript;
          }
          if (interim || liveFinal)
            $heard.textContent = (liveFinal + interim).trim();
        };
        recognizer.onerror = () => {};
      }

      function startLiveTranscription() {
        if (!recognizer) return;
        liveFinal = "";
        try {
          recognizer.start();
        } catch {}
        recognitionActive = true;
      }

      function stopLiveTranscription() {
        if (!recognizer || !recognitionActive) return;
        try {
          recognizer.stop();
        } catch {}
        recognitionActive = false;
      }

      function micErrorMessage(err) {
        const name = err?.name || "";
        const msg = String(err?.message || "");
        if (name === "NotAllowedError" || name === "SecurityError") {
          return "mic permission was blocked. please allow access in the browser.";
        }
        if (name === "NotFoundError" || name === "DevicesNotFoundError") {
          return "no microphone found. please connect a mic and retry.";
        }
        if (
          name === "NotReadableError" ||
          msg.toLowerCase().includes("failed to start the audio device")
        ) {
          return "mic is being used by another app. close other apps and try again.";
        }
        if (name === "NotSupportedError") {
          return "mic is not supported in this browser.";
        }
        return "failed to start the microphone. please try again.";
      }

      function resetVoice() {
        stopLiveTranscription();
        try {
          if (mediaRecorder && mediaRecorder.state !== "inactive") {
            mediaRecorder.stop();
          }
        } catch {}
        if (stream) {
          try {
            stream.getTracks().forEach((t) => t.stop());
          } catch {}
        }
        mediaRecorder = null;
        stream = null;
        speechChunks = [];
        speechActive = false;
        isProcessing = false;
        initVoice.started = false;
      }

      function getLangCandidatesFromPhone(phoneValue) {
        const raw = String(phoneValue || "").trim();
        if (!raw.startsWith("+")) return null;
        const cc = Object.keys(LANG_HINTS_BY_CC).find((code) =>
          raw.startsWith(code),
        );
        if (!cc) return null;
        const primary = LANG_HINTS_BY_CC[cc];
        const codes = [primary, "en"].filter(
          (v, i, a) => v && a.indexOf(v) === i,
        );
        return { codes, country_code: cc };
      }

      async function processSpeechBlob(blob) {
        if (!currentQ || !blob) return;
        if (isProcessing) return;
        if (blob.size < 500) return;
        isProcessing = true;

        const isCorrection = currentQ.t === "correction_window";
        const prevAnswer = isCorrection ? answers[currentQ.id] || "" : "";
        const activeQ = isCorrection
          ? { ...currentQ, t: currentQ.originalT }
          : currentQ;

        if (isCorrection) {
          clearTimeout(correctionTimer);
          correctionTimer = null;
        }

        try {
          const form = new FormData();
          const blobType = blob.type || currentMimeType || "";
          const ext = blobType.includes("mp4")
            ? "mp4"
            : blobType.includes("mpeg")
              ? "mp3"
              : blobType.includes("ogg") || blobType.includes("oga")
                ? "ogg"
                : blobType.includes("wav")
                  ? "wav"
                  : "webm";
          form.append("audio", blob, `speech.${ext}`);
          form.append("type", activeQ.t || "ask");
          form.append("question_id", activeQ.id || "");

          if (activeQ.q) {
            form.append("question_text", activeQ.q.replace(/\n/g, " "));
          }

          if (activeQ.id === "gender_detail") {
            form.append("base_gender", answers.gender || "");
          }

          if (currentQ.opts) {
            form.append("options", JSON.stringify(currentQ.opts));
          }
          const langCandidates = getLangCandidatesFromPhone(phone);
          if (langCandidates) {
            form.append("lang_candidates", JSON.stringify(langCandidates));
          }

          if (isCorrection) {
            form.append("is_correction", "true");
            form.append("prev_answer", prevAnswer);
          }

          const res = await fetch(`${VOICE_API_BASE}/turn`, {
            method: "POST",
            body: form,
          });
          const data = await res.json().catch(() => ({}));

          console.group(`🎤 [${activeQ.id}] "${data.transcript}"`);
          console.log("question type:", activeQ.t);
          console.log("options:", activeQ.opts);
          console.log("mapped:", data.mapped);
          console.log("gender_detail:", data.gender_detail);
          console.log("reply:", data.reply);
          console.log("raw server data:", data);
          console.groupEnd();

          if (!res.ok || data?.error) {
            setStatus(
              "voice service isn't available right now.\nplease try again or use text onboarding.",
              "",
            );
            return;
          }

          if (data.transcript) $heard.textContent = data.transcript;
          await handleUtteranceServer(data, activeQ);
        } catch (e) {
          console.error("turn error:", e);
          setStatus(
            "voice service isn't available right now.\nplease try again or use text onboarding.",
            "",
          );
        } finally {
          isProcessing = false;
        }
      }

      function finalizeSpeech() {
        if (!speechActive) return;
        speechActive = false;
        stopLiveTranscription();
        $voiceIndicator.classList.remove("user-speaking");
        setVoiceState("processing");

        if (mediaRecorder && mediaRecorder.state === "recording") {
          try {
            mediaRecorder.stop();
          } catch (e) {}
        }
      }

      /* ================= VOICE RECORD ================= */

      let mediaRecorder, stream;

      async function initVoice() {
        if (initVoice.started) return true;

        const host = window.location.hostname;
        const isLocal =
          host === "localhost" || host === "127.0.0.1" || host === "0.0.0.0";
        if (!window.isSecureContext && !isLocal) {
          const msg =
            "mic access requires https (or localhost).\nplease open with a secure url.";
          showPermissionError(msg);
          setStatus(msg, "");
          return false;
        }

        if (!navigator.mediaDevices?.getUserMedia) {
          const msg =
            "mic access isn't supported on this device.\nplease use the text onboarding instead.";
          showPermissionError(msg);
          setStatus(msg, "");
          return false;
        }

        if (!window.MediaRecorder) {
          const msg =
            "voice recording isn't supported here.\nplease use the text onboarding instead.";
          showPermissionError(msg);
          setStatus(msg, "");
          return false;
        }

        try {
          stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch (err) {
          console.error("getUserMedia failed:", err);
          const msg = micErrorMessage(err);
          showPermissionError(msg);
          setStatus(msg, "");
          return false;
        }

        initLiveTranscription();

        const mimeType = MediaRecorder.isTypeSupported("audio/webm")
          ? "audio/webm"
          : MediaRecorder.isTypeSupported("audio/mp4")
            ? "audio/mp4"
            : "";

        try {
          mediaRecorder = new MediaRecorder(
            stream,
            mimeType ? { mimeType } : {},
          );
        } catch (err) {
          console.error("MediaRecorder init failed:", err);
          const msg = micErrorMessage(err);
          showPermissionError(msg);
          setStatus(msg, "");
          return false;
        }
        currentMimeType = mediaRecorder.mimeType || mimeType || "audio/webm";
        mediaRecorder.ondataavailable = (e) => {
          if (e.data && e.data.size > 0) {
            if (e.data.type) currentMimeType = e.data.type;
            speechChunks.push(e.data);
          }
        };
        mediaRecorder.onstop = () => {
          if (!speechChunks.length) return;
          const blobType = speechChunks[0]?.type || currentMimeType;
          const blob = new Blob(speechChunks, { type: blobType });
          speechChunks = [];
          processSpeechBlob(blob);
        };

        let ctx;
        try {
          ctx = new AudioContext();
          await ctx.resume();
        } catch (err) {
          console.error("AudioContext init failed:", err);
          const msg = "audio output is blocked. please allow sound and retry.";
          showPermissionError(msg);
          setStatus(msg, "");
          return false;
        }
        const src = ctx.createMediaStreamSource(stream);
        const analyser = ctx.createAnalyser();
        src.connect(analyser);
        const buf = new Uint8Array(analyser.fftSize);

        async function calibrateAmbient() {
          const samples = [];
          return new Promise((resolve) => {
            let count = 0;
            function sample() {
              analyser.getByteTimeDomainData(buf);
              let sum = 0;
              for (let i = 0; i < buf.length; i++) {
                const v = (buf[i] - 128) / 128;
                sum += v * v;
              }
              samples.push(Math.sqrt(sum / buf.length));
              count++;
              if (count < 60) {
                requestAnimationFrame(sample);
              } else {
                const avg = samples.reduce((a, b) => a + b, 0) / samples.length;
                ambientLevel = Math.max(avg * 2.5, 0.03);
                resolve();
              }
            }
            requestAnimationFrame(sample);
          });
        }

        function detect() {
          analyser.getByteTimeDomainData(buf);
          if (!currentQ || $page.classList.contains("coco-speaking")) {
            voiceFrameCount = 0;
            requestAnimationFrame(detect);
            return;
          }
          let sum = 0;
          for (let i = 0; i < buf.length; i++) {
            const v = (buf[i] - 128) / 128;
            sum += v * v;
          }
          const vol = Math.sqrt(sum / buf.length);

          if (vol > ambientLevel) {
            lastVoiceTime = Date.now();
            voiceFrameCount++;
            if (voiceFrameCount >= 3) {
              $voiceIndicator.classList.add("user-speaking");
              if (!speechActive) {
                speechChunks = [];
                speechActive = true;
                setVoiceState("listening");
                startLiveTranscription();
                if (mediaRecorder && mediaRecorder.state === "inactive") {
                  try {
                    mediaRecorder.start();
                  } catch (e) {}
                }
              }
            }
          } else {
            voiceFrameCount = 0;
            if (speechActive) {
              if (speechActive && Date.now() - lastVoiceTime > SILENCE_MS) {
                $voiceIndicator.classList.remove("user-speaking");
                finalizeSpeech();
              }
            }
          }

          requestAnimationFrame(detect);
          // #8: $page를 detect 안에서 다시 선언하지 않음
        }
        await calibrateAmbient();

        // 30초마다 말 안 할 때 재캘리브레이션
        setInterval(async () => {
          if (!speechActive && !$page.classList.contains("coco-speaking")) {
            await calibrateAmbient();
          }
        }, 30000);

        detect();
        initVoice.started = true;
        showPermissionError("");
        return true;
      }

      async function handlePermissionStart() {
        if (!$permissionBtn) return;
        $permissionBtn.disabled = true;
        showPermissionError("");
        unlockAudioPlayback();
        setStatus("initializing mic...", "");
        const ok = await initVoice();
        if (ok) {
          $permission?.classList.add("hidden");
          setStatus("", "");
          startFlow();
        } else {
          $permissionBtn.disabled = false;
        }
      }

      $permissionBtn?.addEventListener("click", handlePermissionStart);
      $permissionSkip?.addEventListener("click", () => {
        navigateTo("onboarding-chat.html");
      });

      /* ================= HANDLE UTTERANCE ================= */

      // #7: range와 ask 완전히 분기 — 이중 저장 없음
      async function handleUtteranceServer(data, q) {
        if (q.t === "range") {
          if (data.min !== undefined && data.max !== undefined) {
            answers[q.id] = { min: data.min, max: data.max };
            const replyText = data.reply || "got it";
            $msg.textContent = replyText;
            await playAudio(data.audio);
            step++;
            next();
          } else {
            // #5: min/max 없을 때 재질문
            const reaskText =
              data.reply || "could you tell me the age range you have in mind?";
            $msg.textContent = reaskText;
            await playCoco(reaskText);
          }
          return;
        }

        // 일반 ask
        const mapped = data.mapped;
        if (!mapped) {
          const reaskText =
            data.reply || "hmm, could you say that differently?";
          $msg.textContent = reaskText;
          await playCoco(reaskText);
          currentQ = q;
          return;
        }

        answers[q.id] = mapped;
        if (q.id === "gender" && data.gender_detail) {
          answers["gender_detail"] = data.gender_detail;
        }

        console.log("📋 answers so far:", JSON.parse(JSON.stringify(answers)));
        console.log("📝 transcripts so far:", voiceTranscripts.length);

        voiceTranscripts.push({
          question: q.q,
          said: data.transcript,
          mappedTo: mapped,
        });

        const replyText = data.reply || "got it";
        $msg.textContent = replyText;
        await playAudio(data.audio);

        // ✅ 에코 후 correction window 진입 (3초 대기)
        $heard.textContent = "";
        currentQ = { ...q, t: "correction_window", originalT: q.t };

        correctionTimer = setTimeout(() => {
          correctionTimer = null;
          currentQ = null;
          step++;
          next();
        }, 4000);
      }

      /* ================= FLOW ================= */

      async function next() {
        const q = FLOW[step];
        if (!q) return;

        currentQ = null;

        if (q.t === "bot") {
          $msg.textContent = q.text;
          await playCoco(q.text);
          step++;
          next();
          return;
        }

        if (q.t === "gender_detail") {
          if (answers.gender_detail) {
            step++;
            next();
            return;
          }
          if (!answers.gender) {
            setStatus("before this, tell me your gender first.");
            if (GENDER_STEP_INDEX >= 0) {
              step = GENDER_STEP_INDEX;
            } else {
              step = Math.max(0, step - 1);
            }
            next();
            return;
          }
          const map = {
            woman: [
              "cis woman",
              "trans woman",
              "intersex woman",
              "transfeminine",
              "woman and non-binary",
            ],
            man: [
              "cis man",
              "trans man",
              "intersex man",
              "transmasculine",
              "man and non-binary",
            ],
            "non-binary": [
              "agender",
              "bigender",
              "genderfluid",
              "genderqueer",
              "gender nonconforming",
              "gender questioning",
              "gender variant",
              "intersex",
              "neutrois",
              "non-binary man",
              "non-binary woman",
              "pangender",
              "polygender",
              "transgender",
              "two-spirit",
            ],
          };
          const opts = map[answers.gender];
          if (!opts) {
            setStatus("could you choose a gender first?");
            step =
              GENDER_STEP_INDEX >= 0
                ? GENDER_STEP_INDEX
                : Math.max(0, step - 1);
            next();
            return;
          }
          FLOW.splice(step, 1, {
            t: "ask",
            id: "gender_detail",
            q: "a little more specific —\ncis, trans, non-binary?\nor something else entirely?",
            opts,
          });
          next();
          return;
        }

        if (q.t === "ask") {
          console.log(`➡️ step ${step}: ask [${q.id}]`, q.opts);
          $msg.textContent = q.q;
          $heard.textContent = "";
          await playCoco(q.q);
          currentQ = q;
          setVoiceState("listening");
          return;
        }

        if (q.t === "range") {
          console.log(`➡️ step ${step}: range [${q.id}]`);
          $msg.textContent = q.q;
          $heard.textContent = "";
          await playCoco(q.q);
          currentQ = q; // opts 없음 → backend is_range=True
          setVoiceState("listening");
          return; // #6: return 추가 — done으로 fall-through 없음
        }

        if (q.t === "done") {
          console.log(
            "✅ DONE. Final answers:",
            JSON.parse(JSON.stringify(answers)),
          );
          finish();
        }
      }

      /* ================= BIO ================= */

      async function generateBio() {
        if (!voiceTranscripts.length) return "";
        try {
          const res = await fetch(`${VOICE_API_BASE}/bio`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ transcripts: voiceTranscripts }),
          });
          if (!res.ok) return "";
          const d = await res.json();
          return d.bio || "";
        } catch {
          return "";
        }
      }

      /* ================= FINISH ================= */

      async function finish() {
        showLoading();
        try {
          const bio = await generateBio();
          await apiCall("/onboarding/save", "POST", {
            user_id: userId,
            profile: answers,
            firstName,
            lastName,
            age,
            birthdate,
            phone,
            transcripts: voiceTranscripts,
            ...(bio ? { bio } : {}),
          });
          saveToLocal("onboarding_completed", true);
          saveToLocal("just_completed_onboarding", true);
          hideLoading();
          navigateTo("playlist.html");
        } catch (error) {
          console.error("Failed to save onboarding:", error);
          hideLoading();
          setStatus("failed to save profile.\nplease try again.", "");
        }
      }

      /* ================= START ================= */

      setStatus(
        "please enable mic and audio to continue.",
        "permission is required before we can start",
      );
    </script>
  </body>
</html>
