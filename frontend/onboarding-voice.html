<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Onboarding</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <script type="module" src="js/firebase.js"></script>
    <style>
      .onboarding-page {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        padding: var(--safe-top) 0 calc(36px + var(--safe-bottom));
        height: var(--app-height);
        max-width: 480px;
        margin: 0 auto;
      }

      .onboarding-page .chat-header {
        width: 100%;
      }

      .ob-stage {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        width: 100%;
        padding: 0 24px;
        box-sizing: border-box;
      }

      .pulse-circle {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: linear-gradient(135deg, #ff6ec4 0%, #7873f5 100%);
        animation: pulseIdle 2s ease-in-out infinite;
        box-shadow: 0 0 40px rgba(255, 110, 196, 0.6);
        transition:
          background 0.7s ease,
          box-shadow 0.7s ease,
          opacity 0.4s ease;
      }

      /* 듣는 중 — animation: none 대신 아주 느린 미세 pulse */
      .user-listening .pulse-circle {
        background: linear-gradient(135deg, #ff6ec4 0%, #7873f5 100%);
        animation: pulseStill 4s ease-in-out infinite;
        box-shadow: 0 0 40px rgba(255, 110, 196, 0.6);
      }

      /* 분석 중 */
      .coco-processing .pulse-circle {
        background: linear-gradient(135deg, #d0d0d0 0%, #f0f0f0 100%);
        animation: pulseProcessing 2.5s ease-in-out infinite;
        box-shadow: 0 0 20px rgba(200, 200, 200, 0.3);
      }

      /* Coco 말하는 중 */
      .coco-speaking .pulse-circle {
        background: linear-gradient(135deg, #ff6ec4 0%, #7873f5 100%);
        animation: pulseSpeaking 0.6s ease-in-out infinite;
        box-shadow: 0 0 60px rgba(255, 110, 196, 0.85);
      }

      @keyframes pulseIdle {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.08);
        }
      }

      /* snap 방지용 — 거의 안 움직임 */
      @keyframes pulseStill {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.02);
        }
      }

      @keyframes pulseProcessing {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.7;
        }
        50% {
          transform: scale(1.04);
          opacity: 1;
        }
      }

      @keyframes pulseSpeaking {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.15);
        }
      }

      .ob-textbox {
        width: 100%;
        text-align: center;
        min-height: 80px;
      }
      .ob-cmsg {
        font-family: "Merriweather", serif;
        font-size: 18px;
        line-height: 1.6;
        white-space: pre-line;
      }
      .ob-heard {
        font-size: 13px;
        color: var(--text-secondary);
        font-style: italic;
        margin-top: 8px;
        min-height: 18px;
      }

      .voice-indicator {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        height: 48px;
        margin-bottom: calc(16px + var(--safe-bottom));
        flex-shrink: 0;
        padding: 0 24px;
        box-sizing: border-box;
      }

      .voice-switch-modal {
        position: fixed;
        inset: 0;
        background: var(--overlay-bg);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 11000;
        padding: 24px;
      }

      .voice-switch-modal.active {
        display: flex;
      }

      .voice-switch-card {
        width: 100%;
        max-width: 420px;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        padding: 24px;
        text-align: left;
        display: flex;
        flex-direction: column;
        gap: 14px;
        font-family: "Merriweather", serif;
      }

      .voice-switch-title {
        font-size: 22px;
        font-weight: 700;
      }

      .voice-switch-text {
        font-size: 14px;
        color: var(--text-secondary);
        line-height: 1.5;
      }

      .voice-switch-actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 6px;
      }

      .voice-switch-actions button.keep-trying {
        background: transparent;
        border: 1px solid var(--border-color);
        color: var(--text-secondary);
      }

      .voice-switch-actions button.primary {
        background: linear-gradient(135deg, #ff6ec4 0%, #7873f5 100%);
        color: white;
        border: none;
      }
      .vi-bar {
        width: 3px;
        height: 4px;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.25);
        transition: background 0.15s;
      }
      .user-speaking .vi-bar {
        background: rgba(255, 255, 255, 0.85);
        animation: viPulse 0.4s ease-in-out infinite;
      }
      .user-speaking .vi-bar:nth-child(1) {
        animation-delay: 0s;
        animation-duration: 0.45s;
      }
      .user-speaking .vi-bar:nth-child(2) {
        animation-delay: 0.09s;
        animation-duration: 0.38s;
      }
      .user-speaking .vi-bar:nth-child(3) {
        animation-delay: 0.18s;
        animation-duration: 0.42s;
      }
      .user-speaking .vi-bar:nth-child(4) {
        animation-delay: 0.09s;
        animation-duration: 0.38s;
      }
      .user-speaking .vi-bar:nth-child(5) {
        animation-delay: 0s;
        animation-duration: 0.45s;
      }
      @keyframes viPulse {
        0%,
        100% {
          height: 4px;
        }
        50% {
          height: 22px;
        }
      }

      @media (max-height: 700px) {
        .onboarding-page .chat-header {
          padding-top: 18px;
        }
      }
    </style>
  </head>

  <body>
    <div class="onboarding-page chat-container">
      <div class="chat-header brand-text">COCO</div>

      <div class="ob-stage">
        <div class="waiting-animation">
          <div class="pulse-circle" id="obPulse"></div>
        </div>
        <div class="ob-textbox">
          <div id="obMsg" class="ob-cmsg"></div>
          <div id="obHeard" class="ob-heard"></div>
        </div>
      </div>

      <div class="voice-indicator" id="voiceIndicator">
        <div class="vi-bar"></div>
        <div class="vi-bar"></div>
        <div class="vi-bar"></div>
        <div class="vi-bar"></div>
        <div class="vi-bar"></div>
      </div>
    </div>

    <div class="ob-permission" id="obPermission">
      <div class="ob-permission-card">
        <div class="ob-permission-title">enable mic & audio</div>
        <div class="ob-permission-text">
          we need microphone access to hear you and audio playback for coco's
          voice. please allow permissions to continue.
        </div>
        <div class="ob-permission-actions">
          <button id="obPermissionBtn">enable microphone</button>
          <button class="ghost" id="obPermissionSkip">
            use text onboarding
          </button>
        </div>
        <span id="obPermissionError" class="error hidden"></span>
      </div>
    </div>

    <div class="voice-switch-modal" id="voiceSwitchModal">
      <div class="voice-switch-card">
        <div class="voice-switch-title">having trouble?</div>
        <div class="voice-switch-text">
          it looks like the mic couldn't catch what you said a few times.
          want to switch to the chat onboarding instead?
        </div>
        <div class="voice-switch-actions">
          <button class="primary" id="voiceSwitchChat">switch to chat onboarding</button>
          <button class="keep-trying" id="voiceSwitchKeep">keep trying</button>
        </div>
      </div>
    </div>

    <script src="js/common.js"></script>

    <script>
      /* ================= USER INFO ================= */

      const firstName = getFromLocal("firstName") || "there";
      const userId = getFromLocal("user_id");
      const age = getFromLocal("age");
      const birthdate = getFromLocal("birthdate");
      const phone = getFromLocal("phone");
      const lastName = getFromLocal("lastName") || "";
      const VOICE_API_BASE = `${API_BASE}/voice`;
      const LANG_HINTS_BY_CC = {
        "1": "en", "44": "en", "61": "en", "64": "en", "353": "en", "27": "en",
        "82": "ko", "81": "ja", "86": "zh", "886": "zh",
        "33": "fr", "49": "de", "34": "es", "39": "it",
        "55": "pt", "351": "pt", "52": "es", "54": "es", "57": "es", "56": "es",
        "7": "ru", "91": "hi", "66": "th", "84": "vi", "62": "id", "60": "ms",
        "31": "nl", "46": "sv", "47": "no", "45": "da", "358": "fi",
        "48": "pl", "420": "cs", "36": "hu", "380": "uk", "90": "tr",
        "966": "ar", "971": "ar", "20": "ar", "972": "he",
      };
      function getSttLanguage(phone) {
        if (!phone) return null;
        const digits = phone.replace(/\D/g, "");
        for (const len of [3, 2, 1]) {
          const cc = digits.slice(0, len);
          if (LANG_HINTS_BY_CC[cc]) {
            const lang = LANG_HINTS_BY_CC[cc];
            return lang === "en" ? "en" : null; // non-English → auto-detect
          }
        }
        return null;
      }
      const STT_LANGUAGE = getSttLanguage(phone); // "en" or null (auto-detect)
      const PLAYLIST_NOTICE_LINES = [
        "thanks for telling me",
        "now let's switch gears",
        "let's fill your playlist with the music and artists you love",
      ];
      const SILENT_WAV_B64 =
        "UklGRmQGAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YUAGAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA";

      /* ================= STATE ================= */

      const REQUIRED_FIELDS = ["gender", "gender_detail", "sexual_orientation", "age_preference", "drink", "smoke", "marijuana"];

      let mediaStream = null;
      let mediaRecorder = null;
      let audioChunks = [];
      let audioContext = null;
      let analyser = null;
      let vadInterval = null;
      let noSpeechTimer = null;
      let isListening = false;
      let isProcessing = false;
      let flowStarted = false;
      let audioUnlocked = false;
      let speechDetected = false;
      let speechStartTime = 0;
      let silenceStart = null;
      let switchModalOpen = false;
      let noSpeechCount = 0;
      let nudgeField = null;
      let nudgeMissCount = 0;
      let lastAskedField = null;
      const deferredFields = new Set();
      const fieldFailCounts = {};
      const fieldDeferredOnce = {};
      const NO_SPEECH_THRESHOLD = 5;
      const NO_SPEECH_HINTS = {
        2: "try speaking a bit louder or closer to your mic",
        3: "make sure you're in a quiet place and speak naturally",
      };
      const SPEECH_THRESHOLD = 0.015;
      const SILENCE_DURATION = 1500;
      const MIN_SPEECH_DURATION = 200;
      const MAX_SPEECH_DURATION = 30000;
      const NO_SPEECH_TIMEOUT = 8000;
      const conversationHistory = [];
      const collected = {};
      const speechPaceSamples = [];

      function getMissingFields() {
        return REQUIRED_FIELDS.filter((k) => !collected[k]);
      }

      function getDeferredFieldsForRequest() {
        const missing = getMissingFields();
        const active = missing.filter((k) => !deferredFields.has(k));
        return active.length ? Array.from(deferredFields) : [];
      }

      function getNextTargetField() {
        const missing = getMissingFields();
        const active = missing.filter((k) => !deferredFields.has(k));
        if (active.length) return active[0];
        return missing[0] || null;
      }

      // Pre-fetch first COCO turn in the background while user reads permission screen
      const _prefetchFirstTurn = fetch(`${VOICE_API_BASE}/turn`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ history: [], collected: {}, firstName }),
      }).then(r => r.ok ? r.json() : null).catch(() => null);
      let prefetchedFirstTurn = _prefetchFirstTurn;

      /* ================= DOM ================= */

      const $msg = document.getElementById("obMsg");
      const $heard = document.getElementById("obHeard");
      const $page = document.querySelector(".onboarding-page");
      const $voiceIndicator = document.getElementById("voiceIndicator");
      const $permission = document.getElementById("obPermission");
      const $permissionBtn = document.getElementById("obPermissionBtn");
      const $permissionSkip = document.getElementById("obPermissionSkip");
      const $permissionError = document.getElementById("obPermissionError");
      const $switchModal = document.getElementById("voiceSwitchModal");
      const $switchKeep = document.getElementById("voiceSwitchKeep");
      const $switchChat = document.getElementById("voiceSwitchChat");
      const cocoPlayer = new Audio();
      cocoPlayer.preload = "auto";
      cocoPlayer.setAttribute("playsinline", "");
      cocoPlayer.playsInline = true;

      /* ================= AUDIO ================= */

      function playAudio(b64) {
        return new Promise((resolve) => {
          if (!b64) { resolve(false); return; }
          const audio = cocoPlayer;
          try { audio.pause(); } catch {}
          audio.onended = null;
          audio.onerror = null;
          audio.src = "data:audio/mpeg;base64," + String(b64).replace(/\s+/g, "");
          audio.load();
          audio.volume = 1;
          let done = false;
          const finish = (played) => {
            if (done) return;
            done = true;
            $page.classList.remove("coco-speaking");
            resolve(played);
          };
          $page.classList.add("coco-speaking");
          const timeout = setTimeout(() => { try { audio.pause(); } catch {} finish(false); }, 15000);
          audio.onended = () => { clearTimeout(timeout); finish(true); };
          audio.onerror = () => { clearTimeout(timeout); finish(false); };
          const p = audio.play();
          if (p?.catch) p.catch(() => { clearTimeout(timeout); finish(false); });
        });
      }

      function setStatus(message, heard = "") {
        if (message !== null && message !== undefined) $msg.textContent = message;
        if (heard !== null) $heard.textContent = heard;
      }

      function showPermissionError(message) {
        if (!$permissionError) return;
        if (!message) {
          $permissionError.textContent = "";
          $permissionError.classList.add("hidden");
          return;
        }
        $permissionError.textContent = message;
        $permissionError.classList.remove("hidden");
      }

      async function fetchTtsAudio(text) {
        const plain = String(text || "").replace(/\n+/g, " ").trim();
        if (!plain) return null;
        try {
          const res = await fetch(`${VOICE_API_BASE}/tts`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: plain }),
          });
          if (!res.ok) return null;
          const data = await res.json().catch(() => ({}));
          return data.audio || null;
        } catch { return null; }
      }

      async function playCoco(text) {
        const audio = await fetchTtsAudio(text);
        if (audio) { const played = await playAudio(audio); if (played) return true; }
        return false;
      }

      function unlockAudioPlayback() {
        if (audioUnlocked) return;
        audioUnlocked = true;
        try {
          cocoPlayer.src = "data:audio/wav;base64," + SILENT_WAV_B64;
          cocoPlayer.volume = 0;
          cocoPlayer.currentTime = 0;
          const p = cocoPlayer.play();
          if (p?.catch) p.catch(() => {});
        } catch {}
      }

      /* ================= VOICE STATE ================= */

      function setVoiceState(state) {
        $page.classList.remove("user-listening", "coco-processing");
        if (state === "listening") $page.classList.add("user-listening");
        if (state === "processing") $page.classList.add("coco-processing");
      }

      /* ================= MODAL ================= */

      function handleNoSpeech() {
        noSpeechCount++;
        if (noSpeechCount >= NO_SPEECH_THRESHOLD) {
          noSpeechCount = 0;
          showSwitchModal();
          return;
        }
        stopListening();
        const hint = NO_SPEECH_HINTS[noSpeechCount];
        if (hint) {
          setStatus(hint, "");
          playCoco(hint).then(() => { if (!switchModalOpen) startListening(); });
        } else {
          startListening();
        }
      }

      function showSwitchModal() {
        if (!$switchModal || switchModalOpen) return;
        $switchModal.classList.add("active");
        switchModalOpen = true;
        setVoiceState("");
        stopListening();
      }

      function hideSwitchModal() {
        if (!$switchModal) return;
        $switchModal.classList.remove("active");
        switchModalOpen = false;
        noSpeechCount = 0;
      }

      /* ================= MEDIARECORDER + VAD ================= */

      function getRMS() {
        if (!analyser) return 0;
        const buf = new Float32Array(analyser.fftSize);
        analyser.getFloatTimeDomainData(buf);
        let sum = 0;
        for (let i = 0; i < buf.length; i++) sum += buf[i] * buf[i];
        return Math.sqrt(sum / buf.length);
      }

      function startListening() {
        if (!mediaStream || isProcessing || switchModalOpen) return;
        isListening = true;
        speechDetected = false;
        silenceStart = null;
        audioChunks = [];
        setVoiceState("listening");

        const mimeType = MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "audio/mp4";
        mediaRecorder = new MediaRecorder(mediaStream, { mimeType });
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
        mediaRecorder.onstop = handleRecordingStop;

        noSpeechTimer = setTimeout(() => {
          if (!speechDetected && isListening) {
            handleNoSpeech();
          }
        }, NO_SPEECH_TIMEOUT);

        vadInterval = setInterval(() => {
          if (!isListening) return;
          const rms = getRMS();
          if (rms > SPEECH_THRESHOLD) {
            $voiceIndicator.classList.add("user-speaking");
            if (!speechDetected) {
              speechDetected = true;
              speechStartTime = Date.now();
              clearTimeout(noSpeechTimer);
              mediaRecorder.start();
              setVoiceState("listening");
            }
            silenceStart = null;
          } else {
            $voiceIndicator.classList.remove("user-speaking");
            if (speechDetected && mediaRecorder.state === "recording") {
              if (!silenceStart) {
                silenceStart = Date.now();
              } else if (Date.now() - silenceStart > SILENCE_DURATION) {
                stopListening();
              }
            }
            if (speechDetected && speechStartTime && Date.now() - speechStartTime > MAX_SPEECH_DURATION) {
              stopListening();
            }
          }
        }, 50);
      }

      function stopListening() {
        isListening = false;
        clearInterval(vadInterval);
        clearTimeout(noSpeechTimer);
        $voiceIndicator.classList.remove("user-speaking");
        if (mediaRecorder && mediaRecorder.state === "recording") {
          mediaRecorder.stop();
        }
      }

      async function handleRecordingStop() {
        if (!speechDetected || audioChunks.length === 0) return;
        const duration = speechStartTime ? Date.now() - speechStartTime : 0;
        if (duration < MIN_SPEECH_DURATION) {
          $heard.textContent = "could you say that again?";
          if (!isProcessing && !switchModalOpen) startListening();
          return;
        }

        const mimeType = mediaRecorder.mimeType || "audio/webm";
        const blob = new Blob(audioChunks, { type: mimeType });
        setVoiceState("processing");

        try {
          const formData = new FormData();
          const ext = mimeType.includes("mp4") ? "mp4" : "webm";
          formData.append("audio", blob, `audio.${ext}`);
          if (STT_LANGUAGE) formData.append("language", STT_LANGUAGE);
          const currentField = REQUIRED_FIELDS.find(k => !collected[k]);
          if (currentField) formData.append("field_hint", currentField);

          const res = await fetch(`${VOICE_API_BASE}/stt`, { method: "POST", body: formData });
          const data = await res.json().catch(() => ({}));
          const transcript = (data.transcript || "").trim();

          if (transcript) {
            // Filter out single-word noise picked up from background/speaker bleed.
            // Skip filtering for yes/no fields — "you" can be a mishearing of "no".
            const currentField = REQUIRED_FIELDS.find(k => !collected[k]);
            const isYesNoField = ["drink", "smoke", "marijuana"].includes(currentField);
            const NOISE_WORDS = new Set(isYesNoField
              ? ["i", "the", "a", "an", "um", "uh", "hm", "hmm", "ah"]
              : ["you", "i", "the", "a", "an", "um", "uh", "hm", "hmm", "oh", "ah", "ok", "okay"]);
            const words = transcript.trim().split(/\s+/);
            const isNoise = words.length === 1 && NOISE_WORDS.has(words[0].toLowerCase().replace(/[.,?!]$/, ""));
            if (isNoise) {
              console.log("[STT] noise filtered:", transcript);
              $heard.textContent = "could you say that again?";
              if (!isProcessing && !switchModalOpen) startListening();
              return;
            }
            noSpeechCount = 0;
            console.log("[STT]", transcript, `(${duration}ms)`);
            $heard.textContent = transcript;
            processTranscript(transcript, duration);
          } else {
            handleNoSpeech();
          }
        } catch (e) {
          console.error("STT error", e);
          if (!switchModalOpen) startListening();
        }
      }

      /* ================= PERMISSION ================= */

      async function handlePermissionStart() {
        if (!$permissionBtn) return;
        $permissionBtn.disabled = true;
        showPermissionError("");
        unlockAudioPlayback();
        setStatus("initializing mic...", "");

        try {
          mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch (e) {
          const isDenied = e.name === "NotAllowedError" || e.name === "PermissionDeniedError";
          showPermissionError(
            isDenied
              ? "microphone access was denied. please allow mic access in your browser settings and refresh."
              : "could not access microphone. please check your device settings."
          );
          $permissionBtn.disabled = false;
          return;
        }

        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioContext.createMediaStreamSource(mediaStream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 512;
        source.connect(analyser);

        $permission?.classList.add("hidden");
        startFlow();
      }

      $permissionBtn?.addEventListener("click", handlePermissionStart);
      $permissionSkip?.addEventListener("click", () => {
        if (Object.keys(collected).length) saveToLocal("voice_collected", collected);
        navigateTo("onboarding-chat.html");
      });

      $switchKeep?.addEventListener("click", () => {
        hideSwitchModal();
        setStatus("okay, let's try again.", "");
        startListening();
      });
      $switchChat?.addEventListener("click", () => {
        if (Object.keys(collected).length) saveToLocal("voice_collected", collected);
        navigateTo("onboarding-chat.html");
      });

      /* ================= FLOW ================= */

      async function startFlow() {
        if (flowStarted) return;
        flowStarted = true;
        await conversationTurn();
      }

      async function fetchTurnData() {
        const nudgeFieldForRequest =
          nudgeField && nudgeMissCount >= 1 ? nudgeField : null;
        const nudgeRound =
          nudgeFieldForRequest ? Math.min(nudgeMissCount, 2) : null;
        const deferredForRequest = getDeferredFieldsForRequest();
        const res = await fetch(`${VOICE_API_BASE}/turn`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            history: conversationHistory.slice(-20),
            collected,
            firstName,
            nudge_field: nudgeFieldForRequest,
            nudge_round: nudgeRound,
            deferred_fields: deferredForRequest,
          }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      }

      /* ================= CONVERSATION ================= */

      async function processTranscript(transcript, durationMs) {
        if (isProcessing) return;
        if (durationMs > 1000 && transcript.length > 5) {
          speechPaceSamples.push(transcript.length / (durationMs / 1000));
        }
        $heard.textContent = transcript;
        conversationHistory.push({ role: "user", content: transcript });
        await conversationTurn();
      }

      async function conversationTurn() {
        isProcessing = true;
        stopListening();
        setVoiceState("processing");
        const prevCollectedSnapshot = { ...collected };
        const askedField = lastAskedField;

        try {
          let data;
          if (prefetchedFirstTurn) {
            data = await prefetchedFirstTurn;
            prefetchedFirstTurn = null;
            if (!data || data.error) data = await fetchTurnData();
          } else {
            if (!$msg.textContent) $msg.textContent = "...";
            data = await fetchTurnData();
          }
          if (data.error) throw new Error(data.error);

          console.log("[COCO]", data.reply);
          console.log("[collected]", JSON.stringify(data.collected), "→ total:", JSON.stringify({ ...collected, ...data.collected }));

          if (data.collected) Object.assign(collected, data.collected);
          conversationHistory.push({ role: "assistant", content: data.reply });

          if (data.is_complete) {
            $msg.textContent = data.reply;
            $heard.textContent = "";
            await playAudio(data.audio);
            if (PLAYLIST_NOTICE_LINES.length) {
              for (const line of PLAYLIST_NOTICE_LINES) {
                setStatus(line, "");
                await playCoco(line);
              }
            }
            lastAskedField = null;
            nudgeField = null;
            nudgeMissCount = 0;
            await finish();
            return;
          }

          if (askedField) {
            const hadBefore = Boolean(prevCollectedSnapshot[askedField]);
            const hasNow = Boolean(collected[askedField]);

            if (hadBefore || hasNow) {
              fieldFailCounts[askedField] = 0;
              nudgeField = null;
              nudgeMissCount = 0;
              deferredFields.delete(askedField);
            } else {
              const prevFails = fieldFailCounts[askedField] || 0;
              const newFails = prevFails + 1;
              fieldFailCounts[askedField] = newFails;

              if (!fieldDeferredOnce[askedField]) {
                if (newFails >= 2) {
                  deferredFields.add(askedField);
                  fieldDeferredOnce[askedField] = true;
                  fieldFailCounts[askedField] = 0;
                  nudgeField = null;
                  nudgeMissCount = 0;
                } else {
                  nudgeField = askedField;
                  nudgeMissCount = newFails;
                }
              } else {
                if (newFails >= 2) {
                  fallbackToChat();
                  return;
                }
                nudgeField = askedField;
                nudgeMissCount = newFails;
              }
            }
          }

          lastAskedField = data.target_field || getNextTargetField();

          $msg.textContent = data.reply;
          $heard.textContent = "";
          await playAudio(data.audio);

          isProcessing = false;
          startListening();
        } catch (e) {
          console.error("turn error:", e);
          // 에러 난 턴의 user 메시지를 history에서 제거해 다음 턴 맥락 오염 방지
          if (conversationHistory.length && conversationHistory[conversationHistory.length - 1].role === "user") {
            conversationHistory.pop();
          }
          isProcessing = false;
          startListening();
        }
      }

      async function fallbackToChat() {
        setVoiceState("");
        stopListening();
        const msg = "seems like voice isn't quite working — let's finish this in chat.";
        setStatus(msg, "");
        saveToLocal("voice_collected", collected);
        await playCoco(msg);
        navigateTo("onboarding-chat.html");
      }

      /* ================= BIO ================= */

      async function generateBio() {
        if (!conversationHistory.length) return "";
        try {
          const res = await fetch(`${VOICE_API_BASE}/bio`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ history: conversationHistory }),
          });
          if (!res.ok) return "";
          const d = await res.json();
          return d.bio || "";
        } catch { return ""; }
      }

      /* ================= FINISH ================= */

      async function finish() {
        showLoading();
        try {
          const bio = await generateBio();
          const speech_pace =
            speechPaceSamples.length >= 2
              ? speechPaceSamples.reduce((a, b) => a + b) / speechPaceSamples.length
              : null;

          // convert conversationHistory to {question, said} format for embedding
          const transcripts = [];
          for (let i = 0; i < conversationHistory.length; i++) {
            const msg = conversationHistory[i];
            if (msg.role === "user" && msg.content) {
              const prev = conversationHistory[i - 1];
              transcripts.push({
                question: (prev?.role === "assistant" ? prev.content : "") || "",
                said: msg.content,
              });
            }
          }

          await apiCall("/onboarding/save", "POST", {
            user_id: userId,
            profile: collected,
            firstName,
            lastName,
            age,
            birthdate,
            phone,
            transcripts,
            ...(bio ? { bio } : {}),
            ...(speech_pace !== null ? { speech_pace } : {}),
          });
          saveToLocal("onboarding_completed", true);
          saveToLocal("just_completed_onboarding", true);
          hideLoading();
          navigateTo("playlist.html");
        } catch (error) {
          console.error("Failed to save onboarding:", error);
          hideLoading();
          setStatus("failed to save profile.\nplease try again.", "");
        }
      }

      /* ================= START ================= */

      setStatus(
        "please enable mic and audio to continue.",
        "permission is required before we can start",
      );
    </script>
  </body>
</html>
