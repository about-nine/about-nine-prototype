<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Profile</title>
    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="js/firebase.js"></script>

    <style>
      .card {
        margin-bottom: 12px;
        flex-direction: column;
        align-items: stretch;
      }

      .card.clickable { cursor: pointer; }
      .card.clickable:hover { background: #2f2f2f; }

      .profile-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .profile-value.editable {
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 6px;
        transition: background 0.2s;
      }

      .profile-value.editable:hover { background: var(--bg-card); }

      .section-title {
        font-size: 14px;
        color: var(--text-secondary);
        margin-bottom: 8px;
        padding-left: 4px;
      }

      .card textarea {
        width: 100%;
        min-height: 80px;
        background: transparent;
        border: none;
        color: var(--text-primary);
        font-size: 12px;
        font-family: "Merriweather", serif;
        resize: vertical;
        padding: 0;
        margin: 0;
      }

      .card textarea:focus { outline: none; }
      .card textarea::placeholder { color: var(--text-secondary); opacity: 0.5; }

      .age-slider-track::before { background: var(--border-color); }

      .playlist-chips-container {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        min-height: 50px;
        align-items: center;
        justify-content: center;
      }

      .playlist-empty-state {
        color: var(--text-secondary);
        font-size: 12px;
        text-align: center;
        width: 100%;
      }

      .action-btn.sign-out { color: var(--text-primary); }
      .action-btn.delete   { color: var(--error-red); }
      .action-btn:hover    { opacity: 0.7; transform: none; box-shadow: none; }

      .saving-indicator {
        position: fixed;
        top: 20px;
        right: 20px;
        background: var(--success-green);
        color: white;
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 13px;
        opacity: 0;
        transition: opacity 0.3s;
        z-index: 1000;
      }

      .saving-indicator.show { opacity: 1; }
    </style>
  </head>

  <body>
    <div class="saving-indicator" id="savingIndicator">saved ✓</div>

    <div class="main-container">
      <div class="chat-header brand-text" style="text-align:left;color:#8e8e8e">
        about nine
      </div>

      <div class="tabs">
        <button id="aboutTab" class="tab active">about you</button>
        <button id="recommendationTab" class="tab">recommendation</button>
      </div>

      <div class="content">
        <!-- About You 탭 -->
        <div id="aboutContent" class="tab-pane active">
          <div class="card">
            <div class="profile-row">
              <span class="profile-label">first name</span>
              <input
                type="text"
                id="firstNameInput"
                class="profile-input"
                placeholder="enter first name"
                autocomplete="given-name"
              />
            </div>
            <div class="profile-row">
              <span class="profile-label">last name</span>
              <input
                type="text"
                id="lastNameInput"
                class="profile-input"
                placeholder="enter last name"
                autocomplete="family-name"
              />
            </div>
            <div class="profile-row">
              <span class="profile-label">age</span>
              <input
                type="number"
                id="ageInput"
                class="profile-input"
                min="18"
                max="99"
                placeholder="--"
              />
            </div>
            <div class="profile-row">
              <span class="profile-label">gender</span>
              <select class="profile-select" id="genderSelect">
                <option value="">select</option>
                <option value="woman">woman</option>
                <option value="man">man</option>
                <option value="non-binary">non-binary</option>
              </select>
            </div>
            <div class="profile-row">
              <span class="profile-label">gender detail</span>
              <select class="profile-select" id="genderDetailSelect" disabled>
                <option value="">select</option>
              </select>
            </div>
          </div>

          <div class="section-title">playlist</div>
          <div class="card clickable" onclick="editPlaylist()">
            <div id="playlistChips" class="playlist-chips-container"></div>
          </div>

          <div class="card">
            <div class="profile-row">
              <span class="profile-label">drinking</span>
              <select class="profile-select" id="drinkSelect" onchange="updateField('drink', this.value)">
                <option value="yes">yes</option>
                <option value="no">no</option>
              </select>
            </div>
            <div class="profile-row">
              <span class="profile-label">smoking</span>
              <select class="profile-select" id="smokeSelect" onchange="updateField('smoke', this.value)">
                <option value="yes">yes</option>
                <option value="no">no</option>
              </select>
            </div>
            <div class="profile-row">
              <span class="profile-label">marijuana</span>
              <select class="profile-select" id="marijuanaSelect" onchange="updateField('marijuana', this.value)">
                <option value="yes">yes</option>
                <option value="no">no</option>
              </select>
            </div>
          </div>

          <div class="section-title">additional information</div>
          <div class="card">
            <textarea id="bioText" placeholder="tell us more about yourself..."></textarea>
          </div>

          <div class="section-title">contact</div>
          <div class="card">
            <div style="color:var(--text-primary);font-size:14px" id="phoneValue">-</div>
          </div>

          <button id="saveButton1" onclick="saveProfile()" style="margin:8px 0 20px 0">save</button>
          <div class="bottom-text sign-out" onclick="signOut()">sign out</div>
          <div class="bottom-text delete" onclick="deleteAccount()">delete account</div>
        </div>

        <!-- Recommendation 탭 -->
        <div id="recommendationContent" class="tab-pane">
          <div class="card">
            <div class="profile-row">
              <span class="profile-label">who i want to meet</span>
              <select class="profile-select" id="orientationSelect" onchange="updateField('sexual_orientation', this.value)">
                <option value="men">men</option>
                <option value="women">women</option>
                <option value="men and women">men and women</option>
                <option value="men and non-binary people">men and non-binary people</option>
                <option value="women and non-binary people">women and non-binary people</option>
                <option value="all types of genders">all types of genders</option>
              </select>
            </div>
          </div>

          <div class="section-title">age range</div>
          <div class="card">
            <div class="age-range-box active">
              <span class="age-value" id="minAgeDisplay">20</span>
              <div class="age-slider-container">
                <div class="age-slider-track">
                  <div class="age-slider-fill" id="sliderFill"></div>
                  <input type="range" id="minAgeSlider" min="20" max="60" value="20" />
                  <input type="range" id="maxAgeSlider" min="20" max="60" value="60" />
                </div>
              </div>
              <span class="age-value" id="maxAgeDisplay">60</span>
            </div>
          </div>

          <button id="saveButton2" onclick="saveProfile()" style="margin-top:8px">save</button>
        </div>
      </div>
    </div>

    <nav id="bottomNav" class="bottom-nav"></nav>

    <script src="js/common.js"></script>

    <script>
      let userId = null;
      let profileData = null;
      let hasChanges = false;

      const genderDetailOptions = {
        woman: [
          "cis woman",
          "trans woman",
          "intersex woman",
          "transfeminine",
          "woman and non-binary",
        ],
        man: [
          "cis man",
          "trans man",
          "intersex man",
          "transmasculine",
          "man and non-binary",
        ],
        "non-binary": [
          "agender",
          "bigender",
          "genderfluid",
          "genderqueer",
          "gender nonconforming",
          "gender questioning",
          "gender variant",
          "intersex",
          "neutrois",
          "non-binary man",
          "non-binary woman",
          "pangender",
          "polygender",
          "transgender",
          "two-spirit"
        ],
      };

      const firstNameInput     = document.getElementById("firstNameInput");
      const lastNameInput      = document.getElementById("lastNameInput");
      const ageInput           = document.getElementById("ageInput");
      const genderSelect       = document.getElementById("genderSelect");
      const genderDetailSelect = document.getElementById("genderDetailSelect");

      function refreshGenderDetailOptions(gender, selectedDetail) {
        const options = genderDetailOptions[gender] || [];
        const placeholder = '<option value="">select</option>';
        genderDetailSelect.innerHTML = placeholder + options.map((opt) => `<option value="${opt}">${opt}</option>`).join("");
        const hasOptions = options.length > 0;
        genderDetailSelect.disabled = !hasOptions;
        if (hasOptions && selectedDetail && options.includes(selectedDetail)) {
          genderDetailSelect.value = selectedDetail;
        } else {
          genderDetailSelect.value = "";
        }
      }

      function handleNameChange(key, value) {
        if (!profileData) return;
        profileData[key] = value;
        markChanged();
      }

      firstNameInput.addEventListener("input", (e) => handleNameChange("first_name", e.target.value));
      lastNameInput.addEventListener("input", (e) => handleNameChange("last_name", e.target.value));

      ageInput.addEventListener("input", (e) => {
        if (!profileData) return;
        const val = parseInt(e.target.value, 10);
        if (Number.isNaN(val)) {
          profileData.age = null;
        } else {
          profileData.age = val;
        }
        markChanged();
      });

      ageInput.addEventListener("blur", (e) => {
        if (!profileData) return;
        if (profileData.age === null || profileData.age === undefined || profileData.age === "") {
          ageInput.value = "";
          return;
        }
        const normalized = Math.max(18, Math.min(99, Number(profileData.age) || 0));
        profileData.age = normalized;
        ageInput.value = normalized;
      });

      genderSelect.addEventListener("change", (e) => {
        if (!profileData) return;
        const value = e.target.value;
        profileData.gender = value;

        const validDetails = genderDetailOptions[value] || [];
        if (!validDetails.includes(profileData.gender_detail)) {
          profileData.gender_detail = "";
        }
        refreshGenderDetailOptions(value, profileData.gender_detail);
        markChanged();
      });

      genderDetailSelect.addEventListener("change", (e) => {
        if (!profileData) return;
        const value = e.target.value;
        profileData.gender_detail = value;
        markChanged();
      });

      /* ── 탭 전환 ─────────────────────────────────────── */

      const aboutTab          = document.getElementById("aboutTab");
      const recommendationTab = document.getElementById("recommendationTab");
      const aboutContent      = document.getElementById("aboutContent");
      const recommendationContent = document.getElementById("recommendationContent");

      aboutTab.onclick = () => {
        aboutTab.classList.add("active");
        recommendationTab.classList.remove("active");
        aboutContent.classList.add("active");
        recommendationContent.classList.remove("active");
      };

      recommendationTab.onclick = () => {
        recommendationTab.classList.add("active");
        aboutTab.classList.remove("active");
        recommendationContent.classList.add("active");
        aboutContent.classList.remove("active");
      };

      /* ── 프로필 로드 ─────────────────────────────────── */

      async function loadProfile() {
        const initialLoadingText = consumePendingLoadingText() || "loading profile...";
        showLoading(initialLoadingText);
        try {
          userId = getFromLocal("user_id");
          if (!userId) { navigateTo("index.html"); return; }
          const res = await apiCall("/users/profile");

          if (!res.success) {
            hideLoading();
            alert("profile not found");
            navigateTo("index.html");
            return;
          }

          profileData = res.user;
          hideLoading();
          updateUI();
        } catch (error) {
          hideLoading();
          console.error("Failed to load profile:", error);
          alert("failed to load profile");
          navigateTo("lounge.html");
        }
      }

      /* ── UI 업데이트 ─────────────────────────────────── */

      function normalizeLower(value) {
        return typeof value === "string" ? value.trim().toLowerCase() : "";
      }

      function updateUI() {
        firstNameInput.value = profileData.first_name || "";
        lastNameInput.value  = profileData.last_name  || "";
        ageInput.value       = profileData.age ?? "";
        document.getElementById("phoneValue").textContent = profileData.phone || "-";

        const currentGender = normalizeLower(profileData.gender || "");
        profileData.gender = currentGender;
        genderSelect.value = currentGender || "";

        const currentGenderDetail = normalizeLower(
          profileData.gender_detail || "",
        );
        profileData.gender_detail = currentGenderDetail;
        if (currentGender) {
          refreshGenderDetailOptions(currentGender, currentGenderDetail);
        } else {
          genderDetailSelect.innerHTML = '<option value="">select</option>';
          genderDetailSelect.value = "";
          genderDetailSelect.disabled = true;
        }

        document.getElementById("drinkSelect").value     = profileData.drink    || "no";
        document.getElementById("smokeSelect").value     = profileData.smoke    || "no";
        document.getElementById("marijuanaSelect").value = profileData.marijuana || "no";
        document.getElementById("bioText").value         = profileData.bio  || "";

        renderPlaylistChips();

        const currentOrientation = normalizeLower(
          profileData.sexual_orientation || "all types of genders",
        );
        profileData.sexual_orientation = currentOrientation;
        document.getElementById("orientationSelect").value = currentOrientation;

        const agePref = profileData.age_preference || { min: 20, max: 60 };
        document.getElementById("minAgeSlider").value = agePref.min;
        document.getElementById("maxAgeSlider").value = agePref.max;
        updateSlider();

        hasChanges = false;
        updateSaveButton();
      }

      /* ── 플레이리스트 칩 ─────────────────────────────── */

      function renderPlaylistChips() {
        const container = document.getElementById("playlistChips");
        const playlist = profileData.playlist || [];

        container.innerHTML = playlist.length
          ? playlist.map((track) => `
              <div class="track-chip">
                <span class="track-chip-text">${track.name} - ${track.artist}</span>
              </div>
            `).join("")
          : '<div class="playlist-empty-state">tap to select songs</div>';
      }

      function editPlaylist() {
        saveToLocal("selected_tracks", profileData.playlist || []);
        navigateTo("playlist.html");
      }

      /* ── 필드 업데이트 ───────────────────────────────── */

      function updateField(field, value) {
        profileData[field] = value;
        markChanged();
      }

      function markChanged() {
        hasChanges = true;
        updateSaveButton();
      }

      function updateSaveButton() {
        const label = hasChanges ? "save" : "no changes";
        ["saveButton1", "saveButton2"].forEach((id) => {
          const btn = document.getElementById(id);
          btn.disabled = !hasChanges;
          btn.textContent = label;
        });
      }

      /* ── 슬라이더 ────────────────────────────────────── */

      const minSlider  = document.getElementById("minAgeSlider");
      const maxSlider  = document.getElementById("maxAgeSlider");
      const sliderFill = document.getElementById("sliderFill");
      const minDisplay = document.getElementById("minAgeDisplay");
      const maxDisplay = document.getElementById("maxAgeDisplay");

      function updateSlider() {
        let min = parseInt(minSlider.value);
        let max = parseInt(maxSlider.value);
        if (min > max) { [min, max] = [max, min]; minSlider.value = min; maxSlider.value = max; }

        const minPct = ((min - 20) / 40) * 100;
        const maxPct = ((max - 20) / 40) * 100;
        sliderFill.style.left  = minPct + "%";
        sliderFill.style.width = maxPct - minPct + "%";
        minDisplay.textContent = min;
        maxDisplay.textContent = max;
      }

      /* minSlider / maxSlider: 동일한 핸들러 공유 */
      function onSliderInput() {
        updateSlider();
        profileData.age_preference = {
          min: parseInt(minSlider.value),
          max: parseInt(maxSlider.value),
        };
        markChanged();
      }

      minSlider.oninput = onSliderInput;
      maxSlider.oninput = onSliderInput;

      /* ── Bio ─────────────────────────────────────────── */

      document.getElementById("bioText").addEventListener("input", (e) => {
        if (!profileData) return;
        profileData.bio = e.target.value;
        markChanged();
      });

      /* ── 저장 ────────────────────────────────────────── */

      async function saveProfile() {
        if (!hasChanges) return;
        try {
          showLoading("saving...");
          const payload = {
            bio: profileData.bio || "",
          };

          const directFields = {
            first_name: profileData.first_name,
            last_name: profileData.last_name,
            gender: profileData.gender,
            gender_detail: profileData.gender_detail,
            sexual_orientation: profileData.sexual_orientation,
            drink: profileData.drink,
            smoke: profileData.smoke,
            marijuana: profileData.marijuana,
          };

          Object.entries(directFields).forEach(([key, value]) => {
            if (value !== undefined) payload[key] = value;
          });

          if (profileData.age_preference) {
            payload.age_preference = profileData.age_preference;
          }

          if (profileData.age !== undefined && profileData.age !== null && profileData.age !== "") {
            payload.age = Number(profileData.age);
          }

          const res = await apiCall("/users/profile", "POST", payload);
          hideLoading();

          if (res.success) {
            showSaveIndicator();
            hasChanges = false;
            updateSaveButton();
          } else {
            alert("failed to save profile");
          }
        } catch (error) {
          hideLoading();
          console.error("Failed to save profile:", error);
          alert("failed to save profile");
        }
      }

      function showSaveIndicator() {
        const indicator = document.getElementById("savingIndicator");
        indicator.classList.add("show");
        setTimeout(() => indicator.classList.remove("show"), 2000);
      }

      /* ── 계정 액션 ───────────────────────────────────── */

      async function signOut() {
        if (!confirm("are you sure you want to sign out?")) return;
        try { if (typeof firebaseLogout === "function") await firebaseLogout(); } catch {}
        apiCall("/auth/logout", "POST").catch(() => {});
        try { localStorage.clear(); } catch {}
        navigateTo("index.html");
      }

      function deleteAccount() {
        if (!confirm("are you sure you want to delete your account? this can't be undone.")) return;
        (async () => {
          try {
            showLoading("deleting account...");
            await apiCall("/users/delete", "POST");
            hideLoading();
          } catch (error) {
            hideLoading();
            console.error("Account delete failed:", error);
            alert("failed to delete account");
            return;
          }
          try { if (typeof firebaseLogout === "function") await firebaseLogout(); } catch {}
          try { localStorage.clear(); } catch {}
          navigateTo("index.html");
        })();
      }

      /* ── Init ────────────────────────────────────────── */

      window.onload = () => {
        renderBottomNav("profile");
        loadProfile();
      };
    </script>
  </body>
</html>
