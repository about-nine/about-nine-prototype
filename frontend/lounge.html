<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About Nine</title>

    <link rel="stylesheet" href="css/style.css" />

    <!-- firebase -->
    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/presence.js"></script>

    <style>
      .user-card-wrapper {
        position: relative;
      }

      .user-card-wrapper.offline {
        opacity: 0.6;
      }

      .user-card-button {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        width: auto;
        padding: 8px 20px;
        font-size: 14px;
      }

      .subtitle-text {
        text-align: center;
        color: var(--text-secondary);
        font-size: 14px;
        font-weight: 400;
      }

      /* 빈 상태 박스 */
      .empty-state-box {
        background: var(--bg-card);
        border-radius: 16px;
        border: 1px solid var(--border-color);
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 260px);
      }

      .empty-state-box img {
        width: 48px;
        height: 48px;
        margin-bottom: 24px;
        opacity: 0.9;
      }

      .empty-state-box .message {
        font-size: 16px;
        line-height: 1.6;
        color: var(--text-primary);
        max-width: 300px;
        text-align: center;
      }

      /* ================= 🎨 그라데이션 무드 플레이어 ================= */

      .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.92);
        align-items: center;
        justify-content: center;
        z-index: 10000;
        font-family: "Merriweather", serif;
        backdrop-filter: blur(12px);
      }

      .modal.active {
        display: flex;
      }

      .modal-content {
        position: relative;
        width: 94%;
        max-width: 440px;
        max-height: 88vh;
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      }

      /* 🌊 그라데이션 배경 (전체 플레이리스트 무드) */
      .playlist-mood-gradient {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          var(--mood-c1, #667eea) 0%,
          var(--mood-c2, #764ba2) 50%,
          var(--mood-c3, #f093fb) 100%
        );
        animation: moodFlow 20s ease-in-out infinite alternate;
      }

      @keyframes moodFlow {
        0% {
          transform: scale(1) rotate(0deg);
        }
        100% {
          transform: scale(1.1) rotate(2deg);
        }
      }

      /* 오버레이 컨테이너 */
      .playlist-overlay {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        height: 100%;
        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.3) 0%,
          rgba(0, 0, 0, 0.5) 20%,
          rgba(0, 0, 0, 0.7) 100%
        );
      }

      /* 헤더 */
      .modal-header {
        padding: 32px 24px 20px;
        backdrop-filter: blur(8px);
        background: rgba(0, 0, 0, 0.2);
      }

      .modal-title {
        font-size: 22px;
        font-weight: 600;
        color: white;
        margin-bottom: 6px;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      .modal-subtitle {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.7);
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
      }

      /* 트랙 리스트 */
      .track-list-container {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
      }

      .track-item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 16px;
        margin-bottom: 4px;
        border-radius: 14px;
        cursor: pointer;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        background: rgba(0, 0, 0, 0.25);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .track-item:hover {
        background: rgba(255, 255, 255, 0.15);
        transform: translateX(4px);
        border-color: rgba(255, 255, 255, 0.25);
      }

      .track-item.playing {
        background: rgba(255, 255, 255, 0.25);
        border-color: rgba(255, 255, 255, 0.4);
        box-shadow: 0 4px 16px rgba(255, 255, 255, 0.2);
      }

      .track-number {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        color: white;
        font-weight: 600;
        flex-shrink: 0;
        transition: all 0.3s;
      }

      .track-item.playing .track-number {
        background: white;
        color: #000;
      }

      .track-info {
        flex: 1;
        min-width: 0;
      }

      .track-name {
        font-size: 15px;
        font-weight: 500;
        color: white;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 3px;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
      }

      .track-artist {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.7);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
      }

      .track-duration {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.5);
        flex-shrink: 0;
        font-weight: 500;
      }

      /* Play indicator */
      .play-indicator {
        width: 18px;
        height: 18px;
        display: none;
        align-items: center;
        justify-content: center;
        gap: 2px;
        flex-shrink: 0;
      }

      .track-item.playing .play-indicator {
        display: flex;
      }

      .play-indicator span {
        width: 3px;
        background: white;
        border-radius: 2px;
        animation: playAnimation 0.7s ease-in-out infinite;
        box-shadow: 0 0 4px rgba(255, 255, 255, 0.5);
      }

      .play-indicator span:nth-child(1) {
        height: 10px;
        animation-delay: 0s;
      }

      .play-indicator span:nth-child(2) {
        height: 16px;
        animation-delay: 0.15s;
      }

      .play-indicator span:nth-child(3) {
        height: 8px;
        animation-delay: 0.3s;
      }

      @keyframes playAnimation {
        0%,
        100% {
          transform: scaleY(1);
        }
        50% {
          transform: scaleY(0.4);
        }
      }

      /* 하단 컨트롤 */
      .modal-footer {
        padding: 20px 24px;
        backdrop-filter: blur(12px);
        background: rgba(0, 0, 0, 0.4);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }

      /* 🎵 Spotify Embed iframe (모든 브라우저 공통) */
      #spotifyEmbedContainer {
        width: 100%;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      #spotifyEmbed {
        width: 100%;
        height: 152px;
        border: none;
        display: block;
      }

      .playback-status {
        text-align: center;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.8);
        margin-bottom: 14px;
        min-height: 20px;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
      }

      .spotify-connect {
        width: 100%;
        padding: 14px;
        border-radius: 14px;
        background: linear-gradient(135deg, #1db954, #1ed760);
        color: white;
        border: none;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 4px 12px rgba(29, 185, 84, 0.3);
      }

      .spotify-connect:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(29, 185, 84, 0.4);
      }

      .spotify-connect:active {
        transform: translateY(0);
      }

      /* 로딩 상태 */
      .loading-playlist {
        padding: 60px 20px;
        text-align: center;
      }

      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 255, 255, 0.2);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 16px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loading-text {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.7);
      }

      .empty-playlist {
        padding: 60px 20px;
        text-align: center;
      }

      .empty-playlist-icon {
        font-size: 54px;
        margin-bottom: 16px;
        opacity: 0.4;
      }

      .empty-playlist-text {
        font-size: 15px;
        color: rgba(255, 255, 255, 0.6);
      }

      /* 스크롤바 스타일링 */
      .track-list-container::-webkit-scrollbar {
        width: 6px;
      }

      .track-list-container::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.2);
        border-radius: 3px;
      }

      .track-list-container::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.3);
        border-radius: 3px;
      }

      .track-list-container::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.5);
      }

      @media (max-width: 420px) {
        .modal-content {
          width: 96%;
          max-height: 92vh;
        }

        .modal-header {
          padding: 28px 20px 16px;
        }

        .modal-title {
          font-size: 20px;
        }

        .track-item {
          padding: 12px 14px;
          gap: 12px;
        }

        .track-name {
          font-size: 14px;
        }

        .track-artist {
          font-size: 12px;
        }
      }
    </style>
  </head>

  <body>
    <div class="main-container">
      <div
        class="chat-header brand-text"
        style="text-align: left; color: #8e8e8e"
      >
        about nine
      </div>

      <div class="tabs">
        <button id="loungeTab" class="tab active">lounge</button>
        <button id="aiTab" class="tab">ai match</button>
      </div>

      <div class="content">
        <!-- lounge -->
        <div id="loungeContent">
          <div id="userList" class="card-list"></div>
        </div>

        <!-- ai -->
        <div id="aiContent" style="display: none">
          <div id="aiUserList" class="card-list"></div>
        </div>
      </div>
    </div>

    <!-- 하단 네비게이션 -->
    <nav id="bottomNav" class="bottom-nav"></nav>

    <!-- 🎵 새로운 Spotify 모달 -->
    <div class="modal" id="playlistModal">
      <div class="modal-content">
        <!-- 🌊 플레이리스트 전체 무드 그라데이션 -->
        <div class="playlist-mood-gradient"></div>

        <!-- 오버레이 컨텐츠 -->
        <div class="playlist-overlay">
          <!-- 헤더 -->
          <div class="modal-header">
            <div class="modal-title" id="playlistTitle">loading...</div>
            <div class="modal-subtitle">
              <span id="trackCount">0</span> tracks
            </div>
          </div>

          <!-- 트랙 리스트 -->
          <div class="track-list-container" id="trackListContainer">
            <div class="loading-playlist">
              <div class="loading-spinner"></div>
              <div class="loading-text">loading playlist...</div>
            </div>
          </div>

          <!-- 하단 컨트롤 (Spotify iframe 표시) -->
          <div class="modal-footer">
            <div class="playback-status" id="playbackStatus">
              tap any track to play
            </div>
            <!-- Spotify Embed iframe -->
            <div id="spotifyEmbedContainer" style="display: none">
              <iframe
                id="spotifyEmbed"
                frameborder="0"
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                loading="eager"
              ></iframe>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="js/common.js"></script>

    <script type="module">
      import { rtdb, ref, onValue, set, push } from "/js/firebase.js";

      const userId = getFromLocal("user_id");
      if (!userId) {
        navigateTo("index.html");
      }

      let users = [];
      let aiUsers = [];
      let selectedUser = null;
      let presenceData = {};
      let currentUserProfile = null;

      let playlistTracks = [];
      let currentPlayingIndex = -1;
      let spotifyTimer = null;

      const spotifyLoginUrl = `/api/spotify/login?next=${encodeURIComponent(
        window.location.pathname,
      )}`;

      /* ====================== 주제 설정 ====================== */

      const TOPICS = {
        1: {
          name: "food",
          question: "let's see if you two vibe when it comes to food",
        },
        2: {
          name: "visual",
          question: "let's see if you two vibe when it comes to visual taste",
        },
        3: {
          name: "life",
          question: "feel free to be open about your expectations for life",
        },
      };

      /* ====================== 탭 ====================== */

      const loungeTab = document.getElementById("loungeTab");
      const aiTab = document.getElementById("aiTab");
      const loungeContent = document.getElementById("loungeContent");
      const aiContent = document.getElementById("aiContent");

      loungeTab.onclick = () => switchTab("lounge");
      aiTab.onclick = () => switchTab("ai");

      function switchTab(tab) {
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.remove("active"));

        if (tab === "lounge") {
          loungeTab.classList.add("active");
          loungeContent.style.display = "block";
          aiContent.style.display = "none";
          return;
        }

        aiTab.classList.add("active");
        loungeContent.style.display = "none";
        aiContent.style.display = "block";

        if (!isAIMatchTime()) {
          document.getElementById("aiUserList").innerHTML = `
      <div class="empty-state-box">
        <img src="images/asterisk.png" alt="asterisk">
        <div class="message">the matching begins at 8 p.m.<br>and closes at 2 a.m.</div>
      </div>
    `;
          return;
        }

        if (!aiUsers.length) buildAIMatch();
      }

      function isAIMatchTime() {
        const h = new Date().getHours();
        return h >= 20 || h < 2;
      }

      /* ====================== 위치 업데이트 ====================== */

      async function updateLocation() {
        const stored = getFromLocal("location");
        if (stored && stored.lat && stored.lng) {
          try {
            await apiCall("/users/update-location", "POST", {
              lat: stored.lat,
              lng: stored.lng,
            });
          } catch (error) {
            console.error("Failed to update location:", error);
          }
          return;
        }
      }

      /* ====================== 유저 불러오기 ====================== */

      async function loadUsers() {
        console.log("🔍 Loading users...");
        try {
          const res = await apiCall("/users/list");
          users = res.users || [];
          renderUsers(users, "userList", "lounge");
        } catch (error) {
          console.error("Failed to load users:", error);
          users = [];
          renderUsers(users, "userList", "lounge");
        }
      }

      /* ====================== AI 추천 ====================== */

      async function buildAIMatch() {
        try {
          const res = await apiCall("/match/recommend");
          const list = Array.isArray(res)
            ? res
            : Array.isArray(res?.users)
              ? res.users
              : Object.values(res?.users || {});
          aiUsers = list.slice(0, 5);
          renderUsers(aiUsers, "aiUserList", "ai");
        } catch (error) {
          console.error("Failed to load ai match:", error);
          aiUsers = [];
          renderUsers(aiUsers, "aiUserList", "ai");
        }
      }

      /* ====================== 온라인 상태 확인 ====================== */

      function getUserId(u) {
        return u?.id || u?.user_id || u?.uid || u?.userId || null;
      }

      const PRESENCE_TTL_MS = 90000;

      function isOnline(userId) {
        if (!userId) return false;
        const presence = presenceData[userId];
        if (!presence || presence.online !== true) return false;
        const updatedAt = Number(presence.updated_at || 0);
        if (!updatedAt) return false;
        return Date.now() - updatedAt <= PRESENCE_TTL_MS;
      }

      /* ====================== 렌더 ====================== */

      function renderUsers(list, containerId, mode = "lounge") {
        const el = document.getElementById(containerId);

        if (!list.length) {
          el.innerHTML = `
      <div class="empty-state-box">
        <img src="images/asterisk.png" alt="asterisk">
        <div class="message">no one nearby right now.<br>check back soon!</div>
      </div>
    `;
          return;
        }

        const isAi = mode === "ai";
        const subtitleText = isAi
          ? "our recommended matches"
          : "pick whoever feels right";

        const sortedList = [...list].sort((a, b) => {
          const aOnline = isOnline(getUserId(a));
          const bOnline = isOnline(getUserId(b));
          if (aOnline && !bOnline) return -1;
          if (!aOnline && bOnline) return 1;
          return 0;
        });

        const cardsHtml = sortedList
          .map((u) => {
            const uid = getUserId(u);
            const online = isOnline(uid);

            return `
      <div class="user-card-wrapper ${online ? "" : "offline"}">
        <div 
          class="card"
          ${!isAi ? `data-id="${uid}" style="cursor:pointer; padding-right:120px;"` : `style="padding-right:120px;"`}
        >
          <div style="flex:1;">
            <div style="display:flex;align-items:center;gap:6px;">
              <span style="font-size:16px;font-weight:600;">
                ${u.first_name || u.firstName} ${u.last_name || u.lastName}
              </span>
              <span class="status-dot ${online ? "online" : "offline"}"></span>
            </div>

            ${
              !isAi
                ? `<div style="font-size:12px;color:var(--text-secondary);margin-top:2px;">
                     check out ${u.first_name || u.firstName}'s playlist
                   </div>`
                : ""
            }
          </div>
        </div>

        <button class="primary user-card-button" data-user-id="${uid}" ${
          online ? "" : "disabled"
        }>
          start talk
        </button>
      </div>
    `;
          })
          .join("");

        el.innerHTML = `
    <div class="subtitle-text">${subtitleText}</div>
    ${cardsHtml}
  `;

        if (!isAi) {
          el.querySelectorAll(".card").forEach((card) => {
            card.onclick = (e) => {
              const id = card.dataset.id;
              const user = sortedList.find((x) => getUserId(x) === id);
              openPlaylist(user);
            };
          });
        }

        el.querySelectorAll(".user-card-button").forEach((btn) => {
          btn.onclick = async (e) => {
            const id = btn.dataset.userId;
            const user = sortedList.find((x) => getUserId(x) === id);
            await startMatchRequest(user);
          };
        });
      }

      /* ====================== 매칭 요청 시작 ====================== */

      async function startMatchRequest(partner) {
        saveToLocal("chat_partner", partner);

        try {
          showLoading("preparing...");

          const roundRes = await apiCall("/talks/calculate-round", "POST", {
            partner_id: getUserId(partner),
          });

          hideLoading();

          if (!roundRes.success) {
            alert("failed to calculate round");
            return;
          }

          const round = roundRes.round;
          const topic = roundRes.topic;
          const question = roundRes.question;
          const options = roundRes.options;

          console.log(`🎯 Backend calculated - Round ${round}: ${topic}`);

          const requestsRef = ref(rtdb, "match_requests");
          const newRequestRef = push(requestsRef);
          const requestId = newRequestRef.key;
          saveToLocal("match_request_id", requestId);

          const initiatorProfile = currentUserProfile || {
            id: userId,
            first_name: getFromLocal("firstName"),
            last_name: getFromLocal("lastName"),
            age: getFromLocal("age"),
            gender: getFromLocal("gender"),
          };

          const matchData = {
            initiator: userId,
            receiver: getUserId(partner),
            status: "waiting",
            round: round,
            topic: topic,
            timestamp: Date.now(),
            initiator_profile: initiatorProfile,
          };

          if (question) {
            matchData.question = question;
          }
          if (options) {
            matchData.options = options;
          }

          await set(newRequestRef, matchData);

          navigateTo(`waiting.html?mode=initiator&requestId=${requestId}`);
        } catch (error) {
          hideLoading();
          console.error("Failed to start match request:", error);
          alert("failed to start match request");
        }
      }

      /* ====================== 매칭 요청 리스닝 ====================== */

      function listenMatchRequests() {
        const requestsRef = ref(rtdb, "match_requests");

        onValue(requestsRef, (snapshot) => {
          const requests = snapshot.val();
          if (!requests) return;

          for (const [requestId, request] of Object.entries(requests)) {
            if (request.receiver === userId && request.status === "waiting") {
              const initiator = users.find((u) => u.id === request.initiator);
              if (initiator) {
                saveToLocal("chat_partner", initiator);
                navigateTo(`waiting.html?mode=receiver&requestId=${requestId}`);
              }
              break;
            }
          }
        });
      }

      /* ====================== presence 리스닝 ====================== */

      function listenPresence() {
        onValue(ref(rtdb, "presence"), (snap) => {
          presenceData = snap.val() || {};

          const currentTab = loungeTab.classList.contains("active")
            ? "lounge"
            : "ai";

          if (currentTab === "lounge" && users.length > 0) {
            renderUsers(users, "userList", "lounge");
          } else if (
            currentTab === "ai" &&
            aiUsers.length > 0 &&
            isAIMatchTime()
          ) {
            renderUsers(aiUsers, "aiUserList", "ai");
          }
        });
      }

      /* ================= 🎵 Spotify Mood Gradient Player ================= */

      // Audio features → 그라데이션 색상 생성
      function featuresToGradient(features) {
        const { energy, danceability, valence, acousticness, tempo } = features;

        // Energy + Danceability → 기본 Hue (0-360)
        const baseHue = Math.round(energy * 180 + danceability * 90);

        // Valence → Saturation (기분이 좋을수록 채도 높음)
        const saturation = Math.round(45 + valence * 35);

        // Acousticness → Lightness (어쿠스틱할수록 밝음)
        const lightness = Math.round(40 + acousticness * 20);

        // Tempo → 색상 간격 (템포가 빠를수록 대비 강함)
        const hueShift = tempo > 120 ? 60 : 40;

        // 3가지 색상으로 부드러운 그라데이션
        return [
          `hsl(${baseHue}, ${saturation}%, ${lightness}%)`,
          `hsl(${(baseHue + hueShift) % 360}, ${saturation + 8}%, ${lightness + 5}%)`,
          `hsl(${(baseHue + hueShift * 2) % 360}, ${saturation - 5}%, ${lightness - 3}%)`,
        ];
      }

      // 기본 그라데이션 (features 없을 때)
      function getDefaultGradient() {
        return ["#667eea", "#764ba2", "#f093fb"];
      }

      // Track ID 추출 (개선됨)
      function extractTrackIds(tracks) {
        const ids = [];
        
        for (const track of tracks || []) {
          let trackId = null;
          
          // 1. track.id 직접 확인 (22자리 Spotify ID)
          if (track?.id && /^[A-Za-z0-9]{22}$/.test(track.id)) {
            trackId = track.id;
          }
          // 2. track.uri 파싱 (spotify:track:XXXXXX)
          else if (track?.uri && track.uri.startsWith("spotify:track:")) {
            trackId = track.uri.split(":")[2];
          }
          // 3. track.spotify_uri 파싱
          else if (track?.spotify_uri && track.spotify_uri.startsWith("spotify:track:")) {
            trackId = track.spotify_uri.split(":")[2];
          }
          // 4. track.spotifyUri 파싱
          else if (track?.spotifyUri && track.spotifyUri.startsWith("spotify:track:")) {
            trackId = track.spotifyUri.split(":")[2];
          }
          
          if (trackId && /^[A-Za-z0-9]{22}$/.test(trackId)) {
            ids.push(trackId);
          }
        }
        
        return ids;
      }

      // 재생 시간 포맷
      function formatDuration(ms) {
        if (!ms) return "--:--";
        const minutes = Math.floor(ms / 60000);
        const seconds = Math.floor((ms % 60000) / 1000);
        return `${minutes}:${seconds.toString().padStart(2, "0")}`;
      }

      // 트랙 리스트 렌더링
      function renderTrackList(tracks) {
        const container = document.getElementById("trackListContainer");

        if (!tracks || !tracks.length) {
          container.innerHTML = `
      <div class="empty-playlist">
        <div class="empty-playlist-icon">🎵</div>
        <div class="empty-playlist-text">no tracks in this playlist</div>
      </div>
    `;
          return;
        }

        const html = tracks
          .map((track, index) => {
            const name = track?.name || "Unknown Track";
            const artist = track?.artist || "Unknown Artist";
            const duration = formatDuration(
              track?.duration_ms || track?.durationMs,
            );

            return `
        <div class="track-item" data-index="${index}">
          <div class="track-number">${index + 1}</div>
          <div class="track-info">
            <div class="track-name">${name}</div>
            <div class="track-artist">${artist}</div>
          </div>
          <div class="play-indicator">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="track-duration">${duration}</div>
        </div>
      `;
          })
          .join("");

        container.innerHTML = html;

        // 트랙 클릭 이벤트
        container.querySelectorAll(".track-item").forEach((item) => {
          item.onclick = () => {
            const index = parseInt(item.dataset.index);
            playTrack(index);
          };
        });
      }

      // 재생 UI 업데이트
      function updatePlayingUI() {
        document.querySelectorAll(".track-item").forEach((item, idx) => {
          if (idx === currentPlayingIndex) {
            item.classList.add("playing");
          } else {
            item.classList.remove("playing");
          }
        });
      }

      // 그라데이션 적용
      function applyMoodGradient(colors) {
        const gradientEl = document.querySelector(".playlist-mood-gradient");
        if (!gradientEl) return;

        gradientEl.style.setProperty("--mood-c1", colors[0]);
        gradientEl.style.setProperty("--mood-c2", colors[1]);
        gradientEl.style.setProperty("--mood-c3", colors[2]);
        
        console.log("🎨 Applied gradient colors:", colors);
      }

      // 모달 열기 - 개선된 버전
      async function openPlaylist(u) {
        selectedUser = u;
        playlistTracks = u.playlist || [];
        currentPlayingIndex = -1;

        const firstName = u.first_name || u.firstName;

        console.log("═══════════════════════════════════════");
        console.log("🎵 OPENING PLAYLIST");
        console.log("═══════════════════════════════════════");
        console.log("👤 User:", firstName);
        console.log("📀 Total tracks:", playlistTracks.length);

        // 제목 설정
        document.getElementById("playlistTitle").textContent =
          `${firstName}'s playlist`;
        document.getElementById("trackCount").textContent =
          playlistTracks.length;

        // 모달 표시
        document.getElementById("playlistModal").classList.add("active");

        // iframe 숨기기
        document.getElementById("spotifyEmbedContainer").style.display = "none";
        document.getElementById("playbackStatus").style.display = "block";
        document.getElementById("playbackStatus").textContent = "loading...";

        // 로딩 표시
        document.getElementById("trackListContainer").innerHTML = `
    <div class="loading-playlist">
      <div class="loading-spinner"></div>
      <div class="loading-text">loading playlist...</div>
    </div>
  `;

        // 기본 그라데이션
        console.log("🎨 Applying default gradient...");
        applyMoodGradient(getDefaultGradient());

        if (playlistTracks.length === 0) {
          console.log("⚠️ No tracks in playlist");
          renderTrackList([]);
          document.getElementById("playbackStatus").textContent = "no tracks available";
          return;
        }

        // 트랙 리스트 먼저 렌더링
        renderTrackList(playlistTracks);
        document.getElementById("playbackStatus").textContent = "tap any track to play";

        // ========== Audio Features API 호출 (개선됨) ==========
        console.log("───────────────────────────────────────");
        console.log("🎨 AUDIO FEATURES ANALYSIS");
        console.log("───────────────────────────────────────");

        try {
          const trackIds = extractTrackIds(playlistTracks);
          console.log("🔑 Extracted track IDs:", trackIds);
          console.log("📊 Track ID count:", trackIds.length);

          if (trackIds.length === 0) {
            console.warn("⚠️ No valid track IDs found!");
            console.log("📋 Sample track structure:");
            console.log(JSON.stringify(playlistTracks[0], null, 2));
            return;
          }

          // Preview URL 확인
          console.log("───────────────────────────────────────");
          console.log("🎧 PREVIEW URL CHECK");
          console.log("───────────────────────────────────────");
          playlistTracks.slice(0, 3).forEach((track, idx) => {
            console.log(`Track ${idx + 1}: "${track?.name || 'Unknown'}"`);
            console.log(`  - ID: ${track?.id || 'N/A'}`);
            console.log(`  - URI: ${track?.uri || track?.spotify_uri || track?.spotifyUri || 'N/A'}`);
            console.log(`  - Preview URL: ${track?.preview_url || track?.previewUrl || 'N/A'}`);
          });
          console.log("───────────────────────────────────────");

          console.log("📡 Calling /spotify/audio-features API...");
          console.log("📤 Request:", { track_ids: trackIds });

          const startTime = Date.now();
          const features = await apiCall("/spotify/audio-features", "POST", {
            track_ids: trackIds,
          });
          const duration = Date.now() - startTime;

          console.log(`📥 Response received (${duration}ms)`);
          console.log("📊 Response data:", features);

          if (!features || typeof features !== "object") {
            console.error("❌ Invalid response:", features);
            return;
          }

          // Feature 값 로깅
          console.log("───────────────────────────────────────");
          console.log("📈 FEATURE VALUES:");
          console.log(`  Energy:       ${(features.energy || 0).toFixed(3)}`);
          console.log(`  Danceability: ${(features.danceability || 0).toFixed(3)}`);
          console.log(`  Valence:      ${(features.valence || 0).toFixed(3)}`);
          console.log(`  Acousticness: ${(features.acousticness || 0).toFixed(3)}`);
          console.log(`  Tempo:        ${(features.tempo || 0).toFixed(1)} BPM`);
          console.log("───────────────────────────────────────");

          // 기본값 체크
          const isDefaultValues =
            features.energy === 0.5 &&
            features.danceability === 0.5 &&
            features.valence === 0.5 &&
            features.acousticness === 0.5 &&
            features.tempo === 120;

          if (isDefaultValues) {
            console.warn("⚠️ WARNING: Received default fallback values!");
            console.warn("⚠️ Backend API call likely failed");
          } else {
            const colors = featuresToGradient(features);
            console.log("🌈 Generated colors:", colors);
            applyMoodGradient(colors);
            console.log("✅ Gradient applied");
          }
        } catch (error) {
          console.error("❌ AUDIO FEATURES ERROR:");
          console.error("  Message:", error.message);
          console.error("  Stack:", error.stack);
        }

        console.log("═══════════════════════════════════════");
      }

      // Spotify iframe으로 트랙 재생
      function playTrack(index) {
        if (!playlistTracks || !playlistTracks[index]) return;

        const track = playlistTracks[index];
        const trackId = track.id || extractTrackIds([track])[0];

        if (!trackId) {
          console.error("❌ No track ID found for:", track.name);
          return;
        }

        console.log("═══════════════════════════════════════");
        console.log("🎵 PLAYING TRACK");
        console.log("═══════════════════════════════════════");
        console.log("Track:", track.name);
        console.log("Artist:", track.artist);
        console.log("Track ID:", trackId);

        // Spotify embed URL
        const embedUrl = `https://open.spotify.com/embed/track/${trackId}?utm_source=generator&theme=0`;
        console.log("🔗 Embed URL:", embedUrl);

        // iframe 업데이트
        const iframe = document.getElementById("spotifyEmbed");
        iframe.src = embedUrl;

        // iframe 표시, status 숨기기
        document.getElementById("spotifyEmbedContainer").style.display = "block";
        document.getElementById("playbackStatus").style.display = "none";

        // UI 업데이트
        currentPlayingIndex = index;
        updatePlayingUI();

        // 자동 넘김 (30초)
        clearTimeout(spotifyTimer);
        spotifyTimer = setTimeout(() => {
          const nextIndex = (index + 1) % playlistTracks.length;
          console.log("⏭️ Auto-playing next track...");
          playTrack(nextIndex);
        }, 30000);

        console.log("═══════════════════════════════════════");
      }

      // 모달 닫기
      function closePlaylistModal() {
        clearTimeout(spotifyTimer);
        
        // iframe 정리
        const iframe = document.getElementById("spotifyEmbed");
        if (iframe) {
          iframe.src = "";
        }
        document.getElementById("spotifyEmbedContainer").style.display = "none";
        document.getElementById("playbackStatus").style.display = "block";
        
        currentPlayingIndex = -1;
        document.getElementById("playlistModal").classList.remove("active");
      }

      // 이벤트 리스너
      document
        .getElementById("playlistModal")
        ?.addEventListener("click", (e) => {
          if (e.target.id === "playlistModal") {
            closePlaylistModal();
          }
        });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          closePlaylistModal();
        }
      });

      /* ====================== init ====================== */

      window.onload = async () => {
        try {
          const profileRes = await apiCall("/users/profile");
          currentUserProfile = profileRes.user || null;
        } catch (error) {
          console.error("Session check failed:", error);
          removeFromLocal("user_id");
          navigateTo("index.html");
          return;
        }

        if (!getFromLocal("location")) {
          navigateTo("location-permission.html");
          return;
        }

        renderBottomNav("lounge");
        await updateLocation();
        listenPresence();
        await loadUsers();
        if (isAIMatchTime()) {
          switchTab("ai");
        } else {
          switchTab("lounge");
        }
        listenMatchRequests();
      };
    </script>
  </body>
</html>
