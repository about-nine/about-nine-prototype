<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About Nine</title>
    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="js/firebase.js"></script>
    <style>
      .container {
        animation: fadeIn 1s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .brand-icon {
        width: 30px;
        height: 30px;
        margin-bottom: 20px;
        animation: rotate 20s linear infinite;
      }

      @keyframes rotate {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .brand-text .findyour {
        color: var(--text-secondary);
      }

      .earphone-note {
        margin-top: 16px;
        font-size: 0.95rem;
        color: var(--text-secondary);
        line-height: 1.4;
        display: inline-block;
        animation: earphoneFloat 3.5s ease-in-out infinite;
        font-family: "Merriweather", serif;
      }

      @keyframes earphoneFloat {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }

      .status-hint {
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.3;
        }
        50% {
          opacity: 0.7;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div>
        <img src="images/asterisk.png" alt="asterisk" class="brand-icon" />
        <h1 class="brand-text">
          <span class="findyour">find your</span><br />kindred soul
        </h1>
        <p class="earphone-note">
          Wear earphones for clearer voices<br> and a more natural, immersive vibe.
        </p>
      </div>

      <div class="bottom-text status-hint">entering...</div>
      <span id="error" class="error hidden"></span>
    </div>

    <script src="js/common.js"></script>
    <script>
      async function ensureSessionFromToken() {
        const token = getFromLocal("id_token");
        if (!token) return;
        try {
          await apiCall("/auth/firebase-login", "POST", { idToken: token });
        } catch (e) {
          // If token is invalid/expired, clear to avoid loops.
          try { localStorage.removeItem("id_token"); } catch {}
        }
      }

      let isEntering = false;

      async function enterApp() {
        if (isEntering) return;
        isEntering = true;
        hideError("error");
        // localStorage에 user_id가 없으면 전화번호 인증 플로우로
        if (!getFromLocal("user_id")) {
          navigateTo("phone.html");
          return;
        }

        try {
          await ensureSessionFromToken();
          await apiCall("/users/profile");
          navigateTo("lounge.html");
        } catch (error) {
          const status = error?.status;
          if (
            status === 401 ||
            status === 404 ||
            error?.message?.includes("not logged in") ||
            error?.message?.includes("user not found")
          ) {
            try { localStorage.clear(); } catch {}
            navigateTo("phone.html");
            return;
          }
          showError("error", "network issue. tap to retry");
          isEntering = false;
        }
      }

      document.body.addEventListener("click", enterApp);
      window.addEventListener("DOMContentLoaded", () => {
        setTimeout(enterApp, 1000);
      });
    </script>
  </body>
</html>
