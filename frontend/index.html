<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About Nine</title>
    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="js/firebase.js"></script>
    <style>
      .container {
        animation: fadeIn 1s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .brand-icon {
        width: 30px;
        height: 30px;
        margin-bottom: 20px;
        animation: rotate 20s linear infinite;
      }

      @keyframes rotate {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .brand-text .findyour {
        color: var(--text-secondary);
      }

      .swan-image {
        position: absolute;
        bottom: 80px; /* 하단 60px + tap-hint 높이 + 여유 */
        left: 50%;
        transform: translateX(-50%);
        width: 80%;
        max-width: 400px;
        opacity: 0.7;
        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateX(-50%) translateY(0);
        }
        50% {
          transform: translateX(-50%) translateY(-10px);
        }
      }

      .tap-hint {
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.3;
        }
        50% {
          opacity: 0.7;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div>
        <img src="images/asterisk.png" alt="asterisk" class="brand-icon" />
        <h1 class="brand-text">
          <span class="findyour">find your</span><br />kindred soul
        </h1>
      </div>

      <img src="images/swans.png" alt="swans" class="swan-image" />

      <div class="bottom-text tap-hint">tap anywhere to continue</div>
      <span id="error" class="error hidden"></span>
    </div>

    <script src="js/common.js"></script>
    <script>
      async function ensureSessionFromToken() {
        const token = getFromLocal("id_token");
        if (!token) return;
        try {
          await apiCall("/auth/firebase-login", "POST", { idToken: token });
        } catch (e) {
          // If token is invalid/expired, clear to avoid loops.
          try { localStorage.removeItem("id_token"); } catch {}
        }
      }

      async function enterApp() {
        hideError("error");
        // localStorage에 user_id가 없으면 로그인 플로우로
        if (!getFromLocal("user_id")) {
          navigateTo("invite-code.html");
          return;
        }

        try {
          await ensureSessionFromToken();
          await apiCall("/users/profile");
          navigateTo("lounge.html");
        } catch (error) {
          const status = error?.status;
          if (
            status === 401 ||
            status === 404 ||
            error?.message?.includes("not logged in") ||
            error?.message?.includes("user not found")
          ) {
            try { localStorage.clear(); } catch {}
            navigateTo("invite-code.html");
            return;
          }
          showError("error", "network issue. tap to retry");
        }
      }

      document.body.addEventListener("click", enterApp);
    </script>
  </body>
</html>
