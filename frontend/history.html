<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>History</title>
    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="js/firebase.js"></script>

    <style>
      .history-user-name {
        font-size: 22px;
        font-weight: 600;
        padding: 4px;
      }

      .history-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .history-meta {
        max-width: 100%;
        row-gap: 4px;
      }

      .history-meta span {
        flex: 0 1 auto;
        max-width: 100%;
        white-space: normal;
        word-break: break-word;
      }

      .history-list,
      .card-list { overflow-x: hidden; }

      .history-card .card { overflow: hidden; }

      .detail-btn {
        background: transparent;
        border: none;
        color: var(--text-primary);
        font-size: 18px;
        padding: 0;
      }

      .empty-state-box {
        background: var(--bg-card);
        border-radius: 16px;
        border: 1px solid var(--border-color);
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 260px);
        text-align: center;
        color: var(--text-secondary);
      }

      .empty-state-box img { width: 30px; height: 30px; margin-bottom: 24px; opacity: 0.9; }
      .empty-state-box .message { font-size: 14px; line-height: 1.4; }
    </style>
  </head>

  <body>
    <div class="main-container">
      <div class="chat-header brand-text" style="text-align:left;color:#8e8e8e">
        about nine
      </div>
      <div class="history-user-name" id="historyUserName"></div>

      <div class="content">
        <div id="historyList" class="card-list history-list"></div>
        <div id="emptyState" class="empty-state-box hidden">
          <img src="images/asterisk.png" alt="asterisk" />
          <div class="message">no conversations yet</div>
        </div>
      </div>
    </div>

    <nav id="bottomNav" class="bottom-nav"></nav>

    <script src="js/common.js"></script>

    <script type="module">
      import { rtdb, ref, onValue, push, set } from "/js/firebase.js";

      const userId = getFromLocal("user_id");
      if (!userId) navigateTo("index.html");

      let presenceData = {};
      let currentUserProfile = null;

      function isOnline(uid) {
        const p = presenceData[uid];
        return p && p.online === true;
      }

      async function loadUserProfile() {
        const res = await apiCall("/users/profile");
        currentUserProfile = res?.user || null;
      }

      renderSectionLoader("historyList", "loading your conversations...");

      async function renderHistory() {
        const listEl  = document.getElementById("historyList");
        const emptyEl = document.getElementById("emptyState");
        const nameEl  = document.getElementById("historyUserName");

        const myFirst = currentUserProfile?.first_name || currentUserProfile?.firstName || getFromLocal("firstName") || "";
        const myLast  = currentUserProfile?.last_name  || currentUserProfile?.lastName  || getFromLocal("lastName")  || "";
        nameEl.textContent = `${myFirst} ${myLast}`.trim() || "your profile";

        renderSectionLoader(listEl, "loading your conversations...");

        const res   = await apiCall("/talks/history-list");
        const items = res.items || [];

        if (!items.length) {
          listEl.innerHTML = "";
          emptyEl.classList.remove("hidden");
          return;
        }

        listEl.innerHTML = items.map((item) => {
          const id   = item.partner_id;
          const deleted = item.deleted === true;
          const name = deleted
            ? "(deleted)"
            : `${item.first_name || ""} ${item.last_name || ""}`.trim() || "your match";

          const scores = [1, 2, 3].flatMap((r) => {
            const t = item.talks_by_round?.[r];
            if (!t) return [];
            return [`${roundLabel(t.topic)}: ${t.score === null ? "--" : t.score}`];
          });

          const online = isOnline(id);
          const completedAllRounds = [1, 2, 3].every(
            (r) => item.talks_by_round?.[r],
          );
          const startEnabled =
            !item.had_no &&
            !deleted &&
            online &&
            item.blocked !== true &&
            !completedAllRounds;
          const scoreHtml    = scores.length
            ? scores.map((s) => `<span>${s}</span>`).join("")
            : "<span>no scores yet</span>";
          const statusDot    = deleted
            ? "offline"
            : item.blocked === true
              ? "blocked"
              : online
                ? "online"
                : "offline";

          return `
            <div class="history-card ${online ? "" : "offline"}">
              <div class="card">
                <div style="flex:1;">
                  <div class="history-card-header">
                    <div class="history-name-row">
                      <span style="font-size:16px;font-weight:600;">${name}</span>
                      <span class="status-dot ${statusDot}"></span>
                    </div>
                    <div class="history-actions">
                      <button class="detail-btn" onclick="openDetail('${id}')">›</button>
                    </div>
                  </div>
                  <div class="history-meta">${scoreHtml}</div>
                  <button class="primary history-btn" ${startEnabled ? "" : "disabled"} onclick="startTalk('${id}')">
                    start talk
                  </button>
                </div>
              </div>
            </div>
          `;
        }).join("");

        emptyEl.classList.add("hidden");
      }

      window.openDetail = (partnerId) => {
        navigateTo(`history-detail.html?partnerId=${partnerId}`);
      };

      window.startTalk = async (partnerId) => {
        const partnerRes = await apiCall(`/talks/history-detail/${partnerId}`);
        if (!partnerRes.success || !partnerRes.partner) return;

        saveToLocal("chat_partner", { id: partnerId, ...partnerRes.partner });

        try {
          showLoading("preparing...");
          const roundRes = await apiCall("/talks/calculate-round", "POST", { partner_id: partnerId });
          hideLoading();

          if (!roundRes.success) { alert("failed to calculate round"); return; }

          const { round, topic, question, options } = roundRes;
          const newRequestRef = push(ref(rtdb, "match_requests"));
          const requestId = newRequestRef.key;
          saveToLocal("match_request_id", requestId);

          const matchData = {
            initiator: userId,
            receiver: partnerId,
            status: "waiting",
            round,
            topic,
            timestamp: Date.now(),
            initiator_profile: currentUserProfile || {
              id: userId,
              first_name: getFromLocal("firstName"),
              last_name: getFromLocal("lastName"),
              age: getFromLocal("age"),
              gender: getFromLocal("gender"),
            },
          };
          if (question) matchData.question = question;
          if (options)  matchData.options  = options;

          await set(newRequestRef, matchData);
          navigateTo(`waiting.html?mode=initiator&requestId=${requestId}`);
        } catch (error) {
          hideLoading();
          console.error("Failed to start talk:", error);
          alert("failed to start match request");
        }
      };

      function listenPresence() {
        onValue(ref(rtdb, "presence"), (snap) => {
          presenceData = snap.val() || {};
          renderHistory();
        });
      }

      window.onload = async () => {
        renderBottomNav("history");
        try {
          await loadUserProfile();
          await renderHistory();
          listenPresence();
        } catch (error) {
          console.error("Failed to load history:", error);
        }
      };
    </script>
  </body>
</html>
