<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chemistry Score</title>
    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="js/firebase.js"></script>

    <style>
      /* ── 컨테이너 ──────────────────────────────────── */

      .result-chat-container {
        overflow: hidden;
      }

      .coco-avatar-spacer {
        width: 36px;
        height: 0;
        min-height: 0;
        flex-shrink: 0;
      }

      /* ── Chemistry Score 카드 ───────────────────────── */

      .chemistry-card,
      .profile-card,
      .contact-card {
        padding: 20px;
        border-radius: 20px;
        border: 1px solid transparent;
        background:
          linear-gradient(#1f1f1f, #1f1f1f) padding-box,
          linear-gradient(135deg, #667eea 0%, #764ba2 100%) border-box;
        position: relative;
      }

      .chemistry-card {
        cursor: pointer;
        transition: transform 0.2s;
      }

      .chemistry-card:active {
        transform: scale(0.98);
      }

      .chemistry-score-text {
        font-size: 15px;
        margin-bottom: 12px;
        color: var(--text-primary);
      }

      .chemistry-score-text strong {
        font-weight: 700;
      }

      .view-details-btn {
        background: rgba(255, 255, 255, 0.2);
        border: none;
        padding: 10px 20px;
        border-radius: 20px;
        color: var(--text-primary);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        width: auto;
      }

      /* ── Waiting 메시지 ─────────────────────────────── */

      .waiting-message {
        text-align: center;
        padding: 12px;
        color: var(--text-secondary);
        font-size: 13px;
        font-style: italic;
      }

      /* ── Go to Lounge 버튼 ──────────────────────────── */

      .lounge-button-container {
        padding: 16px 20px calc(30px + var(--safe-bottom));
        background: transparent;
      }

      .lounge-btn {
        width: 100%;
        padding: 16px;
        border-radius: 25px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
      }

      /* ── 프로필 카드 ────────────────────────────────── */

      .profile-card {
        cursor: pointer;
        transition: transform 0.2s;
      }

      .contact-card {
        cursor: default;
      }

      .contact-card strong {
        text-decoration: underline;
      }

      .profile-name {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 12px;
      }

      /* ── 바텀시트 ───────────────────────────────────── */

      .bottom-sheet-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--overlay-bg);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
        z-index: 999;
      }

      .bottom-sheet-overlay.active {
        opacity: 1;
        pointer-events: auto;
      }

      /* 공통 바텀시트 속성 */
      .analysis-bottom-sheet,
      .profile-bottom-sheet {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%) translateY(100%);
        width: 100%;
        max-width: 480px;
        height: 90vh;
        border-radius: 20px 20px 0 0;
        transition: transform 0.3s;
        z-index: 1000;
        overflow-y: auto;
        font-family: "Merriweather", serif;
      }

      .analysis-bottom-sheet.active,
      .profile-bottom-sheet.active {
        transform: translateX(-50%) translateY(0);
      }

      .analysis-bottom-sheet {
        background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%);
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .profile-bottom-sheet {
        background: #1a1a1a;
        padding: 40px 20px calc(30px + var(--safe-bottom));
      }

      /* 공통 핸들 */
      .sheet-handle,
      .profile-sheet-handle {
        width: 40px;
        height: 4px;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 2px;
        position: absolute;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
      }

      /* ── 원형 스코어 그래픽 ──────────────────────────── */

      .score-circle-container {
        position: relative;
        width: 280px;
        height: 280px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 40px;
      }

      .score-circle-label {
        position: absolute;
        top: -24px;
        width: 100%;
        text-align: center;
        font-size: 18px;
        color: var(--text-primary);
      }

      .score-circle-image {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: contain;
        z-index: 1;
        pointer-events: none;
      }

      .score-circle-text {
        position: relative;
        z-index: 2;
        text-align: center;
      }

      .score-number {
        font-size: 40px;
        color: white;
      }

      .keywords-area {
        width: 100%;
        text-align: center;
        font-size: 14px;
        color: var(--text-secondary);
        line-height: 2;
      }

      /* ── 프로필 시트 내부 ────────────────────────────── */

      .profile-sheet-name {
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 10px;
      }

      .profile-sheet-subtitle {
        font-size: 14px;
        color: var(--text-secondary);
        margin-bottom: 10px;
      }

      .profile-info-card {
        background: #2a2a2a;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 16px;
        padding: 18px 20px;
        margin-bottom: 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .profile-info-card.locked {
        filter: blur(6px);
        pointer-events: none;
      }

      .profile-info-card.stacked {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      .profile-info-row {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      /* profile-label / profile-value: style.css로 이동 */

      .playlist-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .playlist-chip {
        background: #3a3a3a;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 12px;
        color: white;
      }

      .profile-trials-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 8px;
      }

      .profile-trial-item {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .profile-trial-title {
        font-size: 12px;
        color: var(--text-secondary);
        text-transform: lowercase;
      }

      .profile-trial-score {
        font-size: 12px;
        font-weight: 600;
        color: var(--text-primary);
      }

      .unlock-text {
        text-align: center;
        font-size: 14px;
        color: var(--text-secondary);
        margin-top: 30px;
      }

      /* ── Responsive ─────────────────────────────────── */

      @supports (height: 100svh) {
        .result-chat-container {
          height: 100svh;
        }
        .analysis-bottom-sheet,
        .profile-bottom-sheet {
          height: 90svh;
        }
      }

      @media (max-width: 420px) {
        .result-header {
          padding: 20px 16px 12px;
        }
        .result-messages {
          padding: 0 16px 16px;
        }
        .result-input-area {
          padding: 12px 16px calc(20px + var(--safe-bottom));
        }
        .lounge-button-container {
          padding: 12px 16px calc(20px + var(--safe-bottom));
        }

        .coco-bubble,
        .user-bubble {
          max-width: 78%;
          font-size: 13px;
        }

        .chemistry-card,
        .profile-card {
          padding: 16px;
        }

        .analysis-bottom-sheet {
          padding: calc(20px + var(--safe-top)) 16px
            calc(24px + var(--safe-bottom));
        }
        .profile-bottom-sheet {
          padding: calc(32px + var(--safe-top)) 16px
            calc(24px + var(--safe-bottom));
        }

        .score-circle-container {
          width: 220px;
          height: 220px;
          margin-bottom: 0px;
        }
        .score-number {
          font-size: 40px;
        }
        .keywords-area {
          font-size: 14px;
        }
        .profile-info-card {
          padding: 14px 16px;
        }
      }

      @media (max-height: 700px) {
        .score-circle-container {
          width: 210px;
          height: 210px;
          margin-bottom: 0px;
        }
        .result-header {
          padding-top: 18px;
        }
      }
    </style>
  </head>

  <body>
    <div class="result-chat-container chat-container">
      <!-- 헤더 -->
      <div class="result-header chat-header brand-text">COCO</div>

      <!-- 메시지 영역 -->
      <div class="result-messages chat-messages" id="messages"></div>

      <!-- 입력 영역 (드롭다운 + 전송) -->
      <div
        class="result-input-area chat-input-area"
        id="inputArea"
        style="display: none"
      >
        <select class="chat-select" id="choiceSelect">
          <option value="">go or no</option>
          <option value="go">go</option>
          <option value="no">no</option>
        </select>
        <button
          class="chat-send"
          id="sendBtn"
          onclick="submitChoice()"
        ></button>
      </div>

      <!-- Go to Lounge 버튼 -->
      <div
        class="lounge-button-container"
        id="loungeContainer"
        style="display: none"
      >
        <button class="lounge-btn" onclick="navigateTo('lounge.html')">
          go to lounge
        </button>
      </div>
    </div>

    <!-- 바텀시트 오버레이 -->
    <div
      class="bottom-sheet-overlay"
      id="sheetOverlay"
      onclick="closeSheet()"
    ></div>

    <!-- 분석 상세 바텀시트 -->
    <div class="analysis-bottom-sheet" id="analysisSheet">
      <div class="sheet-handle"></div>

      <div class="score-circle-container">
        <div class="score-circle-label">chemistry score</div>
        <img
          class="score-circle-image"
          src="images/chemistry.png"
          alt="chemistry score"
        />
        <div class="score-circle-text">
          <div class="score-number" id="sheetScore">80</div>
        </div>
      </div>

      <div class="keywords-area" id="sheetKeywords"></div>
    </div>

    <!-- 프로필 바텀시트 -->
    <div class="profile-bottom-sheet" id="profileSheet">
      <div class="profile-sheet-handle"></div>
      <div class="profile-sheet-header">
        <div class="profile-sheet-name" id="profileName">tommy hills</div>
      </div>
      <div class="profile-sheet-subtitle" id="profileTrials"></div>
      <div id="profileCards"></div>
      <div class="unlock-text" id="unlockText"></div>
    </div>

    <script src="js/common.js"></script>

    <script type="module">
      const userId = getFromLocal("user_id");
      let effectiveUserId = userId;
      let talkId = getFromLocal("current_talk_id");
      const partner = getFromLocal("chat_partner");
      const requestId = getFromLocal("match_request_id");

      let talkData = null;
      let analysisScore = null;
      let currentRound = 1;
      let myChoice = null;
      let partnerPollTimer = null;
      let partnerTimeoutTimer = null;
      let lastMessageType = null;
      let waitingDotsTimer = null;
      let waitingDotsElement = null;
      let waitingDotsBaseText = "";
      const PARTNER_WAIT_MS = 60000;
      /* Original SCORE_GUIDANCE preserved for reference
      const SCORE_GUIDANCE = {
        1: [
          {
            min: 90,
            body: "Perfect food match.\nDon’t overthink it.\nKeep the chat going.",
          },
          {
            min: 70,
            body: "Not sure yet.\nCould be shyness, could be chemistry.\nTalk a little more.",
          },
          {
            min: 50,
            body: "Hmm, kind of unclear.\nThere might be a better match out there.",
          },
          {
            min: 0,
            body: "Probably not the one.\nTry talking to someone else.",
          },
        ],
        2: [
          {
            min: 90,
            body: "Your visual taste really clicks.\nMake it to the final chat.",
          },
          {
            min: 70,
            body: "Almost there.\nIf it doesn’t hit 100–90 after the last chat, that’s probably your answer.",
          },
          {
            min: 50,
            body: "The vibe feels a bit off.\nThere may be someone better out there.",
          },
          {
            min: 0,
            body: "This score says you’re not a great match.\nWhether to continue is up to you.",
          },
        ],
        3: [
          {
            min: 90,
            body: "Your values feel deeply aligned.\nThere’s a natural sense of understanding in how you see life.",
          },
          {
            min: 70,
            body: "You share many similarities, with a few differences.\nHow those differences feel to you may matter more than the score.",
          },
          {
            min: 50,
            body: "Some perspectives don’t fully overlap.\nIt’s worth noticing where you connected — and where you didn’t.",
          },
          {
            min: 0,
            body: "Your views seem to move in different directions.\nThis score simply reflects that contrast.",
          },
        ],
      };
      */
      const FEATURE_GUIDANCE = {
        lsm: {
          label: "tempo",
          tiers: [
            { min: 0.85, text: "both of you matched pace effortlessly." },
            { min: 0.7, text: "rhythm was steady with a few pauses." },
            { min: 0.5, text: "flow felt jumpy with uneven pauses." },
            { min: 0, text: "tempo never settled into a groove." },
          ],
        },
        flow_continuity: {
          label: "warmth",
          tiers: [
            { min: 0.85, text: "tone stayed soft and affirming." },
            { min: 0.7, text: "responses were considerate most of the time." },
            { min: 0.5, text: "energy cooled off between turns." },
            { min: 0, text: "emotional tone stayed distant or distracted." },
          ],
        },
        turn_balance: {
          label: "balance",
          tiers: [
            { min: 0.85, text: "each person shared without crowding." },
            { min: 0.7, text: "spotlight shifted with light adjustments." },
            { min: 0.5, text: "one side held the mic more often." },
            { min: 0, text: "conversation stalled after short replies." },
          ],
        },
        preference_sync: {
          label: "curiosity",
          tiers: [
            { min: 0.85, text: "questions stacked with genuine interest." },
            { min: 0.7, text: "follow-ups dug a layer deeper." },
            { min: 0.5, text: "only a few details earned follow-ups." },
            { min: 0, text: "little interest in each other’s picks." },
          ],
        },
        romantic_sync: {
          label: "clarity",
          tiers: [
            { min: 0.85, text: "answers landed crisply with zero static." },
            { min: 0.7, text: "thoughts were mostly clear with light repeats." },
            { min: 0.5, text: "ideas needed extra rephrasing to land." },
            { min: 0, text: "core values remained undefined." },
          ],
        },
      };

      /* ================= 초기화 ================= */

      window.onload = async () => {
        if (!userId || !partner) {
          alert("invalid request");
          navigateTo("lounge.html");
          return;
        }

        try {
          const res = await loadTalkHistory();
          if (!res?.talk) {
            removeFromLocal("current_talk_id");
            navigateTo("lounge.html");
            return;
          }

          talkData = res.talk;
          currentRound = Number(talkData.round) || 1;
          analysisScore = extractAnalysisScore(talkData);

          if (analysisScore === null) waitForAnalysis();

          startChat();
        } catch (e) {
          console.error("❌ 초기화 실패:", e);
          navigateTo("lounge.html");
        }
      };

      /* ================= 챗 진행 ================= */

      async function startChat() {
        const steps = getRoundIntroSteps(currentRound);
        for (const step of steps) {
          if (step.type === "message") {
            await addCocoMessage(step.text, step.delay ?? 500);
          } else if (step.type === "score") {
            await addScoreCard(step.delay ?? 500);
          }
        }
        await showInputArea(500);
      }

      function getRoundIntroSteps(round) {
        const partnerName = getPartnerName();

        if (round === 2) {
          return [
            { type: "message", text: "so,", delay: 500 },
            {
              type: "message",
              text: `here's your second chemistry score with ${partnerName}`,
              delay: 900,
            },
            { type: "score", delay: 900 },
            { type: "message", text: "go or no?", delay: 900 },
          ];
        }

        if (round === 3) {
          return [
            { type: "message", text: "okay", delay: 500 },
            {
              type: "message",
              text: `it was your last change to talk with ${partnerName} on this app`,
              delay: 900,
            },
            { type: "score", delay: 900 },
            {
              type: "message",
              text: "what we value can change over time",
              delay: 900,
            },
            {
              type: "message",
              text: "in the end, meeting someone is all about timing",
              delay: 900,
            },
            { type: "message", text: "go or no?", delay: 900 },
          ];
        }

        return [
          { type: "message", text: "yes", delay: 500 },
          {
            type: "message",
            text: `here's what the conversation with ${partnerName} tells us`,
            delay: 900,
          },
          { type: "score", delay: 900 },
          { type: "message", text: "go or no?", delay: 900 },
        ];
      }

      function getPartnerName() {
        const first = partner?.firstName || partner?.first_name || "";
        const last = partner?.lastName || partner?.last_name || "";
        return `${first} ${last}`.trim() || "your match";
      }

      function getScoreLabel(score) {
        if (score === null) return "--";
        if (score >= 90) return "great";
        if (score >= 75) return "good";
        if (score >= 60) return "fair";
        return "low";
      }

      /* ================= 메시지 추가 ================= */

      async function addCocoMessage(text, delay = 0) {
        await sleep(delay);
        const messages = document.getElementById("messages");
        const showAvatar = lastMessageType !== "coco";
        const safeText = escapeHtml(text);

        const div = document.createElement("div");
        div.className = "coco-message chat-row";
        div.innerHTML = `
          ${
            showAvatar
              ? '<div class="coco-avatar chat-avatar"></div>'
              : '<div class="coco-avatar-spacer"></div>'
          }
          <div class="coco-bubble chat-bubble">${safeText}</div>
        `;

        messages.appendChild(div);
        if (text.includes("waiting for your match's response")) {
          waitingDotsElement = div.querySelector(".coco-bubble");
          waitingDotsBaseText = text.replace(/\.{0,}$/,"").trim();
          startWaitingDots();
        }

        lastMessageType = "coco";
        scrollToBottom();
      }

      async function addUserMessage(text, delay = 0) {
        await sleep(delay);
        const messages = document.getElementById("messages");
        const div = document.createElement("div");
        div.className = "user-message chat-row mine";
        div.innerHTML = `<div class="user-bubble chat-bubble mine">${escapeHtml(text)}</div>`;
        messages.appendChild(div);
        lastMessageType = "user";
        scrollToBottom();
      }

      async function addScoreCard(delay = 0) {
        await sleep(delay);
        const score = calculateScore();
        const ratingText = getScoreLabel(score);
        const scoreText = score === null ? "--" : score;
        const messages = document.getElementById("messages");

        const div = document.createElement("div");
        div.className = "coco-message chat-row";
        div.innerHTML = `
          <div class="coco-avatar chat-avatar"></div>
          <div class="coco-bubble chat-bubble" style="max-width:80%;padding:0;">
            <div class="chemistry-card" onclick="openAnalysisSheet()">
              <div class="chemistry-score-text">
                chemistry score:
                <strong id="chemistryScoreValue">${scoreText}</strong>
                (<span id="chemistryScoreRating">${ratingText}</span>)
              </div>
              <button class="view-details-btn">view details</button>
            </div>
          </div>
        `;

        messages.appendChild(div);
        lastMessageType = "coco";
        scrollToBottom();
      }

      /* ================= 입력 영역 ================= */

      async function showInputArea(delay = 0) {
        await sleep(delay);
        document.getElementById("inputArea").style.display = "flex";
      }

      /* ================= 선택 제출 ================= */

      window.submitChoice = async () => {
        const select = document.getElementById("choiceSelect");
        const choice = select.value;

        if (!choice) {
          alert("Please select go or no");
          return;
        }

        myChoice = choice;
        document.getElementById("inputArea").style.display = "none";
        document.getElementById("sendBtn").disabled = true;

        await addUserMessage(choice, 150);

        try {
          const ensured = await ensureTalkId(true);
          if (!ensured) throw new Error("talk_id not ready");

          const res = await apiCall("/talks/respond", "POST", {
            talk_id: talkId,
            choice,
          });
          if (!res.success)
            throw new Error(res.message || "failed to submit response");

          try {
            const rtdbRes = await fetchGoNoGoStatus();
            const latest = rtdbRes
              ? null
              : await apiCall(`/talks/history/${talkId}`);
            const goNoGo = rtdbRes?.go_no_go || extractGoNoGoMap(latest?.talk);
            const ids = Object.keys(goNoGo);
            if (ids.length === 1) effectiveUserId = ids[0];
            else if (userId && ids.includes(userId)) effectiveUserId = userId;
          } catch {}
        } catch (error) {
          console.error("Failed to submit response:", error);
          alert("failed to submit response");
          document.getElementById("inputArea").style.display = "flex";
          document.getElementById("sendBtn").disabled = false;
          return;
        }

        await addCocoMessage("waiting for your match's response.", 300);
        listenForPartnerResponse();
      };

      /* ================= 상대방 응답 대기 ================= */

      function extractGoNoGoMap(talk) {
        const map =
          talk?.go_no_go && typeof talk.go_no_go === "object"
            ? { ...talk.go_no_go }
            : {};
        if (talk && typeof talk === "object") {
          Object.keys(talk).forEach((key) => {
            if (key.startsWith("go_no_go.")) {
              map[key.slice("go_no_go.".length)] = talk[key];
            }
          });
        }
        return map;
      }

      function getApiBase() {
        try {
          const s = localStorage.getItem("api_base");
          if (s) return s;
        } catch {}
        return window.__API_BASE__ || `${window.location.origin}/api`;
      }

      async function fetchGoNoGoStatus() {
        const id = requestId || talkId;
        if (!id) return null;
        try {
          const response = await fetch(`${getApiBase()}/talks/go-no-go/${id}`, {
            credentials: "include",
          });
          if (!response.ok) return null;
          const res = await response.json();
          return res?.success ? res : null;
        } catch {
          return null;
        }
      }

      function handlePartnerTimersCleanup() {
        if (partnerPollTimer) {
          clearInterval(partnerPollTimer);
          partnerPollTimer = null;
        }
        if (partnerTimeoutTimer) {
          clearTimeout(partnerTimeoutTimer);
          partnerTimeoutTimer = null;
        }
      }

      async function handlePartnerTimeout() {
        handlePartnerTimersCleanup();
        stopWaitingDots();
        await addCocoMessage("your match hasn't responded yet", 200);
        await addCocoMessage(
          "you can check the result in your history later",
          200,
        );
        await showLoungeButton(400);
      }

      function listenForPartnerResponse() {
        if (!talkId) return;
        handlePartnerTimersCleanup();

        partnerTimeoutTimer = setTimeout(() => {
          handlePartnerTimeout();
        }, PARTNER_WAIT_MS);

        partnerPollTimer = setInterval(async () => {
          try {
            const [res, rtdbRes] = await Promise.all([
              apiCall(`/talks/history/${talkId}`),
              fetchGoNoGoStatus(),
            ]);
            if (!res.success || !res.talk) return;

            const data = res.talk;
            talkData = data || talkData;

            const freshScore = extractAnalysisScore(data);
            if (freshScore !== null && freshScore !== analysisScore) {
              analysisScore = freshScore;
              updateScoreUI();
            }

            const participants =
              rtdbRes?.participants ||
              data?.participants ||
              talkData?.participants ||
              {};
            const expectedCount =
              Object.values(participants).filter(Boolean).length || 2;
            const goNoGo = rtdbRes?.go_no_go || extractGoNoGoMap(data);
            const goNoGoValues = Object.values(goNoGo).filter(
              (v) => v === true || v === false,
            );

            if (goNoGoValues.length >= expectedCount) {
              handlePartnerTimersCleanup();
              goNoGoValues.some((v) => v === false)
                ? await handleSomeoneNo("no")
                : await handleBothGo();
              return;
            }

            let partnerId =
              participants.user_a === effectiveUserId
                ? participants.user_b
                : participants.user_a;
            if (!partnerId) {
              const ids = Object.keys(goNoGo);
              partnerId = ids.find((id) => id !== effectiveUserId);
            }

            const partnerValue =
              partnerId &&
              Object.prototype.hasOwnProperty.call(goNoGo, partnerId)
                ? goNoGo[partnerId]
                : null;
            const partnerResponse =
              partnerValue === true
                ? "go"
                : partnerValue === false
                  ? "no"
                  : null;

            if (partnerResponse) {
              handlePartnerTimersCleanup();
              stopWaitingDots();
              myChoice === "go" && partnerResponse === "go"
                ? await handleBothGo()
                : await handleSomeoneNo(partnerResponse);
            }
          } catch (error) {
            if (
              String(error?.message || "").includes("talk_history not found")
            ) {
              handlePartnerTimersCleanup();
              stopWaitingDots();
              removeFromLocal("current_talk_id");
              alert("talk history not found");
              navigateTo("lounge.html");
            }
          }
        }, 2000);
      }

      /* ================= 둘 다 GO ================= */

      async function handleBothGo() {
        stopWaitingDots();
        const steps = getRoundBothGoSteps(currentRound);
        for (const step of steps) {
          if (step.type === "message") {
            await addCocoMessage(step.text, step.delay ?? 500);
          } else if (step.type === "profile") {
            await addProfileCard(step.delay ?? 500);
          } else if (step.type === "contact") {
            await addContactCard(step.delay ?? 500);
          }
        }
        await showLoungeButton(500);
      }

      function getRoundBothGoSteps(round) {
        const partnerName = getPartnerName();
        if (round >= 3) {
          return [
            { type: "message", text: "wishing you luck!", delay: 500 },
            { type: "contact", delay: 900 },
          ];
        }
        return [
          { type: "message", text: "alright, this is the profile", delay: 500 },
          {
            type: "message",
            text: `this might ease a bit of your curiosity about ${partnerName}`,
            delay: 900,
          },
          { type: "profile", delay: 900 },
        ];
      }

      function formatContactNumber(raw) {
        if (!raw) return "--";
        const trimmed = String(raw).trim();
        if (!trimmed) return "--";
        const digits = trimmed.replace(/\D/g, "");
        if (!digits) return trimmed;
        let country = "";
        let local = digits;
        if (trimmed.startsWith("+") && digits.length > 8) {
          const countryLen = Math.max(1, digits.length - 10);
          country = digits.slice(0, countryLen);
          local = digits.slice(countryLen);
        }
        const paddedLocal = local.padStart(10, "0").slice(-10);
        const prefixLen = Math.max(2, paddedLocal.length - 8);
        const first = paddedLocal.slice(0, prefixLen);
        const middle = paddedLocal.slice(prefixLen, prefixLen + 4);
        const last = paddedLocal.slice(prefixLen + 4);
        const formattedLocal = [first, middle, last].filter(Boolean).join("-");
        return country
          ? `+${country} ${formattedLocal}`
          : formattedLocal;
      }

      function getPartnerContactValue() {
        return formatContactNumber(partner?.phone);
      }

      async function addProfileCard(delay = 0) {
        await sleep(delay);
        const messages = document.getElementById("messages");
        const safePartnerName = escapeHtml(getPartnerName());
        const div = document.createElement("div");
        div.className = "coco-message chat-row";
        div.innerHTML = `
          <div class="coco-avatar chat-avatar"></div>
          <div class="coco-bubble chat-bubble" style="max-width:80%;padding:0;">
            <div class="profile-card" onclick="openProfileSheet()">
              <div class="profile-name">${safePartnerName}</div>
              <button class="view-details-btn">view profile</button>
            </div>
          </div>
        `;
        messages.appendChild(div);
        lastMessageType = "coco";
        scrollToBottom();
      }

      async function addContactCard(delay = 0) {
        await sleep(delay);
        const contact = getPartnerContactValue();
        const displayContact =
          contact && contact !== "--" ? `(${contact})` : contact;
        const safeDisplayContact = escapeHtml(displayContact || "--");
        const messages = document.getElementById("messages");
        const div = document.createElement("div");
        div.className = "coco-message chat-row";
        div.innerHTML = `
          <div class="coco-avatar chat-avatar"></div>
          <div class="coco-bubble chat-bubble" style="max-width:80%;padding:0;">
            <div class="chemistry-card contact-card">
              <div class="chemistry-score-text">
                contact<br />
                <strong>${safeDisplayContact}</strong>
              </div>
            </div>
          </div>
        `;
        messages.appendChild(div);
        lastMessageType = "coco";
        scrollToBottom();
      }

      /* ================= 한 명이라도 NO ================= */

      async function handleSomeoneNo() {
        stopWaitingDots();
        await addCocoMessage(
          "well, well, it looks like this one wasn't your one and only",
          500,
        );
        await addCocoMessage("the match ends here", 900);
        await addCocoMessage("we'll recommend someone new for you", 1300);
        await addCocoMessage("see u later", 1700);
        showLoungeButton(1000);
      }

      /* ================= Go to Lounge 버튼 ================= */

      async function showLoungeButton(delay = 0) {
        await sleep(delay);
        document.getElementById("loungeContainer").style.display = "block";
      }

      /* ================= 바텀시트 ================= */

      function renderAnalysisFeatures() {
        if (analysisScore === null || !talkData?.analysis?.pair_features) {
          return "<div class='waiting-message'>analysis details not ready</div>";
        }
        const features = talkData.analysis.pair_features;
        const lines = Object.entries(features)
          .map(([key, value]) => {
            const text = getFeatureGuidanceText(value, key);
            return `<div>${escapeHtml(text)}</div>`;
          })
          .join("");
        return `<div class="score-guidance-text">${lines}</div>`;
      }

      window.openAnalysisSheet = () => {
        const score = calculateScore();
        document.getElementById("sheetScore").textContent =
          score === null ? "--" : score;
        document.getElementById("sheetKeywords").innerHTML =
          renderAnalysisFeatures();
        openSheet("analysisSheet");
      };

      async function fetchProfileRounds() {
        const partnerId =
          partner?.id || partner?.user_id || partner?.uid || partner?.userId;
        if (!partnerId) return null;
        try {
          const res = await apiCall(`/talks/history-detail/${partnerId}`);
          return res?.success ? res.rounds || null : null;
        } catch {
          return null;
        }
      }

      function renderProfileTrials(rounds) {
        if (!rounds || typeof rounds !== "object") return "";
        return Object.entries(rounds)
          .map(([roundKey, info]) => {
            const label = roundLabel(info?.topic);
            const scoreText =
              info?.score === null || info?.score === undefined
                ? "--"
                : info.score;
            return `
              <div class="profile-trial-item">
                <div class="profile-trial-title">${escapeHtml(getOrdinal(Number(roundKey)))} trial (${escapeHtml(label)})</div>
                <div class="profile-trial-score">chemistry score ${escapeHtml(String(scoreText))}</div>
              </div>
            `;
          })
          .join("");
      }

      window.openProfileSheet = async () => {
        const partnerName = getPartnerName();
        const score = calculateScore();

        document.getElementById("profileName").textContent = partnerName;

        const trialsEl = document.getElementById("profileTrials");
        if (trialsEl) {
          const rounds = await fetchProfileRounds();
          trialsEl.innerHTML = rounds
            ? `<div class="profile-trials-list">${renderProfileTrials(rounds)}</div>`
            : `${escapeHtml(getOrdinal(currentRound))} trial · chemistry score ${escapeHtml(String(score === null ? "--" : score))}`;
        }

        document.getElementById("profileCards").innerHTML =
          generateProfileCards();
        document.getElementById("unlockText").innerHTML = generateUnlockText();
        openSheet("profileSheet");
      };

      function generateProfileCards() {
        const unlocked = currentRound;
        const age = partner?.age ?? "--";
        const gender = partner?.gender || "--";
        const drink = partner?.drink || "Not provided";
        const smoke = partner?.smoke || "Not provided";
        const marijuana = partner?.marijuana || "Not provided";
        const bio = partner?.bio || "Not provided";
        const moreInfo = partner?.more_info || "Not provided";
        const phone = partner?.phone || "--";
        const playlist = Array.isArray(partner?.playlist)
          ? partner.playlist
          : [];

        const lock1 = unlocked < 2 ? "locked" : "";
        const lock2 = unlocked < 3 ? "locked" : "";
        const safePartnerName = escapeHtml(getPartnerName());
        const safeAge = escapeHtml(String(age));
        const safeGender = escapeHtml(String(gender));
        const safeDrink = escapeHtml(String(drink));
        const safeSmoke = escapeHtml(String(smoke));
        const safeMarijuana = escapeHtml(String(marijuana));
        const safeMoreInfo = escapeHtml(String(moreInfo !== "Not provided" ? moreInfo : bio));
        const safePhone = escapeHtml(String(phone));

        return `
          <div class="profile-info-card">
            <div class="profile-info-row">
              <span class="profile-label">${safeAge} years old</span>
              <span class="profile-value">${safeGender}</span>
            </div>
          </div>
          <div class="profile-info-card stacked">
            <div class="profile-label">${safePartnerName}'s playlist</div>
            <div class="playlist-chips">
              ${
                playlist.length
                  ? playlist
                      .slice(0, 6)
                      .map(
                        (t) =>
                          `<div class="playlist-chip">${escapeHtml(String(t.name || "track"))} - ${escapeHtml(String(t.artist || "artist"))}</div>`,
                      )
                      .join("")
                  : `<div class="playlist-chip">no playlist</div>`
              }
            </div>
          </div>
          <div class="profile-info-card stacked ${lock1}">
            <div class="profile-info-row"><span class="profile-label">drinking</span><span class="profile-value">${safeDrink}</span></div>
            <div class="profile-info-row"><span class="profile-label">smoking</span><span class="profile-value">${safeSmoke}</span></div>
            <div class="profile-info-row"><span class="profile-label">marijuana</span><span class="profile-value">${safeMarijuana}</span></div>
          </div>
          <div class="profile-info-card stacked ${lock1}">
            <div class="profile-label">Additional information</div>
            <div class="profile-value">${safeMoreInfo}</div>
          </div>
          <div class="profile-info-card ${lock2}">
            <div class="profile-info-row">
              <span class="profile-label">Contact</span>
              <span class="profile-value">${safePhone}</span>
            </div>
          </div>
        `;
      }

      function generateUnlockText() {
        if (currentRound === 1)
          return "extra information unlocks after the 2nd chat";
        if (currentRound === 2) return "one last chat left to reach your match";
        return "";
      }

      function resetSheetStyles(sheetEl) {
        if (!sheetEl) return;
        sheetEl.style.transform = "";
        sheetEl.style.transition = "";
      }

      function openSheet(sheetId) {
        document.getElementById("sheetOverlay").classList.add("active");
        const sheet = document.getElementById(sheetId);
        if (sheet) {
          resetSheetStyles(sheet);
          sheet.classList.add("active");
        }
      }

      window.closeSheet = () => {
        document.getElementById("sheetOverlay").classList.remove("active");
        ["analysisSheet", "profileSheet"].forEach((id) => {
          const sheet = document.getElementById(id);
          if (!sheet) return;
          sheet.classList.remove("active");
          resetSheetStyles(sheet);
        });
      };

      /* ================= Bottom Sheet Drag ================= */

      function attachSheetDragClose(sheetEl, { topOnly = true } = {}) {
        let startY = null,
          lastDy = 0,
          dragging = false;

        sheetEl.addEventListener("touchstart", (e) => {
          if (!sheetEl.classList.contains("active")) return;
          if (topOnly && sheetEl.scrollTop > 0) return;
          startY = e.touches[0].clientY;
          lastDy = 0;
          dragging = true;
          sheetEl.style.transition = "none";
        });

        sheetEl.addEventListener(
          "touchmove",
          (e) => {
            if (!dragging) return;
            const dy = e.touches[0].clientY - startY;
            if (dy <= 0) return;
            lastDy = dy;
            if (e.cancelable) e.preventDefault();
            sheetEl.style.transform = `translateX(-50%) translateY(${dy}px)`;
          },
          { passive: false },
        );

        const finishDrag = () => {
          if (!dragging) return;
          dragging = false;
          sheetEl.style.transition = "";
          lastDy > 120 ? closeSheet() : (sheetEl.style.transform = "");
        };

        sheetEl.addEventListener("touchend", finishDrag);
        sheetEl.addEventListener("touchcancel", finishDrag);
      }

      attachSheetDragClose(document.getElementById("profileSheet"), {
        topOnly: false,
      });
      attachSheetDragClose(document.getElementById("analysisSheet"), {
        topOnly: true,
      });

      /* ================= Score ================= */

      function calculateScore() {
        return analysisScore;
      }

      function getScoreGuidance(round, score) {
        if (score === null) {
          return {
            body: "chemistry score is still being prepared.",
          };
        }
        const normalizedRound = SCORE_GUIDANCE[round] ? round : 1;
        const entries = SCORE_GUIDANCE[normalizedRound] || SCORE_GUIDANCE[1];
        const match =
          entries.find((entry) => score >= entry.min) ||
          entries[entries.length - 1];
        return match;
      }

      function extractAnalysisScore(data) {
        const raw = data?.analysis?.chemistry_score;
        if (typeof raw !== "number" || Number.isNaN(raw)) return null;
        return Math.max(0, Math.min(100, Math.round(raw)));
      }

      async function waitForAnalysis(maxAttempts = 60, intervalMs = 3000) {
        for (let i = 0; i < maxAttempts; i++) {
          await sleep(intervalMs);
          try {
            const res = await apiCall(`/talks/history/${talkId}`);
            if (!res.success || !res.talk) continue;

            const fresh = res.talk;

            if (fresh.analysis_status === "running") {
              const elapsed = Date.now() - (fresh.analysis_started_at || 0);
              if (elapsed > 180000) {
                try {
                  await fetch("/api/analysis/talk", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ talk_id: talkId }),
                  });
                } catch {}
              }
              continue;
            }

            if (fresh.analysis_status === "failed" && i < 40) {
              try {
                await fetch("/api/analysis/talk", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ talk_id: talkId }),
                });
              } catch {}
              await sleep(5000);
              continue;
            }

            const score = extractAnalysisScore(fresh);
            if (score !== null) {
              talkData = fresh;
              analysisScore = score;
              updateScoreUI();
              return;
            }
          } catch (error) {
            if (
              String(error?.message || "").includes("talk_history not found")
            ) {
              removeFromLocal("current_talk_id");
              alert("talk history not found");
              navigateTo("lounge.html");
              break;
            }
          }
        }
      }

      function updateScoreUI() {
        const scoreText = analysisScore === null ? "--" : analysisScore;
        const ratingText = getScoreLabel(analysisScore);

        document.getElementById("chemistryScoreValue")?.textContent !==
          undefined &&
          (document.getElementById("chemistryScoreValue").textContent =
            scoreText);
        document.getElementById("chemistryScoreRating") &&
          (document.getElementById("chemistryScoreRating").textContent =
            ratingText);
        document.getElementById("sheetScore") &&
          (document.getElementById("sheetScore").textContent = scoreText);

        const keywordsEl = document.getElementById("sheetKeywords");
        if (keywordsEl) keywordsEl.innerHTML = renderAnalysisFeatures();
      }

      function startWaitingDots() {
        stopWaitingDots();
        if (!waitingDotsElement) return;
        waitingDotsTimer = setInterval(() => {
          if (!waitingDotsElement) return;
          const current = waitingDotsElement.textContent || waitingDotsBaseText;
          const count = (current.match(/\./g) || []).length;
          const nextCount = (count + 1) % 4;
          const dots = ".".repeat(nextCount);
          waitingDotsElement.textContent = `${waitingDotsBaseText}${dots}`;
        }, 700);
      }

      function stopWaitingDots() {
        if (waitingDotsTimer) {
          clearInterval(waitingDotsTimer);
          waitingDotsTimer = null;
        }
        waitingDotsElement = null;
        waitingDotsBaseText = "";
      }

      function getFeatureGuidanceText(score, featureKey) {
        if (typeof score !== "number" || Number.isNaN(score)) {
          return "awaiting score.";
        }
        const config = FEATURE_GUIDANCE[featureKey];
        if (!config) return `${score}`;
        const tier =
          config.tiers.find((t) => score >= t.min) ||
          config.tiers[config.tiers.length - 1];
        return tier.text;
      }

      /* ================= 유틸 ================= */

      function scrollToBottom() {
        const messages = document.getElementById("messages");
        messages.scrollTop = messages.scrollHeight;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      async function loadTalkHistory() {
        if (!requestId && !talkId) {
          removeFromLocal("current_talk_id");
          return null;
        }
        if (!talkId || (requestId && talkId !== requestId)) {
          const newTalkId = await ensureTalkId(true);
          if (!newTalkId) return null;
        }
        try {
          return await apiCall(`/talks/history/${talkId}`);
        } catch (error) {
          if (String(error?.message || "").includes("talk_history not found")) {
            removeFromLocal("current_talk_id");
            const newTalkId = await ensureTalkId(true);
            if (!newTalkId) return null;
            return await apiCall(`/talks/history/${talkId}`);
          }
          throw error;
        }
      }

      async function ensureTalkId(force = false) {
        if (!requestId) return null;
        if (talkId && talkId === requestId) return talkId;
        if (talkId && !force) return talkId;
        try {
          const res = await apiCall("/talks/save-history", "POST", {
            request_id: requestId,
          });
          if (!res?.success || !res.talk_id) return null;
          talkId = res.talk_id;
          saveToLocal("current_talk_id", talkId);
          return talkId;
        } catch {
          return null;
        }
      }
    </script>
  </body>
</html>
