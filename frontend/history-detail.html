<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>History Detail</title>
    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="js/firebase.js"></script>

    <style>
      .history-phone {
        width: 100%;
        padding: 8px 20px;
        font-size: 14px;
        margin-top: 6px;
        text-align: center;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--text-primary);
      }

      .back-btn {
        background: transparent;
        border: none;
        color: var(--text-primary);
        padding: 4px;
        text-align: left;
        display: inline-flex;
        align-items: center;
      }

      .back-btn svg {
        width: 22px;
        height: 22px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .round-star {
        width: 16px;
        height: 16px;
        object-fit: contain;
      }

      .section { padding: 0 16px; margin-bottom: 16px; }

      .section-title {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .selection-grid {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 12px;
      }

      .selection-card {
        background: rgba(0, 0, 0, 0.2);
        border-radius: 14px;
        text-align: center;
        position: relative;
        overflow: hidden;
        height: 120px;
      }

      .selection-card img { width: 100%; height: 100%; object-fit: cover; display: block; }

      .selection-tag {
        position: absolute;
        right: 12px;
        bottom: 12px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 6px 16px;
        border-radius: 20px;
        font-size: 14px;
      }

      .conversation {
        font-size: 13px;
        color: var(--text-secondary);
        white-space: pre-wrap;
        line-height: 1.5;
      }

      .contact-card {
        background: rgba(255, 255, 255, 0.06);
        border-radius: 20px;
        padding: 16px;
        margin-bottom: 16px;
      }
    </style>
  </head>

  <body>
    <div class="main-container">
      <div class="chat-header brand-text" style="text-align:left;color:#8e8e8e">
        about nine
      </div>
      <button class="back-btn" onclick="navigateTo('history.html')">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15 6l-6 6 6 6" />
        </svg>
      </button>

      <div class="content">
        <div class="history-card" id="partnerCard"></div>
        <div class="tabs" id="roundTabs" style="margin-top:20px;"></div>
        <div id="roundContent" style="margin-top:20px;"></div>
      </div>
    </div>

    <nav id="bottomNav" class="bottom-nav"></nav>

    <script src="js/common.js"></script>

    <script type="module">
      import { rtdb, ref, onValue, push, set } from "/js/firebase.js";

      const userId = getFromLocal("user_id");
      if (!userId) navigateTo("index.html");

      const params    = new URLSearchParams(window.location.search);
      const partnerId = params.get("partnerId");
      if (!partnerId) navigateTo("history.html");

      let partner = null;
      let currentUserProfile = null;
      let presenceData = {};
      let roundsMap = {};
      let hadNo = false;
      let maxRound = 0;
      let isBlocked = false;

      function getPartnerName() {
        const first = partner?.first_name || partner?.firstName || "";
        const last  = partner?.last_name  || partner?.lastName  || "";
        return `${first} ${last}`.trim() || "your match";
      }

      function isOnline(uid) {
        const p = presenceData[uid];
        return p && p.online === true;
      }

      /* ── 라운드 탭 렌더 ──────────────────────────────── */

      function getRoundTabLabel(n) {
        return Array.from({ length: n })
          .map(() => `<img class="round-star" src="/images/asterisk.png" alt="*">`)
          .join("");
      }

      function renderRounds() {
        const tabEl     = document.getElementById("roundTabs");
        const contentEl = document.getElementById("roundContent");
        const rounds    = [1, 2, 3].filter((r) => roundsMap[r]);

        if (!rounds.length) { tabEl.innerHTML = contentEl.innerHTML = ""; return; }

        const activeRound = rounds.includes(maxRound) ? maxRound : rounds[0];

        tabEl.innerHTML = rounds.map((r) =>
          `<button class="tab ${r === activeRound ? "active" : ""}" data-round="${r}">${getRoundTabLabel(r)}</button>`
        ).join("");

        renderRoundContent(activeRound);

        tabEl.querySelectorAll(".tab").forEach((tab) => {
          tab.onclick = () => {
            tabEl.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
            tab.classList.add("active");
            renderRoundContent(Number(tab.dataset.round));
          };
        });
      }

      /* ── 라운드 콘텐츠 ───────────────────────────────── */

      function buildSelectionCard(selection, options, topic, label) {
        let img = "";
        if (Array.isArray(options) && options.length) {
          const opt = options.find((o) => o.category === selection);
          if (opt) img = `<img src="/images/${topic}/${opt.category}/${opt.fileName}" alt="${opt.fileName}">`;
        }
        return `
          <div class="selection-card">
            ${img}
            <div class="selection-tag">${label}</div>
          </div>
        `;
      }

      function formatSpeaker(rawSpeaker, talk) {
        if (!rawSpeaker) return "unknown";
        const partnerName = getPartnerName();
        const mapping = talk?.uid_mapping || {};

        if (rawSpeaker === userId)    return "you";
        if (rawSpeaker === partnerId) return partnerName;

        if (typeof rawSpeaker === "string") {
          const key = rawSpeaker.startsWith("uid_") ? rawSpeaker.replace("uid_", "") : rawSpeaker;
          const mapped = mapping[key];
          if (mapped === userId)    return "you";
          if (mapped === partnerId) return partnerName;
        }

        return rawSpeaker;
      }

      function renderRoundContent(roundNumber) {
        const contentEl = document.getElementById("roundContent");
        const talk = roundsMap[roundNumber];
        if (!talk) { contentEl.innerHTML = ""; return; }

        const score       = typeof talk.score === "number" ? talk.score : "--";
        const mySel       = talk.selections?.[userId]    || "";
        const partnerSel  = talk.selections?.[partnerId] || "";
        const partnerName = getPartnerName();

        const conversation = Array.isArray(talk.conversation)
          ? talk.conversation.map((t) => `${formatSpeaker(t.speaker, talk)}: ${t.text}`).join("\n")
          : "analysis pending";

        contentEl.innerHTML = `
          <div class="section">
            <div class="section-title">${roundLabel(talk.topic)}: ${score}</div>
            <div class="selection-grid">
              ${buildSelectionCard(mySel,       talk.options, talk.topic, "you")}
              ${buildSelectionCard(partnerSel,  talk.options, talk.topic, partnerName)}
            </div>
            <div class="conversation">${conversation}</div>
          </div>
        `;
      }

      /* ── 파트너 카드 ─────────────────────────────────── */

      function renderPartnerCard() {
        const cardEl  = document.getElementById("partnerCard");
        const name    = getPartnerName();
        const online  = isOnline(partnerId);

        const scoreHtml = [1, 2, 3].flatMap((r) => {
          const t = roundsMap?.[r];
          if (!t) return [];
          const s = t.score === null || t.score === undefined ? "--" : t.score;
          return [`<span>${roundLabel(t.topic)}: ${s}</span>`];
        }).join("") || "<span>no scores yet</span>";

        const actionHtml = maxRound >= 3
          ? `<div class="history-phone">${partner?.phone || "--"}</div>`
          : `<button class="primary history-btn" ${online && !isBlocked ? "" : "disabled"} onclick="startTalk()">start talk</button>`;

        const statusDot = isBlocked ? "blocked" : online ? "online" : "offline";

        cardEl.className = `history-card ${online ? "" : "offline"}`;
        cardEl.innerHTML = `
          <div class="card">
            <div style="flex:1;">
              <div class="history-card-header">
                <div class="history-name-row">
                  <span style="font-size:16px;font-weight:600;">${name}</span>
                  <span class="status-dot ${statusDot}"></span>
                </div>
              </div>
              <div class="history-meta">${scoreHtml}</div>
              ${actionHtml}
            </div>
          </div>
        `;
      }

      /* ── startTalk ───────────────────────────────────── */

      window.startTalk = async () => {
        if (hadNo || isBlocked) return;
        if (!partner) {
          const res = await apiCall(`/talks/history-detail/${partnerId}`);
          if (!res.success || !res.partner) return;
          partner = res.partner;
        }

        saveToLocal("chat_partner", { id: partnerId, ...partner });

        try {
          showLoading("preparing...");
          const roundRes = await apiCall("/talks/calculate-round", "POST", { partner_id: partnerId });
          hideLoading();

          if (!roundRes.success) { alert("failed to calculate round"); return; }

          const { round, topic, question, options } = roundRes;
          const newRequestRef = push(ref(rtdb, "match_requests"));
          const requestId = newRequestRef.key;
          saveToLocal("match_request_id", requestId);

          const matchData = {
            initiator: userId,
            receiver: partnerId,
            status: "waiting",
            round,
            topic,
            timestamp: Date.now(),
            initiator_profile: currentUserProfile || {
              id: userId,
              first_name: getFromLocal("firstName"),
              last_name: getFromLocal("lastName"),
              age: getFromLocal("age"),
              gender: getFromLocal("gender"),
            },
          };
          if (question) matchData.question = question;
          if (options)  matchData.options  = options;

          await set(newRequestRef, matchData);
          navigateTo(`waiting.html?mode=initiator&requestId=${requestId}`);
        } catch (error) {
          hideLoading();
          console.error("Failed to start talk:", error);
          alert("failed to start match request");
        }
      };

      /* ── 데이터 로드 ─────────────────────────────────── */

      async function loadData() {
        const profileRes = await apiCall("/users/profile");
        currentUserProfile = profileRes?.user || null;

        const detailRes = await apiCall(`/talks/history-detail/${partnerId}`);
        if (!detailRes.success) {
          alert(detailRes.message || "failed to load history");
          return;
        }

        isBlocked = detailRes.blocked === true;
        partner   = detailRes.partner || null;
        roundsMap = detailRes.rounds  || {};
        hadNo     = detailRes.had_no  === true;
        maxRound  = detailRes.max_round || 0;

        renderPartnerCard();
        renderRounds();
      }

      function listenPresence() {
        onValue(ref(rtdb, "presence"), (snap) => {
          presenceData = snap.val() || {};
          renderPartnerCard();
        });
      }

      window.onload = async () => {
        renderBottomNav("history");
        await loadData();
        listenPresence();
      };
    </script>
  </body>
</html>
