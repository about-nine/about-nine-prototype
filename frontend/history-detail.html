<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>History Detail</title>
    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="js/firebase.js"></script>

    <style>
      .history-phone {
        width: 100%;
        padding: 8px 20px;
        font-size: 14px;
        margin-top: 6px;
        text-align: center;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--text-primary);
      }

      .back-btn {
        background: transparent;
        border: none;
        color: var(--text-primary);
        padding: 4px;
        text-align: left;
        display: inline-flex;
        align-items: center;
      }

      .back-btn svg {
        width: 22px;
        height: 22px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .round-star {
        width: 16px;
        height: 16px;
        object-fit: contain;
      }

      .section { padding: 0 16px; margin-bottom: 16px; }

      .section-title {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .selection-grid {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 12px;
      }

      .selection-card {
        background: rgba(0, 0, 0, 0.2);
        border-radius: 14px;
        text-align: center;
        position: relative;
        overflow: hidden;
        height: 120px;
      }

      .selection-card img { width: 100%; height: 100%; object-fit: cover; display: block; }

      .selection-tag {
        position: absolute;
        right: 12px;
        bottom: 12px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 6px 16px;
        border-radius: 20px;
        font-size: 14px;
      }

      .conversation {
        font-size: 13px;
        color: var(--text-secondary);
        white-space: pre-wrap;
        line-height: 1.5;
      }

      .contact-card {
        background: rgba(255, 255, 255, 0.06);
        border-radius: 20px;
        padding: 16px;
        margin-bottom: 16px;
      }

      .history-action-buttons {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 14px;
      }

      .history-btn.secondary {
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: var(--text-primary);
      }

      .bottom-sheet-overlay {
        position: fixed;
        inset: 0;
        background: var(--overlay-bg);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
        z-index: 999;
      }

      .bottom-sheet-overlay.active {
        opacity: 1;
        pointer-events: auto;
      }

      .profile-bottom-sheet {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%) translateY(100%);
        width: 100%;
        max-width: 480px;
        height: 90vh;
        border-radius: 20px 20px 0 0;
        background: #1a1a1a;
        padding: 32px 20px calc(40px + var(--safe-bottom));
        z-index: 1000;
        transition: transform 0.3s;
        overflow-y: auto;
        font-family: "Merriweather", serif;
      }

      .profile-bottom-sheet.active {
        transform: translateX(-50%) translateY(0);
      }

      .profile-sheet-handle {
        width: 40px;
        height: 4px;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 2px;
        position: absolute;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
      }

      .profile-sheet-header {
        margin-top: 24px;
        margin-bottom: 20px;
      }

      .profile-sheet-name {
        font-size: 20px;
        font-weight: 700;
      }

      .profile-sheet-subtitle {
        font-size: 14px;
        color: var(--text-secondary);
        margin-top: 6px;
      }

      .profile-info-card {
        background: #2a2a2a;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 16px;
        padding: 18px 20px;
        margin-bottom: 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .profile-info-card.stacked {
        flex-direction: column;
        align-items: flex-start;
      }

      .profile-info-card.locked {
        filter: blur(5px);
        pointer-events: none;
      }

      .profile-info-row {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .profile-label {
        font-size: 13px;
        color: var(--text-secondary);
      }

      .profile-value {
        font-size: 14px;
        color: var(--text-primary);
      }

      .playlist-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .playlist-chip {
        background: #3a3a3a;
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 12px;
        color: white;
      }

      .profile-trials-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 8px;
      }

      .profile-trial-item {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .profile-trial-title {
        font-size: 12px;
        color: var(--text-secondary);
        text-transform: lowercase;
      }

      .profile-trial-score {
        font-size: 12px;
        font-weight: 600;
        color: var(--text-primary);
      }
    </style>
  </head>

  <body>
    <div class="main-container">
      <div class="chat-header brand-text" style="text-align:left;color:#8e8e8e">
        about nine
      </div>
      <button class="back-btn" onclick="goBackToHistory()">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15 6l-6 6 6 6" />
        </svg>
      </button>

      <div class="content">
        <div class="history-card" id="partnerCard"></div>
        <div class="tabs" id="roundTabs" style="margin-top:20px;"></div>
        <div id="roundContent" style="margin-top:20px;"></div>
      </div>
    </div>

    <nav id="bottomNav" class="bottom-nav"></nav>

    <div class="bottom-sheet-overlay" id="profileOverlay" onclick="closeProfileSheet()"></div>
    <div class="profile-bottom-sheet" id="profileSheet">
      <div class="profile-sheet-handle"></div>
      <div class="profile-sheet-header">
        <div class="profile-sheet-name" id="profileSheetName"></div>
        <div class="profile-sheet-subtitle" id="profileSheetSubtitle"></div>
      </div>
      <div id="profileSheetContent"></div>
    </div>

    <script src="js/common.js"></script>

    <script type="module">
      import { rtdb, ref, onValue, push, set } from "/js/firebase.js";

      const userId = getFromLocal("user_id");
      if (!userId) navigateTo("index.html");

      const params    = new URLSearchParams(window.location.search);
      const partnerId = params.get("partnerId");
      if (!partnerId) navigateTo("history.html");

      let partner = null;
      let currentUserProfile = null;
      let presenceData = {};
      let roundsMap = {};
      let hadNo = false;
      let maxRound = 0;
      let isBlocked = false;
      let isDeleted = false;
      let hasPrefill = false;
      let latestStatus = {};
      let unlockedRounds = 1;

      const HISTORY_PREFILL_KEY = "history_detail_prefill";

      function getPartnerName() {
        const first = partner?.first_name || partner?.firstName || "";
        const last  = partner?.last_name  || partner?.lastName  || "";
        return `${first} ${last}`.trim() || "your match";
      }

      function getPartnerFirstName() {
        const first = partner?.first_name || partner?.firstName;
        if (first && typeof first === "string") return first;
        const last = partner?.last_name || partner?.lastName;
        if (last && typeof last === "string") return last;
        return "your match";
      }

      function isOnline(uid) {
        const p = presenceData[uid];
        return p && p.online === true;
      }

      window.goBackToHistory = () => {
        if (window.history.length > 1) {
          window.history.back();
          return;
        }
        navigateTo("history.html");
      };

      function deriveGoNoState() {
        const pending = latestStatus?.pending === true;
        const someoneNo =
          latestStatus?.someone_no === true || hadNo || isBlocked || isDeleted;
        const mutualGo =
          latestStatus?.mutual_go === true && !someoneNo && !pending;
        return { pending, someoneNo, mutualGo };
      }

      function getOrdinal(roundNumber) {
        const map = { 1: "first", 2: "second", 3: "third" };
        return map[roundNumber] || `${roundNumber}th`;
      }

      /* ── 라운드 탭 렌더 ──────────────────────────────── */

      function getRoundTabLabel(n) {
        return Array.from({ length: n })
          .map(() => `<img class="round-star" src="/images/asterisk.png" alt="*">`)
          .join("");
      }

      function renderRounds() {
        const tabEl     = document.getElementById("roundTabs");
        const contentEl = document.getElementById("roundContent");
        const rounds    = [1, 2, 3].filter((r) => roundsMap[r]);

        if (!rounds.length) { tabEl.innerHTML = contentEl.innerHTML = ""; return; }

        const activeRound = rounds.includes(maxRound) ? maxRound : rounds[0];

        tabEl.innerHTML = rounds.map((r) =>
          `<button class="tab ${r === activeRound ? "active" : ""}" data-round="${r}">${getRoundTabLabel(r)}</button>`
        ).join("");

        renderRoundContent(activeRound);

        tabEl.querySelectorAll(".tab").forEach((tab) => {
          tab.onclick = () => {
            tabEl.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
            tab.classList.add("active");
            renderRoundContent(Number(tab.dataset.round));
          };
        });
      }

      function renderProfileTrials(rounds) {
        if (!rounds || typeof rounds !== "object") return "";
        return Object.entries(rounds)
          .map(([roundKey, info]) => {
            const label = roundLabel(info?.topic);
            const scoreText =
              info?.score === null || info?.score === undefined
                ? "--"
                : info.score;
            return `
              <div class="profile-trial-item">
                <div class="profile-trial-title">${getOrdinal(Number(roundKey))} trial (${label})</div>
                <div class="profile-trial-score">chemistry score ${scoreText}</div>
              </div>
            `;
          })
          .join("");
      }

      function getUnlockedRounds() {
        return Math.max(1, Math.min(unlockedRounds || 1, 3));
      }

      function generateProfileCards() {
        const unlocked = getUnlockedRounds();
        const age = partner?.age ?? "--";
        const gender = partner?.gender || "--";
        const drink = partner?.drink || "Not provided";
        const smoke = partner?.smoke || "Not provided";
        const marijuana = partner?.marijuana || "Not provided";
        const bio = partner?.bio || "Not provided";
        const moreInfo = partner?.more_info || "Not provided";
        const phone = partner?.phone || "--";
        const playlist = Array.isArray(partner?.playlist) ? partner.playlist : [];
        const lock1 = unlocked < 2 ? "locked" : "";
        const lock2 = unlocked < 3 ? "locked" : "";

        return `
          <div class="profile-info-card">
            <div class="profile-info-row">
              <span class="profile-label">${age} years old</span>
              <span class="profile-value">${gender}</span>
            </div>
          </div>
          <div class="profile-info-card stacked">
            <div class="profile-label">${getPartnerName()}'s playlist</div>
            <div class="playlist-chips">
              ${
                playlist.length
                  ? playlist
                      .slice(0, 6)
                      .map(
                        (t) =>
                          `<div class="playlist-chip">${t.name || "track"} - ${t.artist || "artist"}</div>`,
                      )
                      .join("")
                  : `<div class="playlist-chip">no playlist</div>`
              }
            </div>
          </div>
          <div class="profile-info-card stacked ${lock1}">
            <div class="profile-info-row"><span class="profile-label">drinking</span><span class="profile-value">${drink}</span></div>
            <div class="profile-info-row"><span class="profile-label">smoking</span><span class="profile-value">${smoke}</span></div>
            <div class="profile-info-row"><span class="profile-label">marijuana</span><span class="profile-value">${marijuana}</span></div>
          </div>
          <div class="profile-info-card stacked ${lock1}">
            <div class="profile-label">Additional information</div>
            <div class="profile-value">${moreInfo !== "Not provided" ? moreInfo : bio}</div>
          </div>
          <div class="profile-info-card ${lock2}">
            <div class="profile-info-row">
              <span class="profile-label">Contact</span>
              <span class="profile-value">${phone}</span>
            </div>
          </div>
        `;
      }

      /* ── 라운드 콘텐츠 ───────────────────────────────── */

      function buildSelectionCard(selection, options, topic, label) {
        let img = "";
        if (Array.isArray(options) && options.length) {
          const opt = options.find((o) => o.category === selection);
          if (opt) img = `<img src="/images/${topic}/${opt.category}/${opt.fileName}" alt="${opt.fileName}">`;
        }
        return `
          <div class="selection-card">
            ${img}
            <div class="selection-tag">${label}</div>
          </div>
        `;
      }

      function formatSpeaker(rawSpeaker, talk) {
        if (!rawSpeaker) return "unknown";
        const partnerName = getPartnerName();
        const partnerFirst = getPartnerFirstName();
        const mapping = talk?.uid_mapping || {};

        if (rawSpeaker === userId)    return "you";
        if (rawSpeaker === partnerId) return partnerFirst;

        if (typeof rawSpeaker === "string") {
          const key = rawSpeaker.startsWith("uid_") ? rawSpeaker.replace("uid_", "") : rawSpeaker;
          const mapped = mapping[key];
          if (mapped === userId)    return "you";
          if (mapped === partnerId) return partnerFirst;
        }

        return rawSpeaker;
      }

      function renderRoundContent(roundNumber) {
        const contentEl = document.getElementById("roundContent");
        const talk = roundsMap[roundNumber];
        if (!talk) { contentEl.innerHTML = ""; return; }

        const score       = typeof talk.score === "number" ? talk.score : "--";
        const mySel       = talk.selections?.[userId]    || "";
        const partnerSel  = talk.selections?.[partnerId] || "";
        const partnerName = getPartnerName();

        const conversation = Array.isArray(talk.conversation)
          ? talk.conversation.map((t) => `${formatSpeaker(t.speaker, talk)}: ${t.text}`).join("\n")
          : "analysis pending";

        const selectionHtml = roundNumber === 3
          ? ""
          : `
            <div class="selection-grid">
              ${buildSelectionCard(mySel,       talk.options, talk.topic, "you")}
              ${buildSelectionCard(partnerSel,  talk.options, talk.topic, partnerName)}
            </div>
          `;

        contentEl.innerHTML = `
          <div class="section">
            <div class="section-title">${roundLabel(talk.topic)}: ${score}</div>
            ${selectionHtml}
            <div class="conversation">${conversation}</div>
          </div>
        `;
      }

      /* ── 파트너 카드 ─────────────────────────────────── */

      function renderPartnerCard() {
        const cardEl  = document.getElementById("partnerCard");
        const name    = getPartnerName();
        const online  = isOnline(partnerId);
        const goState = deriveGoNoState();

        const scoreHtml = [1, 2, 3].flatMap((r) => {
          const t = roundsMap?.[r];
          if (!t) return [];
          const s = t.score === null || t.score === undefined ? "--" : t.score;
          return [`<span>${roundLabel(t.topic)}: ${s}</span>`];
        }).join("") || "<span>no scores yet</span>";

        const viewProfileDisabled =
          !goState.mutualGo || isBlocked || isDeleted;
        const startDisabled =
          maxRound >= 3 ||
          !online ||
          isBlocked ||
          isDeleted ||
          goState.pending ||
          goState.someoneNo;

        const viewProfileButton = `
          <button class="secondary history-btn" ${viewProfileDisabled ? "disabled" : ""} onclick="openProfileSheet()">
            view profile
          </button>
        `;

        const startTalkButton =
          maxRound >= 3
            ? ""
            : `<button class="primary history-btn" ${startDisabled ? "disabled" : ""} onclick="startTalk()">start talk</button>`;

        const actionButtons = `
          <div class="history-action-buttons">
            ${viewProfileButton}
            ${startTalkButton}
          </div>
        `;

        const contactHtml =
          maxRound >= 3
            ? `<div class="history-phone">${partner?.phone || "--"}</div>`
            : "";

        const statusDot = goState.someoneNo
          ? "blocked"
          : isDeleted
            ? "offline"
            : isBlocked
              ? "blocked"
              : online
                ? "online"
                : "offline";

        cardEl.className = `history-card ${online && statusDot !== "blocked" ? "" : "offline"}`;
        cardEl.innerHTML = `
          <div class="card">
            <div style="flex:1;">
              <div class="history-card-header">
                <div class="history-name-row">
                  <span style="font-size:16px;font-weight:600;">${name}</span>
                  <span class="status-dot ${statusDot}"></span>
                </div>
              </div>
              <div class="history-meta">${scoreHtml}</div>
              ${actionButtons}
              ${contactHtml}
            </div>
          </div>
        `;
      }

      /* ── startTalk ───────────────────────────────────── */

      window.startTalk = async () => {
        const goState = deriveGoNoState();
        if (
          hadNo ||
          isBlocked ||
          isDeleted ||
          goState.pending ||
          goState.someoneNo
        )
          return;
        if (!partner) {
          const res = await apiCall(`/talks/history-detail/${partnerId}`);
          if (!res.success || !res.partner) return;
          partner = res.partner;
        }

        saveToLocal("chat_partner", { id: partnerId, ...partner });

        try {
          showLoading("preparing...");
          const roundRes = await apiCall("/talks/calculate-round", "POST", { partner_id: partnerId });
          hideLoading();

          if (!roundRes.success) { alert("failed to calculate round"); return; }

          const { round, topic, question, options } = roundRes;
          const newRequestRef = push(ref(rtdb, "match_requests"));
          const requestId = newRequestRef.key;
          saveToLocal("match_request_id", requestId);

          const matchData = {
            initiator: userId,
            receiver: partnerId,
            status: "waiting",
            round,
            topic,
            timestamp: Date.now(),
            initiator_profile: currentUserProfile || {
              id: userId,
              first_name: getFromLocal("firstName"),
              last_name: getFromLocal("lastName"),
              age: getFromLocal("age"),
              gender: getFromLocal("gender"),
            },
          };
          if (question) matchData.question = question;
          if (options)  matchData.options  = options;

          await set(newRequestRef, matchData);
          navigateTo(`waiting.html?mode=initiator&requestId=${requestId}`);
        } catch (error) {
          hideLoading();
          console.error("Failed to start talk:", error);
          alert("failed to start match request");
        }
      };

      window.openProfileSheet = () => {
        const goState = deriveGoNoState();
        if (!goState.mutualGo || isBlocked || isDeleted) return;
        const overlay = document.getElementById("profileOverlay");
        const sheet = document.getElementById("profileSheet");
        document.getElementById("profileSheetName").textContent = getPartnerName();
        const trialsMarkup = renderProfileTrials(roundsMap);
        document.getElementById("profileSheetSubtitle").innerHTML = trialsMarkup
          ? `<div class="profile-trials-list">${trialsMarkup}</div>`
          : `${getOrdinal(getUnlockedRounds())} trial unlocked`;
        document.getElementById("profileSheetContent").innerHTML = generateProfileCards();
        overlay?.classList.add("active");
        sheet?.classList.add("active");
      };

      window.closeProfileSheet = () => {
        document.getElementById("profileOverlay")?.classList.remove("active");
        document.getElementById("profileSheet")?.classList.remove("active");
      };

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeProfileSheet();
      });

      /* ── 데이터 로드 ─────────────────────────────────── */

      function applyPrefill(prefill) {
        if (!prefill) return false;
        if (prefill.partnerId !== partnerId) return false;
        const summary = prefill.summary;
        if (!summary) return false;

        partner = {
          first_name: summary.first_name,
          last_name: summary.last_name,
          phone: summary.phone,
        };
        roundsMap = summary.talks_by_round || {};
        hadNo = summary.had_no === true;
        isBlocked = summary.blocked === true;
        maxRound = [1, 2, 3].reduce((acc, round) => (
          roundsMap[round] ? Math.max(acc, round) : acc
        ), 0);
        latestStatus = {};
        unlockedRounds = Math.max(1, Math.min(maxRound || 1, 3));
        renderPartnerCard();
        renderRounds();
        hasPrefill = true;
        return true;
      }

      function clearPrefill() {
        try { removeFromLocal(HISTORY_PREFILL_KEY); } catch {}
      }

      async function loadData() {
        const profileRes = await apiCall("/users/profile");
        currentUserProfile = profileRes?.user || null;

        const detailRes = await apiCall(`/talks/history-detail/${partnerId}`);
        if (!detailRes.success) {
          alert(detailRes.message || "failed to load history");
          return;
        }

        isBlocked = detailRes.blocked === true;
        isDeleted = detailRes.deleted === true;
        partner   = detailRes.partner || null;
        roundsMap = detailRes.rounds  || {};
        hadNo     = detailRes.had_no  === true;
        maxRound  = detailRes.max_round || 0;
        latestStatus = detailRes.latest_status || {};
        unlockedRounds = Math.max(1, Math.min(maxRound || 1, 3));

        renderPartnerCard();
        renderRounds();
      }

      function listenPresence() {
        onValue(ref(rtdb, "presence"), (snap) => {
          presenceData = snap.val() || {};
          renderPartnerCard();
        });
      }

      window.onload = async () => {
        renderBottomNav("history");
        const prefill = (() => {
          try {
            const raw = rawGetItem(HISTORY_PREFILL_KEY);
            if (!raw) return null;
            if (typeof raw === "string") return JSON.parse(raw);
            return raw;
          } catch {
            return null;
          }
        })();

        if (applyPrefill(prefill)) {
          clearPrefill();
        }

        await loadData();
        listenPresence();
      };
    </script>
  </body>
</html>
