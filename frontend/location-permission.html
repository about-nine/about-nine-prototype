<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Location Permission</title>

    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="js/firebase.js"></script>
  </head>

  <body>
    <div class="container">
      <div>
        <div class="brand-text">
          we uses your location<br />to recommend nearby users<br /><br />
          users within 10km<br />of your current location<br />may appear in the list
        </div>

        <span id="error" class="error hidden"></span>
      </div>

      <button id="locationActionBtn" type="button" onclick="requestLocation()">enable location</button>
    </div>

    <script src="js/common.js"></script>

    <script>
      const FORCE_VOICE_KEY = "force_voice_onboarding";

      function isVoiceMode() {
        const params = new URLSearchParams(window.location.search);
        const voiceParam = params.get("voice");
        if (voiceParam === "1") {
          saveToLocal(FORCE_VOICE_KEY, true);
          return true;
        }
        if (voiceParam === "0") {
          saveToLocal(FORCE_VOICE_KEY, false);
          return false;
        }
        const stored = getFromLocal(FORCE_VOICE_KEY);
        if (stored === true) return true;
        if (stored === false) return false;
        saveToLocal(FORCE_VOICE_KEY, true);
        return true;
      }

      async function resolveNextRoute() {
        const completed = getFromLocal("onboarding_completed");
        if (completed === true) {
          return "lounge.html";
        }
        if (completed === false) {
          return isVoiceMode() ? "onboarding-voice.html" : "onboarding-chat.html";
        }
        try {
          const profileRes = await apiCall("/users/profile");
          const isDone = !!profileRes?.user?.onboarding_completed;
          saveToLocal("onboarding_completed", isDone);
          return isDone
            ? "lounge.html"
            : isVoiceMode()
              ? "onboarding-voice.html"
              : "onboarding-chat.html";
        } catch (e) {
          return isVoiceMode() ? "onboarding-voice.html" : "onboarding-chat.html";
        }
      }

      // Test toggle: tap the title 5 times quickly to enable/disable voice onboarding.
      (function enableVoiceToggle() {
        const title = document.querySelector(".brand-text");
        if (!title) return;
        let taps = 0;
        let timer = null;
        title.addEventListener("click", () => {
          taps += 1;
          clearTimeout(timer);
          timer = setTimeout(() => { taps = 0; }, 1500);
          if (taps >= 3) {
            taps = 0;
            const enabled = getFromLocal(FORCE_VOICE_KEY) === true;
            saveToLocal(FORCE_VOICE_KEY, !enabled);
            showError(
              "error",
              `voice onboarding ${!enabled ? "enabled" : "disabled"} (test mode)`
            );
          }
        });
      })();

      async function requestLocation() {
        hideError("error");

        if (!navigator.geolocation) {
          showError(
            "error",
            "your browser doesn’t support location. you can continue without it."
          );
          setLocationAction("continue");
          return;
        }

        try {
          if (navigator.permissions?.query) {
            const status = await navigator.permissions.query({ name: "geolocation" });
            if (status.state === "denied") {
              showDeniedNotice();
              return;
            }
          }
        } catch {}

        showLoading("getting location...");

        navigator.geolocation.getCurrentPosition(
          async (pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;

            removeFromLocal("location_denied");
            saveToLocal("location", { lat, lng });

            try {
              await apiCall("/users/update-location", "POST", { lat, lng });

              hideLoading();
              const nextRoute = await resolveNextRoute();
              navigateTo(nextRoute);
            } catch (e) {
              hideLoading();
              showError("error", "failed to save location. try again.");
            }
          },
          (err) => {
            hideLoading();
            removeFromLocal("location");
            saveToLocal("location_denied", true);
            if (err?.code === 1) {
              showDeniedNotice();
              return;
            }
            showError(
              "error",
              "we couldn't get your location right now. you can continue without it."
            );
            setLocationAction("continue");
          },
          {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0,
          }
        );
      }

      function showDeniedNotice() {
        showError(
          "error",
          "location access is blocked in your browser settings. you can enable it there or continue without it."
        );
        setLocationAction("continue");
      }

      function continueWithoutLocation(e) {
        if (e?.preventDefault) e.preventDefault();
        saveToLocal("location_denied", true);
        resolveNextRoute().then(navigateTo);
      }

      function setLocationAction(mode) {
        const btn = document.getElementById("locationActionBtn");
        if (!btn) return;
        if (mode === "continue") {
          btn.textContent = "continue";
          btn.onclick = () => continueWithoutLocation();
          return;
        }
        btn.textContent = "enable location";
        btn.onclick = () => requestLocation();
      }
    </script>
  </body>
</html>
