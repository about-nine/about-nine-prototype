<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Waiting</title>
    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="js/firebase.js"></script>

    <style>
      .waiting-container {
        width: 100%;
        max-width: 480px;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        text-align: center;
        position: relative;
        font-family: "Merriweather", serif;
        padding: calc(60px + var(--safe-top)) 20px
          calc(40px + var(--safe-bottom));
      }

      /* 우측 상단 타이머 */
      .timer {
        position: absolute;
        top: 30px;
        right: 40px;
        color: #8e8e8e;
        font-size: 14px;
      }

      /* 상단 텍스트 영역 */
      .waiting-body {
        flex: 1;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      .waiting-stack {
        display: flex;
        flex-direction: column;
        align-items: center;
        row-gap: 20px;
      }

      .waiting-header {
        flex: 0 0 auto;
      }

      .waiting-title {
        font-size: 20px;
        font-weight: 600;
        color: var(--text-primary);
        line-height: 1.4;
        margin: 0;
        min-height: 64px;
      }

      .partner-name {
        text-decoration: underline;
      }

      /* 중앙 애니메이션 */
      .waiting-animation {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
      }

      .pulse-circle {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: linear-gradient(135deg, #ff6ec4 0%, #7873f5 100%);
        animation: pulse 2s ease-in-out infinite;
        box-shadow: 0 0 40px rgba(255, 110, 196, 0.6);
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.1);
          opacity: 0.8;
        }
      }

      /* 하단 텍스트 & 버튼 영역 */
      .waiting-question {
        font-size: 20px;
        color: var(--text-primary);
        line-height: 1.5;
        min-height: 48px;
        margin: 0;
      }

      .waiting-buttons {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        width: 100%;
        margin-top: auto;
      }

      @supports (height: 100svh) {
        .waiting-container {
          height: 100svh;
        }
      }

      @media (max-width: 420px) {
        .waiting-container {
          padding: calc(48px + var(--safe-top)) 16px
            calc(32px + var(--safe-bottom));
        }

        .timer {
          top: 20px;
          right: 20px;
          font-size: 12px;
        }

        .waiting-title {
          font-size: 18px;
          min-height: 60px;
        }

        .pulse-circle {
          width: 80px;
          height: 80px;
        }

        .waiting-question {
          margin-top: 0;
          font-size: 18px;
          min-height: 48px;
        }
      }

      @media (max-width: 360px) {
        .waiting-title {
          font-size: 16px;
          min-height: 54px;
        }

        .waiting-question {
          font-size: 16px;
        }
      }

      @media (max-height: 700px) {
        .waiting-container {
          padding: calc(40px + var(--safe-top)) 16px
            calc(24px + var(--safe-bottom));
        }
      }
    </style>
  </head>

  <body>
    <div class="waiting-container">
      <!-- 타이머 -->
      <div class="timer" id="timer">60</div>

      <!-- 상단 -->
      <div class="waiting-body">
        <div class="waiting-stack">
          <div class="waiting-header">
            <div class="waiting-title" id="waitingTitle"></div>
          </div>
          <div class="waiting-animation">
            <div class="pulse-circle"></div>
          </div>
          <div class="waiting-question" id="waitingQuestion"></div>
        </div>
      </div>

      <div class="waiting-buttons" id="waitingButtons"></div>
    </div>

    <script src="js/common.js"></script>

    <script type="module">
      import { rtdb, ref, onValue, update, get, remove } from "/js/firebase.js";

      (() => {
        const userId = getFromLocal("user_id");
        if (!userId) {
          navigateTo("index.html");
        }

        // URL 파라미터
        const params = new URLSearchParams(window.location.search);
        const mode = params.get("mode"); // "initiator" or "receiver"
        const requestId = params.get("requestId");

        if (!mode || !requestId) {
          alert("invalid request");
          navigateTo("lounge.html");
          return;
        }

        let partner = getFromLocal("chat_partner");
        let selfAction = null;
        const getPartnerName = () => {
          const partnerFirst = partner?.first_name || partner?.firstName || "";
          const partnerLast = partner?.last_name || partner?.lastName || "";
          return `${partnerFirst} ${partnerLast}`.trim() || "your match";
        };

        /* ====================== 🔥 주제 설정 ====================== */

        const TOPICS = {
          1: {
            name: "food",
            question: 
              "let's see if you two vibe<br>when it comes to food",
          },
          2: {
            name: "visual",
            question:
              "let's see if you two vibe<br>when it comes to visual taste",
          },
          3: {
            name: "life",
            question:
              "feel free to be open about<br>your expectations for life",
          },
        };

        /* ====================== 🔥 매칭 요청 로드 & UI 초기화 ====================== */

        async function initUI() {
          try {
            // 🔥 Firebase에서 match_request 읽기
            const requestRef = ref(rtdb, `match_requests/${requestId}`);
            const snapshot = await get(requestRef);

            if (!snapshot.exists()) {
              alert("request not found");
              navigateTo("lounge.html");
              return;
            }

            const matchRequest = snapshot.val();
            const round = matchRequest.round || 1;
            const topic = matchRequest.topic || "food";

            console.log(`🎯 Match Request - Round ${round}: ${topic}`);

            if (
              !partner &&
              mode === "receiver" &&
              matchRequest.initiator_profile
            ) {
              partner = matchRequest.initiator_profile;
              saveToLocal("chat_partner", partner);
            }

            const partnerName = getPartnerName();

            // 🔥 라운드에 맞는 질문 표시
            const topicData = TOPICS[round];
            const question = topicData.question;

            const titleEl = document.getElementById("waitingTitle");
            const questionEl = document.getElementById("waitingQuestion");
            const buttonsEl = document.getElementById("waitingButtons");

            if (mode === "initiator") {
              // 내가 요청한 경우
              titleEl.innerHTML = `waiting for a chat with<br><span class="partner-name">${partnerName}</span>`;
              questionEl.innerHTML = question;
              buttonsEl.innerHTML = ""; // 버튼 없음

              if (matchRequest.review_auto === true) {
                setTimeout(async () => {
                  try {
                    await update(requestRef, { status: "accepted" });
                  } catch (e) {
                    console.error("Failed to auto-accept review match:", e);
                  }
                }, 900);
              }
            } else {
              // 상대가 요청한 경우
              titleEl.innerHTML = `<span class="partner-name">${partnerName}</span><br>wants to start a chat<br>with you`;
              questionEl.innerHTML = question;
              buttonsEl.innerHTML = `
            <div class="bottom-text" onclick="rejectMatch()" style="cursor: pointer;">maybe later</div>
            <button onclick="acceptMatch()">enter</button>
          `;
            }

            // 🔥 localStorage에 저장 (option-select.html에서 사용)
            saveToLocal("current_round", round);
            saveToLocal("current_topic", topic);

            // Firebase 리스닝 시작
            startListening();
          } catch (error) {
            console.error("Failed to load match request:", error);
            alert("failed to load match request");
            navigateTo("lounge.html");
          }
        }

        /* ====================== 타이머 ====================== */

        let timeLeft = 60;
        const timerEl = document.getElementById("timer");

        const timerInterval = setInterval(() => {
          timeLeft--;
          timerEl.textContent = timeLeft;

          if (timeLeft <= 0) {
            clearInterval(timerInterval);
            handleTimeout();
          }
        }, 1000);

        /* ====================== Firebase 리스닝 ====================== */

        function startListening() {
          const requestRef = ref(rtdb, `match_requests/${requestId}`);

          onValue(requestRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) {
              clearInterval(timerInterval);
              if (selfAction === "timeout") {
                alert("request timed out");
              } else if (!selfAction) {
                alert("the other person cancelled or the request timed out");
              }
              navigateTo("lounge.html");
              return;
            }

            if (data.status === "accepted") {
              clearInterval(timerInterval);
              saveToLocal("match_request_id", requestId);
              navigateTo(`option-select.html?requestId=${requestId}`);
            } else if (data.status === "rejected") {
              clearInterval(timerInterval);
              if (!selfAction) {
                alert("the other person declined");
              }
              navigateTo("lounge.html");
            } else if (data.status === "timeout") {
              clearInterval(timerInterval);
              if (selfAction === "timeout") {
                alert("request timed out");
              } else {
                alert("the other person timed out");
              }
              navigateTo("lounge.html");
            }
          });
        }

        /* ====================== 액션 ====================== */

        // 수락
        window.acceptMatch = async function () {
          try {
            const requestRef = ref(rtdb, `match_requests/${requestId}`);
            await update(requestRef, {
              status: "accepted",
            });
          } catch (e) {
            console.error("Failed to accept match:", e);
            alert("failed to accept request");
            navigateTo("lounge.html");
          }
        };

        // 거절
        window.rejectMatch = async function () {
          selfAction = "rejected";
          try {
            const requestRef = ref(rtdb, `match_requests/${requestId}`);
            await update(requestRef, {
              status: "rejected",
            });
            await remove(requestRef);
            navigateTo("lounge.html");
          } catch (e) {
            console.error("Failed to reject match:", e);
            alert("failed to reject request");
            navigateTo("lounge.html");
          }
        };

        // 타임아웃
        async function handleTimeout() {
          selfAction = "timeout";
          try {
            const requestRef = ref(rtdb, `match_requests/${requestId}`);
            await update(requestRef, {
              status: "timeout",
            });
            await remove(requestRef);
            navigateTo("lounge.html");
          } catch (e) {
            console.error("Failed to timeout match:", e);
            navigateTo("lounge.html");
          }
        }

        /* ====================== 정리 ====================== */

        window.addEventListener("beforeunload", () => {
          clearInterval(timerInterval);
        });

        /* ====================== Init ====================== */

        window.onload = () => {
          initUI();
        };
      })();
    </script>
  </body>
</html>
