<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Call Ended</title>
    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="js/firebase.js"></script>

    <style>
      .end-container {
        width: 100%;
        max-width: 480px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        padding: calc(256px + var(--safe-top)) 20px
          calc(30px + var(--safe-bottom));
        font-family: "Merriweather", serif;
        text-align: center;
      }

      .end-title {
        font-size: 24px;
        font-weight: 300;
        margin-bottom: 20px;
        color: var(--text-primary);
        font-family: "Merriweather", serif;
      }

      .end-duration {
        font-size: 18px;
        color: var(--text-secondary);
        margin-bottom: 60px;
      }

      .analysis-progress {
        width: 100%;
        max-width: 320px;
        margin: -40px auto 40px;
        text-align: center;
        color: var(--text-secondary);
        font-size: 12px;
      }

      .analysis-bar {
        width: 100%;
        height: 6px;
        border-radius: 999px;
        background: #2a2a2a;
        overflow: hidden;
        margin-top: 8px;
      }

      .analysis-bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #ff6ec4, #7873f5);
        transition: width 0.4s ease;
      }

      .analysis-steps {
        margin: 14px auto 0;
        width: 100%;
        max-width: 320px;
        text-align: left;
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-size: 12px;
        color: var(--text-secondary);
      }

      .analysis-step {
        opacity: 0;
        transform: translateY(4px);
        animation: stepIn 0.35s ease forwards;
      }

      @keyframes stepIn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @supports (height: 100svh) {
        .end-container {
          min-height: 100svh;
        }
      }

      @media (max-width: 420px) {
        .end-container {
          padding: calc(180px + var(--safe-top)) 16px
            calc(24px + var(--safe-bottom));
        }

        .end-title {
          font-size: 22px;
        }

        .end-duration {
          font-size: 16px;
          margin-bottom: 40px;
        }

        .analysis-progress {
          margin: -20px auto 30px;
        }
      }

      @media (max-width: 360px) {
        .end-container {
          padding: calc(150px + var(--safe-top)) 14px
            calc(20px + var(--safe-bottom));
        }

        .end-title {
          font-size: 20px;
        }
      }

      @media (max-height: 700px) {
        .end-container {
          padding: calc(140px + var(--safe-top)) 16px
            calc(20px + var(--safe-bottom));
        }

        .end-duration {
          margin-bottom: 30px;
        }
      }
    </style>
  </head>

  <body>
    <div class="end-container">
      <div>
        <h1 class="end-title">the call has ended</h1>
        <div class="end-duration" id="callDuration">call duration --:--</div>
        <div class="analysis-progress hidden" id="analysisProgress">
          <div id="analysisText">analyzing... 0%</div>
          <div class="analysis-bar">
            <div class="analysis-bar-fill" id="analysisBarFill"></div>
          </div>
          <div class="analysis-steps" id="analysisSteps"></div>
        </div>
      </div>
      <button id="nextBtn" class="primary" onclick="handleNext()" disabled>
        next
      </button>
    </div>

    <script src="js/common.js"></script>

    <script type="module">
      import { rtdb, ref, get, remove } from "/js/firebase.js";

      const userId = getFromLocal("user_id");
      const params = new URLSearchParams(window.location.search);
      const requestIdParam = params.get("requestId");
      const requestId = requestIdParam || getFromLocal("match_request_id");
      if (requestIdParam) {
        saveToLocal("match_request_id", requestIdParam);
      }
      const callDurationEl = document.getElementById("callDuration");

      let matchData = null;
      let progressTimer = null;
      let progressValue = 0;
      let progressStartAt = null;
      const ANALYSIS_EXPECTED_MS = 45000;
      const ANALYSIS_MAX_WAIT_MS = 5 * 60 * 1000;
      const ANALYSIS_MAX_PROGRESS = 95;
      let progressLabel = "analyzing...";
      let talkId = getFromLocal("current_talk_id");
      let stepQueue = [];
      let stepActive = false;
      let stepTimer = null;
      let lastStepMessage = "";
      const STEP_DELAY_MS = 350;
      const stepEl = document.getElementById("analysisSteps");

      function resetSteps() {
        stepQueue = [];
        stepActive = false;
        lastStepMessage = "";
        if (stepTimer) {
          clearTimeout(stepTimer);
          stepTimer = null;
        }
        if (stepEl) stepEl.innerHTML = "";
      }

      function addStep(message) {
        if (!stepEl || !message || message === lastStepMessage) return;
        lastStepMessage = message;
        stepQueue = [message];
        flushStepQueue();
      }

      function flushStepQueue() {
        if (stepActive || stepQueue.length === 0) return;
        stepActive = true;
        const message = stepQueue.shift();
        stepEl.innerHTML = "";
        const line = document.createElement("div");
        line.className = "analysis-step";
        line.textContent = message;
        stepEl.appendChild(line);
        stepTimer = setTimeout(() => {
          stepActive = false;
          if (stepQueue.length > 0) flushStepQueue();
        }, STEP_DELAY_MS);
      }

      function updateStepsFromTalk(talk) {
        if (!talk) return;
        let message = "";

        if (isAnalysisComplete(talk)) {
          message = "Analysis complete. You're ready to continue.";
        } else if (talk?.analysis_status === "failed") {
          message = "Still processing. We'll keep trying...";
        } else if (talk?.analysis_status === "running") {
          message = "Crunching chemistry signals...";
        } else if (!hasRecordings(talk) && !hasConversation(talk)) {
          message = "Checking recording uploads...";
        } else if (hasRecordings(talk) && !hasConversation(talk)) {
          message = "Building your transcript from audio...";
        } else if (hasConversation(talk)) {
          message = "Transcript ready. Analyzing conversation...";
        }

        if (message) addStep(message);
      }

      /* ================= 초기화 ================= */

      window.onload = async () => {
        if (!userId || (!requestId && !talkId)) {
          console.error("❌ 필수 데이터 없음");
          alert("invalid request");
          navigateTo("lounge.html");
          return;
        }

        try {
          // RTDB에서 match_request 데이터 가져오기
          if (requestId) {
            const snap = await get(ref(rtdb, `match_requests/${requestId}`));
            matchData = snap.val();

            if (!matchData) {
              console.warn("⚠️ match_request 데이터 없음, fallback 진행");
            } else {
              console.log("✅ match_request 데이터 로드:", matchData);
              const serverTalkId = matchData?.talk_id;
              if (serverTalkId && serverTalkId !== talkId) {
                talkId = serverTalkId;
                saveToLocal("current_talk_id", talkId);
              }
            }
          }

          // 통화 시간 표시
          displayDuration();

          await processAnalysis();

          // NOTE: keep match_request for other participant (cleanup after go/no)
        } catch (e) {
          console.error("❌ 초기화 실패:", e);
          alert("failed to load request");
          navigateTo("lounge.html");
        }
      };

      /* ================= 통화 시간 표시 ================= */

      function toTimestamp(value) {
        const num = Number(value);
        return Number.isFinite(num) ? num : null;
      }

      function displayDuration() {
        if (!callDurationEl) return;
        const callStarted =
          toTimestamp(matchData?.call_started_at) ??
          toTimestamp(getFromLocal("call_start_ms"));
        const callEnded =
          toTimestamp(matchData?.ended_at) ??
          toTimestamp(getFromLocal("call_end_ms"));

        if (!callStarted || !callEnded) {
          callDurationEl.textContent = "call duration --:--";
          return;
        }

        let durationMs = callEnded - callStarted;
        if (!Number.isFinite(durationMs) || durationMs < 0) {
          const fallbackStart = toTimestamp(getFromLocal("call_start_ms"));
          const fallbackEnd = toTimestamp(getFromLocal("call_end_ms"));
          if (fallbackStart && fallbackEnd && fallbackEnd >= fallbackStart) {
            durationMs = fallbackEnd - fallbackStart;
          }
        }

        if (!Number.isFinite(durationMs) || durationMs < 0) {
          callDurationEl.textContent = "call duration --:--";
          return;
        }
        const durationSec = Math.floor(durationMs / 1000);
        const m = Math.floor(durationSec / 60);
        const s = durationSec % 60;

        callDurationEl.textContent = `call duration ${m}:${String(s).padStart(
          2,
          "0",
        )}`;
      }

      function displayDurationFromTalk(talk) {
        if (!callDurationEl || !talk) return;
        const callStarted = toTimestamp(talk?.call_started_at);
        const callEnded = toTimestamp(talk?.call_ended_at);
        if (!callStarted || !callEnded) return;
        const durationMs = callEnded - callStarted;
        if (!Number.isFinite(durationMs) || durationMs < 0) return;
        const durationSec = Math.floor(durationMs / 1000);
        const m = Math.floor(durationSec / 60);
        const s = durationSec % 60;
        callDurationEl.textContent = `call duration ${m}:${String(s).padStart(
          2,
          "0",
        )}`;
      }

      /* ================= Next 버튼 ================= */

      window.handleNext = async () => {
        if (getFromLocal("voice_result_mode") === "true") {
          removeFromLocal("voice_result_mode");
          navigateTo("talk-result-voice.html");
        } else {
          navigateTo("talk-result.html");
        }
      };

      /* ================= 음성 모드 트리거 (triple-tap) ================= */

      (function () {
        let tapCount = 0;
        let tapTimer = null;
        const titleEl = document.querySelector(".end-title");
        if (!titleEl) return;
        titleEl.addEventListener("click", () => {
          tapCount++;
          clearTimeout(tapTimer);
          if (tapCount >= 3) {
            tapCount = 0;
            saveToLocal("voice_result_mode", "true");
            titleEl.style.transition = "opacity 0.2s";
            titleEl.style.opacity = "0.3";
            setTimeout(() => {
              titleEl.style.opacity = "";
              const btn = document.getElementById("nextBtn");
              if (btn && !btn.disabled) btn.textContent = "next (voice ✦)";
            }, 200);
          } else {
            tapTimer = setTimeout(() => { tapCount = 0; }, 800);
          }
        });
      })();

      /* ================= 🔥 Firestore 저장 (top-level collection) ================= */

      async function saveTalkHistory() {
        if (!requestId) {
          throw new Error("request_id missing");
        }
        const res = await apiCall("/talks/save-history", "POST", {
          request_id: requestId,
        });
        if (!res.success) {
          throw new Error(res.message || "failed to save talk history");
        }
        talkId = res.talk_id;
        saveToLocal("current_talk_id", talkId);
      }

      /* ================= 분석 요청 ================= */

      async function analyzeTalk() {
        if (!talkId) {
          throw new Error("talk_id missing");
        }
        return await apiCall("/analysis/talk", "POST", {
          talk_id: talkId,
        });
      }

      function startProgress(startedAt = null) {
        const el = document.getElementById("analysisProgress");
        const textEl = document.getElementById("analysisText");
        const barEl = document.getElementById("analysisBarFill");

        el.classList.remove("hidden");
        resetSteps();
        addStep("Preparing your results...");
        progressValue = 0;
        progressStartAt = startedAt || Date.now();
        progressLabel = "analyzing...";
        textEl.textContent = `${progressLabel} 0%`;
        barEl.style.width = "0%";

        progressTimer = setInterval(() => {
          const elapsed = Date.now() - progressStartAt;
          const ratio = elapsed / ANALYSIS_EXPECTED_MS;
          progressValue = Math.min(
            ANALYSIS_MAX_PROGRESS,
            Math.max(2, Math.floor(ratio * 100)),
          );
          textEl.textContent = `${progressLabel} ${progressValue}%`;
          barEl.style.width = `${progressValue}%`;
        }, 600);
      }

      function stopProgress(success = true, reason = "failed") {
        const el = document.getElementById("analysisProgress");
        const textEl = document.getElementById("analysisText");
        const barEl = document.getElementById("analysisBarFill");

        if (progressTimer) clearInterval(progressTimer);
        progressTimer = null;

        if (success) {
          addStep("Analysis complete. You're ready to continue.");
          progressValue = 100;
          textEl.textContent = "analysis complete 100%";
          barEl.style.width = "100%";
          setTimeout(() => {
            el.classList.add("hidden");
          }, 600);
        } else {
          if (reason === "timeout" || reason === "pending") {
            addStep("Still processing in the background.");
            textEl.textContent =
              "analysis is taking longer. you can continue.";
          } else {
            addStep("Something went wrong, but you can continue.");
            textEl.textContent = "analysis failed. you can continue.";
          }
          barEl.style.width = `${progressValue}%`;
        }
      }

      async function fetchTalk() {
        if (!talkId) {
          throw new Error("talk_id missing");
        }
        const res = await apiCall(`/talks/history/${talkId}`);
        if (!res.success || !res.talk) {
          throw new Error("talk_history not found");
        }
        return res.talk;
      }

      function isAnalysisComplete(talk) {
        const score = talk?.analysis?.chemistry_score;
        return typeof score === "number" && !Number.isNaN(score);
      }

      function getAnalysisStart(talk) {
        return talk?.analysis_started_at || talk?.analysis?.analyzed_at || null;
      }

      function hasRecordings(talk) {
        const files = talk?.recording_files || talk?.recording_file_list;
        return Array.isArray(files) && files.length > 0;
      }

      function hasConversation(talk) {
        return Array.isArray(talk?.conversation) && talk.conversation.length > 0;
      }

      async function processAnalysis() {
        const nextBtn = document.getElementById("nextBtn");
        nextBtn.disabled = true;
        startProgress();

        try {
          // 1. talk_history 저장
          if (requestId && (!talkId || talkId !== requestId)) {
            addStep("Saving call summary...");
            await saveTalkHistory();
            console.log("✅ talk_history 저장 완료");
            addStep("Call saved. Preparing analysis...");
          } else if (!talkId) {
            addStep("Saving call summary...");
            await saveTalkHistory();
            console.log("✅ talk_history 저장 완료");
            addStep("Call saved. Preparing analysis...");
          }

          // 2. 이미 분석 완료됐는지 확인
          let talk = null;
          try {
            talk = await fetchTalk();
          } catch (e) {
            if (requestId) {
              await saveTalkHistory();
              talk = await fetchTalk();
            } else {
              throw e;
            }
          }
          updateStepsFromTalk(talk);
          displayDurationFromTalk(talk);
          if (isAnalysisComplete(talk)) {
            stopProgress(true);
            nextBtn.disabled = false;
            return;
          }

          // 3. 분석 요청 (fire-and-forget — 서버가 즉시 응답)
          try {
            addStep("Starting analysis...");
            await analyzeTalk();
          } catch (e) {
            console.warn("⚠️ 분석 요청 실패, polling으로 대기:", e);
          }

          // 4. Polling으로 완료 대기 (최대 3분)
          const result = await waitForAnalysis(ANALYSIS_MAX_WAIT_MS, 3000);
          if (result.ok) {
            console.log("✅ 분석 완료");
            stopProgress(true);
            nextBtn.disabled = false;
          } else {
            // 타임아웃이어도 next 허용 (talk-result에서 이어서 대기)
            console.warn("⚠️ 분석 타임아웃, talk-result에서 계속 대기");
            stopProgress(false, result.reason || "timeout");
            nextBtn.disabled = false;
          }
        } catch (e) {
          console.error("❌ 분석 처리 실패:", e);
          stopProgress(false);
          // 실패해도 next 허용
          nextBtn.disabled = false;
        }
      }

      async function waitForAnalysis(maxMs = 180000, intervalMs = 3000) {
        const start = Date.now();
        let lastStatus = null;
        while (Date.now() - start < maxMs) {
          await sleep(intervalMs);
          try {
            const talk = await fetchTalk();

            if (isAnalysisComplete(talk)) {
              return { ok: true };
            }

            updateStepsFromTalk(talk);

            const status = talk?.analysis_status || null;
            lastStatus = status;

            if (status === "running") {
              progressLabel = "analyzing...";
              const started = talk?.analysis_started_at || 0;
              const elapsed = Date.now() - started;
              if (started && elapsed > 180000) {
                console.warn("⚠️ 분석 stuck 감지, 재시도 요청");
                try {
                  await analyzeTalk();
                } catch (_) {}
              }
            }

            if (status === "failed") {
              const error = String(talk?.analysis_error || "");
              if (!hasRecordings(talk) && !hasConversation(talk)) {
                progressLabel = "waiting for recordings...";
                lastStatus = "pending";
              } else if (
                error.includes("no conversation and no recording_files")
              ) {
                progressLabel = "waiting for recordings...";
                lastStatus = "pending";
              }
              // 실패 시 한 번 재시도
              console.warn("⚠️ 분석 실패, 재시도 중...");
              try {
                await analyzeTalk();
              } catch (_) {}
              await sleep(5000);
              continue;
            }

            const startedAt = getAnalysisStart(talk);
            if (startedAt && progressStartAt !== startedAt) {
              progressStartAt = startedAt;
            }
          } catch (e) {
            console.warn("⚠️ polling 에러:", e);
          }
        }
        return {
          ok: false,
          reason: lastStatus === "failed" ? "failed" : "timeout",
        };
      }
    </script>
  </body>
</html>
