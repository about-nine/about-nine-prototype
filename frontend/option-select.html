<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Option Select</title>
    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="js/firebase.js"></script>

    <style>
      .option-container {
        width: 100%;
        max-width: 480px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        padding: calc(30px + var(--safe-top)) 20px
          calc(30px + var(--safe-bottom));
        font-family: "Merriweather", serif;
        justify-content: space-between;
        overflow: hidden;
        box-sizing: border-box;
      }

      .option-header {
        flex-shrink: 0;
      }

      .topic-badge {
        background: #525252;
        color: white;
        padding: 8px 20px;
        border-radius: 20px;
        font-size: 14px;
        width: fit-content;
        margin: 0 auto 20px;
      }

      .option-question {
        font-size: 16px;
        color: var(--text-primary);
        line-height: 1.4;
        text-align: center;
        white-space: pre-line;
      }

      /* 캐러셀 */
      .carousel-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        position: relative;
        width: 100%;
        box-sizing: border-box;
      }

      .carousel-track {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
        overflow: hidden;
        width: 100%;
        padding: 20px 0 0;
        box-sizing: border-box;
      }

      .carousel-item {
        width: 100%;
        min-width: 0;
        transition: all 0.3s ease;
        opacity: 0.4;
        transform: scale(0.85);
        cursor: pointer;
      }

      .carousel-item.center {
        opacity: 1;
        transform: scale(1);
      }

      .carousel-item img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 20px;
        border: 2px solid transparent;
        transition: all 0.3s ease;
      }

      .carousel-item.center img {
        border-color: white;
      }

      .carousel-item-label {
        text-align: center;
        margin-top: 12px;
        font-size: 16px;
        color: var(--text-primary);
      }

      .carousel-dots {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin-top: 20px;
      }

      .carousel-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #525252;
        transition: all 0.3s ease;
      }

      .carousel-dot.active {
        background: white;
        border-radius: 4px;
      }

      /* 가이드 카드 */
      .guide-cards {
        flex: 1;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 40px;
        overflow-y: auto;
        overflow-x: hidden;
        width: 100%;
        box-sizing: border-box;
      }

      .guide-card {
        background: #d9d9d9;
        border-radius: 16px;
        padding: 40px 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 600;
        color: black;
        cursor: pointer;
        transition: all 0.3s ease;
        text-align: center;
        aspect-ratio: 1 / 1;
        min-height: 96px;
        min-width: 0;
      }

      @media (max-width: 420px) {
        .guide-cards {
          grid-template-columns: repeat(3, minmax(0, 1fr));
          gap: 8px;
        }

        .guide-card {
          padding: 28px 10px;
          font-size: 11px;
          min-height: 88px;
        }
      }

      .guide-card:active {
        transform: scale(0.95);
      }

      /* 모달 */
      .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: var(--overlay-bg);
        align-items: center;
        justify-content: center;
        z-index: 10000;
        padding: 20px;
      }

      .modal.active {
        display: flex;
      }

      .modal-content {
        background: var(--bg-card);
        padding: 40px 30px;
        border-radius: 20px;
        width: 90%;
        max-width: 400px;
        text-align: center;
      }

      .modal-category {
        font-size: 14px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--text-secondary);
        margin-bottom: 14px;
      }

      .modal-question {
        font-size: 18px;
        line-height: 1.5;
        color: var(--text-primary);
      }

      .option-footer {
        flex-shrink: 0;
      }

      @supports (height: 100svh) {
        .option-container {
          min-height: 100svh;
        }
      }

      @media (max-width: 420px) {
        .option-container {
          padding: calc(22px + var(--safe-top)) 16px
            calc(22px + var(--safe-bottom));
        }

        .topic-badge {
          font-size: 12px;
          padding: 6px 16px;
          margin-bottom: 14px;
        }

        .option-question {
          font-size: 14px;
        }

        .carousel-track {
          gap: 10px;
        }

        .carousel-item img {
          height: 150px;
        }

        .carousel-item-label {
          font-size: 14px;
        }

        .guide-cards {
          margin-bottom: 28px;
        }

        .modal-content {
          padding: 30px 20px;
        }
      }

      @media (max-height: 700px) {
        .carousel-item img {
          height: 140px;
        }

        .guide-cards {
          margin-bottom: 22px;
        }
      }
    </style>
  </head>

  <body>
    <div class="option-container">
      <!-- 상단 -->
      <div class="option-header">
        <div class="topic-badge" id="topicBadge">topic</div>
        <div class="option-question" id="questionText"></div>
      </div>

      <!-- 중앙 -->
      <div id="optionContent"></div>

      <!-- 하단 버튼 -->
      <div class="option-footer">
        <button id="enterBtn">enter</button>
      </div>
    </div>

    <!-- 모달 -->
    <div class="modal" id="questionModal">
      <div class="modal-content">
        <div class="modal-category" id="modalCategory"></div>
        <div class="modal-question" id="modalQuestion"></div>
      </div>
    </div>

    <script src="js/common.js"></script>

    <script type="module">
      import { rtdb, ref, get, update, onValue } from "/js/firebase.js";

      const userId = getFromLocal("user_id");
      if (!userId) {
        navigateTo("index.html");
      }

      const partner = getFromLocal("chat_partner");
      const round = getFromLocal("current_round") || 1;
      const topic = getFromLocal("current_topic") || "food";

      console.log(`📍 Option Select - Round ${round}: ${topic}`);

      let selectedOption = null;
      let currentQuestion = null;
      let currentCenterIndex = -1;
      let requestId = null;

      function initRequestId() {
        if (requestId) return requestId;
        requestId =
          new URLSearchParams(window.location.search).get("requestId") ||
          getFromLocal("match_request_id");

        if (!requestId) {
          console.error("No requestId found");
        }

        return requestId;
      }

      /* ====================== 초기화 ====================== */

      window.onload = async () => {
        document.getElementById("topicBadge").textContent = topic;
        initRequestId();

        if (topic === "food" || topic === "visual") {
          await loadAndRenderCarousel();
        } else {
          try {
            const selectedQuestions = await loadOrCreateGuideQuestions();
            renderGuide(selectedQuestions);
            startReadyListener();
          } catch (error) {
            console.error("Failed to load guide questions:", error);
            alert("failed to load questions");
            navigateTo("lounge.html");
          }
        }
      };

      /* ====================== 🔥 캐러셀 렌더링 (match_request에서 읽기) ====================== */

      async function loadAndRenderCarousel() {
        try {
          // 🔥 Firebase에서 match_request 읽기
          initRequestId();

          if (!requestId) {
            console.error("No requestId found");
            alert("invalid request");
            navigateTo("lounge.html");
            return;
          }

          const requestRef = ref(rtdb, `match_requests/${requestId}`);
          const snapshot = await get(requestRef);

          if (!snapshot.exists()) {
            console.error("Match request not found");
            return;
          }

          const matchRequest = snapshot.val();
          const question = matchRequest.question;
          const options = matchRequest.options;

          console.log("🎯 Match Request Data:", { question, options });

          if (!Array.isArray(options) || options.length === 0) {
            alert("invalid request");
            navigateTo("lounge.html");
            return;
          }

          currentQuestion = question;
          document.getElementById("questionText").textContent = question;
          renderCarousel(options);

          startReadyListener();
        } catch (error) {
          console.error("Failed to load match request:", error);
        }
      }

      function removeExtension(fileName) {
        return fileName.replace(/\.(png|jpg|jpeg|gif|webp)$/i, "");
      }

      function renderCarousel(options) {
        if (!Array.isArray(options) || options.length === 0) {
          alert("invalid request");
          navigateTo("lounge.html");
          return;
        }
        const contentEl = document.getElementById("optionContent");
        contentEl.innerHTML = `
          <div class="carousel-container">
            <div class="carousel-dots">
              ${options
                .map(
                  (_, index) => `
                <div class="carousel-dot ${index === 0 ? "active" : ""}" data-index="${index}"></div>
              `,
                )
                .join("")}
            </div>
            <div class="carousel-track" id="carouselTrack">
              ${options
                .map(
                  (opt, index) => `
                <div class="carousel-item ${index === 0 ? "center" : ""}" data-index="${index}" data-option="${opt.category}">
                  <img src="/images/${topic}/${opt.category}/${opt.fileName}" alt="${opt.fileName}">
                  <div class="carousel-item-label">${removeExtension(opt.fileName)}</div>
                </div>
              `,
                )
                .join("")}
            </div>
          </div>
        `;

        // 🔥 첫 번째 아이템 자동 선택
        setSelectedIndex(0, options);

        document.querySelectorAll(".carousel-item").forEach((item, index) => {
          item.onclick = () => {
            setSelectedIndex(index, options);
          };
        });
      }

      function setSelectedIndex(index, options) {
        if (index === currentCenterIndex) return;
        currentCenterIndex = index;
        // 모든 아이템에서 center 클래스 제거
        document
          .querySelectorAll(".carousel-item")
          .forEach((item, itemIndex) => {
            if (itemIndex === index) {
              item.classList.add("center");
              selectedOption = item.dataset.option;
            } else {
              item.classList.remove("center");
            }
          });

        // Dots 업데이트
        document.querySelectorAll(".carousel-dot").forEach((dot, dotIndex) => {
          if (dotIndex === index) {
            dot.classList.add("active");
          } else {
            dot.classList.remove("active");
          }
        });

        console.log("Center changed:", selectedOption);
      }

      /* ====================== 가이드 렌더링 ====================== */

      function renderGuide(selectedQuestions) {
        document.getElementById("questionText").textContent =
          "there are six topics with questions\n\nopen each card and converse about them";

        const categories = [
          "life",
          "time",
          "travel",
          "relationship",
          "love",
          "money",
        ];

        saveToLocal("life_guide_questions", selectedQuestions);

        const contentEl = document.getElementById("optionContent");
        contentEl.innerHTML = `
          <div class="guide-cards">
            ${categories
              .map(
                (cat) => `
              <div class="guide-card" data-category="${cat}">
                ${cat}
              </div>
            `,
              )
              .join("")}
          </div>
        `;

        document.querySelectorAll(".guide-card").forEach((card) => {
          card.onclick = () => {
            const category = card.dataset.category;
            openModal(category, selectedQuestions[category]);
          };
        });
      }

      /* ====================== 모달 ====================== */

      window.openModal = function (category, question) {
        document.getElementById("modalCategory").textContent = category;
        document.getElementById("modalQuestion").textContent = question;
        document.getElementById("questionModal").classList.add("active");
      };

      window.closeModal = function () {
        document.getElementById("questionModal").classList.remove("active");
      };

      document.getElementById("questionModal").onclick = (e) => {
        if (e.target.id === "questionModal") {
          closeModal();
        }
      };

      /* ====================== 완료 ====================== */

      function startReadyListener() {
        if (!requestId) return;

        const requestRef = ref(rtdb, `match_requests/${requestId}`);

        onValue(requestRef, async (snapshot) => {
          const data = snapshot.val();
          if (!data) return;

          const initiatorReady = data.initiator_ready || false;
          const receiverReady = data.receiver_ready || false;

          console.log(
            `Ready status - Initiator: ${initiatorReady}, Receiver: ${receiverReady}`,
          );

          if (initiatorReady && receiverReady) {
            // 녹화 시작은 voice-talk.html에서 처리
            navigateTo("voice-talk.html");
          }
        });
      }

      document.getElementById("enterBtn").onclick = async () => {
        if (!requestId) {
          console.error("No requestId");
          alert("invalid request");
          navigateTo("lounge.html");
          return;
        }

        // 선택 저장
        saveToLocal("user_selection", selectedOption);

        if (currentQuestion) {
          saveToLocal("current_question", currentQuestion);
        }

        showLoading("waiting for your partner...");

        try {
          const requestRef = ref(rtdb, `match_requests/${requestId}`);
          const snapshot = await get(requestRef);
          const matchRequest = snapshot.val();

          const isInitiator = matchRequest.initiator === userId;
          const readyField = isInitiator ? "initiator_ready" : "receiver_ready";
          const selectionField = isInitiator
            ? "initiator_selection"
            : "receiver_selection";

          await update(requestRef, {
            [readyField]: true,
            [selectionField]: selectedOption,
          });

          console.log(
            `✅ Set ${readyField} = true, ${selectionField} = ${selectedOption}`,
          );
        } catch (error) {
          console.error("Failed to update ready status:", error);
          hideLoading();
        }
      };

      async function loadOrCreateGuideQuestions() {
        initRequestId();
        if (!requestId) {
          throw new Error("No requestId");
        }

        const requestRef = ref(rtdb, `match_requests/${requestId}`);
        const snapshot = await get(requestRef);
        if (!snapshot.exists()) {
          throw new Error("match_request not found");
        }

        const data = snapshot.val() || {};
        if (data.guide_questions) {
          return data.guide_questions;
        }

        const categories = [
          "life",
          "time",
          "travel",
          "relationship",
          "love",
          "money",
        ];

        if (data.initiator === userId) {
          const selectedQuestions = {};
          categories.forEach((cat) => {
            const questions = GUIDE_QUESTIONS[cat];
            selectedQuestions[cat] =
              questions[Math.floor(Math.random() * questions.length)];
          });

          await update(requestRef, { guide_questions: selectedQuestions });
          return selectedQuestions;
        }

        // Receiver waits for initiator to set guide_questions
        const maxAttempts = 20;
        for (let i = 0; i < maxAttempts; i += 1) {
          await sleep(500);
          const latestSnap = await get(requestRef);
          const latest = latestSnap.val() || {};
          if (latest.guide_questions) {
            return latest.guide_questions;
          }
        }

        throw new Error("guide questions not ready");
      }
    </script>
  </body>
</html>
