<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>이름 입력</title>
    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="js/firebase.js"></script>
  </head>
  <body>
    <div class="container">
      <div>
        <h1 class="brand-text">tell us your<br />name</h1>

        <input
          type="text"
          id="firstName"
          placeholder="first name"
          autocomplete="given-name"
        />

        <input
          type="text"
          id="lastName"
          placeholder="last name"
          autocomplete="family-name"
        />

        <span id="error" class="error hidden"></span>
      </div>

      <button onclick="saveName()">next</button>
    </div>

    <script src="js/common.js"></script>
    <script>
      const firstNameInput = document.getElementById("firstName");
      const lastNameInput = document.getElementById("lastName");

      function hydrateNameInputs() {
        const first = getFromLocal("firstName");
        const last = getFromLocal("lastName");
        if (first) firstNameInput.value = first;
        if (last) lastNameInput.value = last;
      }

      hydrateNameInputs();

      firstNameInput.addEventListener("input", (e) => {
        saveToLocal("firstName", e.target.value.trim());
      });
      lastNameInput.addEventListener("input", (e) => {
        saveToLocal("lastName", e.target.value.trim());
      });

      async function saveName() {
        const firstName = firstNameInput.value.trim();
        const lastName = lastNameInput.value.trim();

        hideError("error");

        if (!firstName || !lastName) {
          showError("error", "please enter your full name");
          return;
        }

        saveToLocal("firstName", firstName);
        saveToLocal("lastName", lastName);

        navigateTo("location-permission.html");
      }

      lastNameInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") saveName();
      });
    </script>
  </body>
</html>
